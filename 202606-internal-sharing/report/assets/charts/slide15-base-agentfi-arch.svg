<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" width="960" height="820">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; }
    .title { font-size: 18px; font-weight: 700; fill: #ffffff; letter-spacing: 0.04em; }
    .layer-title { font-size: 15px; font-weight: 700; fill: #ffffff; letter-spacing: 0.02em; }
    .layer-subtitle { font-size: 12px; font-weight: 400; fill: #94a3b8; }
    .detail { font-size: 11px; fill: #94a3b8; }
    .detail-bright { font-size: 11px; fill: #cbd5e1; }
    .tag { font-size: 10px; fill: #e2e8f0; }
    .infra-label { font-size: 12px; fill: #4a6a8a; font-weight: 600; }
    .layer-num { font-size: 28px; font-weight: 700; fill: #1e3a5f; letter-spacing: -0.02em; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="layer4-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a2a4a"/>
      <stop offset="100%" stop-color="#0d3560"/>
    </linearGradient>
    <linearGradient id="layer3-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a2440"/>
      <stop offset="100%" stop-color="#0c2d50"/>
    </linearGradient>
    <linearGradient id="layer2-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#091e38"/>
      <stop offset="100%" stop-color="#0b2545"/>
    </linearGradient>
    <linearGradient id="layer1-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#081830"/>
      <stop offset="100%" stop-color="#0a1f3c"/>
    </linearGradient>
    <linearGradient id="infra-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4DA6FF"/>
    </marker>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" class="title">Base AgentFi &#x2014; 4-Layer Vertical Integration</text>

  <!-- Upward arrows on left side -->
  <line x1="42" y1="267" x2="42" y2="133" stroke="#4DA6FF" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>
  <line x1="42" y1="409" x2="42" y2="275" stroke="#4DA6FF" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>
  <line x1="42" y1="551" x2="42" y2="417" stroke="#4DA6FF" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.5"/>

  <!-- Side label -->
  <text x="20" y="355" text-anchor="middle" transform="rotate(-90, 20, 355)" font-size="11" fill="#4DA6FF" opacity="0.6" font-weight="600" letter-spacing="0.15em">AGENTFI STACK</text>

  <!-- ==================== LAYER 4: Base MCP ==================== -->
  <rect x="60" y="60" width="840" height="130" rx="8" fill="url(#layer4-grad)" stroke="#4DA6FF" stroke-width="1.5"/>
  <text x="78" y="178" class="layer-num" opacity="0.15">04</text>
  <text x="80" y="84" class="layer-title" fill="#4DA6FF">Base MCP</text>
  <text x="190" y="84" class="layer-subtitle">AI-to-Onchain Standard Gateway</text>
  <!-- OAuth badge -->
  <rect x="745" y="68" width="135" height="22" rx="4" fill="#1e3a5f" stroke="#4DA6FF" stroke-width="0.5" opacity="0.7"/>
  <text x="812" y="83" text-anchor="middle" class="tag">OAuth 2.1 Security</text>
  <!-- 7 DeFi Skill Plugins -->
  <rect x="80" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="132" y="122" text-anchor="middle" class="detail-bright">Morpho</text>
  <rect x="192" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="244" y="122" text-anchor="middle" class="detail-bright">Moonwell</text>
  <rect x="304" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="356" y="122" text-anchor="middle" class="detail-bright">Aerodrome</text>
  <rect x="416" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="468" y="122" text-anchor="middle" class="detail-bright">Uniswap</text>
  <rect x="528" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="580" y="122" text-anchor="middle" class="detail-bright">Avantis</text>
  <rect x="640" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="692" y="122" text-anchor="middle" class="detail-bright">Bankr</text>
  <rect x="752" y="102" width="104" height="32" rx="4" fill="#0f2744" stroke="#2a6cb5" stroke-width="0.8"/>
  <text x="804" y="122" text-anchor="middle" class="detail-bright">Virtuals</text>
  <text x="80" y="180" class="detail">7 DeFi Skill Plugins</text>

  <!-- ==================== LAYER 3: x402 Protocol ==================== -->
  <rect x="60" y="202" width="840" height="130" rx="8" fill="url(#layer3-grad)" stroke="#3a8fd4" stroke-width="1.2"/>
  <text x="78" y="320" class="layer-num" opacity="0.15">03</text>
  <text x="80" y="226" class="layer-title" fill="#4DA6FF">x402 Protocol</text>
  <text x="235" y="226" class="layer-subtitle">HTTP 402 Machine Micropayment</text>
  <!-- Feature boxes -->
  <rect x="80" y="246" width="185" height="42" rx="5" fill="#0c1f38" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="172" y="264" text-anchor="middle" class="detail-bright">$0.001 Min</text>
  <text x="172" y="279" text-anchor="middle" class="detail">Micropayment</text>
  <rect x="281" y="246" width="185" height="42" rx="5" fill="#0c1f38" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="373" y="264" text-anchor="middle" class="detail-bright">Sub-second</text>
  <text x="373" y="279" text-anchor="middle" class="detail">Settlement</text>
  <rect x="482" y="246" width="185" height="42" rx="5" fill="#0c1f38" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="574" y="264" text-anchor="middle" class="detail-bright">HTTP 402</text>
  <text x="574" y="279" text-anchor="middle" class="detail">Native Status</text>
  <rect x="683" y="246" width="185" height="42" rx="5" fill="#0c1f38" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="775" y="264" text-anchor="middle" class="detail-bright">Google AP2</text>
  <text x="775" y="279" text-anchor="middle" class="detail">Integration</text>
  <text x="80" y="322" class="detail">Machine-to-machine payment layer for AI agents</text>

  <!-- ==================== LAYER 2: Agentic Wallets ==================== -->
  <rect x="60" y="344" width="840" height="130" rx="8" fill="url(#layer2-grad)" stroke="#2e7abf" stroke-width="1.2"/>
  <text x="78" y="462" class="layer-num" opacity="0.15">02</text>
  <text x="80" y="368" class="layer-title" fill="#4DA6FF">Agentic Wallets</text>
  <text x="255" y="368" class="layer-subtitle">TEE-Protected Non-Custodial Keys</text>
  <!-- Feature boxes -->
  <rect x="80" y="388" width="185" height="42" rx="5" fill="#0b1a30" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="172" y="406" text-anchor="middle" class="detail-bright">Session Caps</text>
  <text x="172" y="421" text-anchor="middle" class="detail">Per-run total limit</text>
  <rect x="281" y="388" width="185" height="42" rx="5" fill="#0b1a30" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="373" y="406" text-anchor="middle" class="detail-bright">Transaction Limits</text>
  <text x="373" y="421" text-anchor="middle" class="detail">Per-tx limit</text>
  <rect x="482" y="388" width="185" height="42" rx="5" fill="#0b1a30" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="574" y="406" text-anchor="middle" class="detail-bright">Paymaster</text>
  <text x="574" y="421" text-anchor="middle" class="detail">Gasless on Base</text>
  <rect x="683" y="388" width="185" height="42" rx="5" fill="#0b1a30" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="775" y="406" text-anchor="middle" class="detail-bright">TEE Enclave</text>
  <text x="775" y="421" text-anchor="middle" class="detail">Key protection</text>
  <text x="80" y="464" class="detail">Secure agent wallet infrastructure with spending controls</text>

  <!-- ==================== LAYER 1: CDP AgentKit ==================== -->
  <rect x="60" y="486" width="840" height="130" rx="8" fill="url(#layer1-grad)" stroke="#25629e" stroke-width="1.2"/>
  <text x="78" y="604" class="layer-num" opacity="0.15">01</text>
  <text x="80" y="510" class="layer-title" fill="#4DA6FF">CDP AgentKit</text>
  <text x="245" y="510" class="layer-subtitle">Model-Agnostic Dev Framework</text>
  <!-- Three feature boxes -->
  <rect x="80" y="528" width="250" height="42" rx="5" fill="#091730" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="205" y="546" text-anchor="middle" class="detail-bright">50+ TS / 30+ Python Actions</text>
  <text x="205" y="561" text-anchor="middle" class="detail">Pre-built blockchain actions</text>
  <rect x="350" y="528" width="260" height="42" rx="5" fill="#091730" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="480" y="546" text-anchor="middle" class="detail-bright">OpenAI / Anthropic / Llama</text>
  <text x="480" y="561" text-anchor="middle" class="detail">Multi-model support</text>
  <rect x="630" y="528" width="250" height="42" rx="5" fill="#091730" stroke="#2a6cb5" stroke-width="0.6"/>
  <text x="755" y="546" text-anchor="middle" class="detail-bright">LangChain / OpenAI SDK</text>
  <text x="755" y="561" text-anchor="middle" class="detail">Framework integrations</text>
  <text x="80" y="606" class="detail">Foundation developer toolkit for AI agent blockchain interactions</text>

  <!-- ==================== BASE INFRASTRUCTURE ==================== -->
  <rect x="60" y="636" width="840" height="70" rx="8" fill="url(#infra-grad)" stroke="#1e3048" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="80" y="658" class="infra-label">BASE INFRASTRUCTURE</text>
  <!-- Infrastructure items -->
  <rect x="80" y="668" width="255" height="28" rx="4" fill="#0d0d1a" stroke="#1e3048" stroke-width="0.5"/>
  <text x="92" y="686" class="detail-bright">Flashblocks</text>
  <text x="323" y="686" text-anchor="end" class="detail">200ms Pre-confirmation</text>
  <rect x="357" y="668" width="255" height="28" rx="4" fill="#0d0d1a" stroke="#1e3048" stroke-width="0.5"/>
  <text x="369" y="686" class="detail-bright">Smart Wallet</text>
  <text x="600" y="686" text-anchor="end" class="detail">ERC-4337 / 7715</text>
  <rect x="634" y="668" width="255" height="28" rx="4" fill="#0d0d1a" stroke="#1e3048" stroke-width="0.5"/>
  <text x="646" y="686" class="detail-bright">Aerodrome DEX</text>
  <text x="877" y="686" text-anchor="end" class="detail">~$384M TVL</text>

  <!-- Dashed connector from infra to Layer 1 -->
  <line x1="480" y1="636" x2="480" y2="616" stroke="#1e3048" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
</svg>