<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 920" width="960" height="920">
  <style>
    text { font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; fill: #e2e8f0; }
    .title { font-size: 15px; font-weight: 700; fill: #ffffff; }
    .subtitle { font-size: 11px; font-weight: 400; fill: #94a3b8; }
    .label { font-size: 13px; font-weight: 600; fill: #ffffff; }
    .detail { font-size: 10.5px; font-weight: 400; fill: #94a3b8; }
    .arrow-label { font-size: 10px; font-weight: 500; fill: #FFA500; }
    .layer-num { font-size: 10px; font-weight: 700; fill: #475569; }
    .note { font-size: 9.5px; font-weight: 400; fill: #00D395; font-style: italic; }
    .partition-label { font-size: 11px; font-weight: 600; }
    .partition-detail { font-size: 9.5px; font-weight: 400; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFA500"/>
    </marker>
    <filter id="glow-green" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="960" height="920" fill="url(#bg-grad)"/>
  <rect x="300" y="30" width="360" height="48" rx="24" ry="24" fill="#1a1520" stroke="#FFA500" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="410" cy="48" r="8" fill="none" stroke="#FFA500" stroke-width="1.5"/>
  <line x1="410" y1="56" x2="410" y2="66" stroke="#FFA500" stroke-width="1.5"/>
  <text x="480" y="58" text-anchor="middle" class="label" fill="#FFA500">Users / Merchants</text>
  <line x1="480" y1="78" x2="480" y2="128" stroke="#FFA500" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="492" y="93" text-anchor="start" class="arrow-label">TempoTxEnvelope</text>
  <text x="492" y="105" text-anchor="start" class="detail" fill="#8B7355">(batching / gas sponsorship / P256 / WebAuthn)</text>
  <rect x="100" y="128" width="760" height="70" rx="6" ry="6" fill="#1a1520" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="142" class="layer-num">L1</text>
  <text x="480" y="156" text-anchor="middle" class="label">TIP-403 Compliance Policy Registry</text>
  <text x="480" y="174" text-anchor="middle" class="detail">Precompile-level whitelist / blacklist / compound policy</text>
  <text x="480" y="188" text-anchor="middle" class="detail">Sender + recipient bilateral compliance checks</text>
  <line x1="480" y1="198" x2="480" y2="248" stroke="#FFA500" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="96" y="244" width="768" height="158" rx="8" ry="8" fill="none" stroke="#00D395" stroke-width="2.5" filter="url(#glow-green)"/>
  <rect x="100" y="248" width="760" height="150" rx="6" ry="6" fill="#0a1a14" stroke="#00D395" stroke-width="1" opacity="0.9"/>
  <text x="112" y="262" class="layer-num" fill="#00D395">L2</text>
  <text x="480" y="274" text-anchor="middle" class="label" fill="#00D395">Payment Lane  --  3-Partition Blockspace</text>
  <rect x="730" y="254" width="120" height="20" rx="10" ry="10" fill="#052e16" stroke="#00D395" stroke-width="1"/>
  <text x="790" y="268" text-anchor="middle" font-size="9" font-weight="700" fill="#00D395">CORE INNOVATION</text>
  <rect x="128" y="290" width="220" height="70" rx="4" ry="4" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="238" y="318" text-anchor="middle" class="partition-label" fill="#94a3b8">System Lane</text>
  <text x="238" y="336" text-anchor="middle" class="partition-detail">Protocol operations</text>
  <rect x="374" y="290" width="220" height="70" rx="4" ry="4" fill="#052e16" stroke="#00D395" stroke-width="1.5"/>
  <text x="484" y="318" text-anchor="middle" class="partition-label" fill="#00D395">Payment Lane</text>
  <text x="484" y="336" text-anchor="middle" class="partition-detail" fill="#6ee7b7">Reserved gas capacity</text>
  <rect x="620" y="290" width="220" height="70" rx="4" ry="4" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="730" y="318" text-anchor="middle" class="partition-label" fill="#94a3b8">General Lane</text>
  <text x="730" y="336" text-anchor="middle" class="partition-detail">Hard gas limit</text>
  <text x="480" y="388" text-anchor="middle" class="note">general_gas_limit caps non-payment tx gas, ensuring payment txs always have reserved capacity</text>
  <line x1="480" y1="398" x2="480" y2="448" stroke="#FFA500" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="100" y="448" width="760" height="70" rx="6" ry="6" fill="#1a1520" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="462" class="layer-num">L3</text>
  <text x="480" y="476" text-anchor="middle" class="label">TIP-20 Precompiled Token</text>
  <text x="480" y="494" text-anchor="middle" class="detail">Protocol-level token standard (not ERC-20) -- fixed 6 decimals, native memo</text>
  <text x="480" y="508" text-anchor="middle" class="detail">Pause, role-based access, fee eligibility, Payment Lane integration</text>
  <line x1="480" y1="518" x2="480" y2="568" stroke="#FFA500" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="100" y="568" width="760" height="70" rx="6" ry="6" fill="#1c1917" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="582" class="layer-num">L4</text>
  <text x="480" y="596" text-anchor="middle" class="label">Reth EVM Execution Layer</text>
  <text x="480" y="614" text-anchor="middle" class="detail">Deep-customized Reth (26+ Rust crates)</text>
  <text x="480" y="628" text-anchor="middle" class="detail">Custom primitives / precompiles / txpool / builder</text>
  <line x1="480" y1="638" x2="480" y2="688" stroke="#FFA500" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="100" y="688" width="760" height="70" rx="6" ry="6" fill="#1c1917" stroke="#eab308" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="112" y="702" class="layer-num">L5</text>
  <text x="480" y="716" text-anchor="middle" class="label">Commonware Simplex BFT Consensus</text>
  <text x="480" y="734" text-anchor="middle" class="detail">Target ~500-600ms deterministic finality</text>
  <text x="480" y="748" text-anchor="middle" class="detail">BLS12-381 threshold signatures + VRF election</text>
  <line x1="480" y1="758" x2="480" y2="808" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <rect x="100" y="808" width="760" height="80" rx="6" ry="6" fill="#0f172a" stroke="#475569" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="112" y="822" class="layer-num">OPT</text>
  <text x="480" y="836" text-anchor="middle" class="label" fill="#94a3b8">Enterprise Zones</text>
  <text x="480" y="856" text-anchor="middle" class="detail">Private execution environment, encrypted deposits/withdrawals</text>
  <text x="480" y="870" text-anchor="middle" class="detail">Single sequencer (proof stub, not production ready)</text>
  <rect x="780" y="812" width="70" height="18" rx="9" ry="9" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="815" y="824" text-anchor="middle" font-size="9" fill="#64748b">Optional</text>
  <text x="28" y="459" text-anchor="middle" transform="rotate(-90, 28, 459)" font-size="12" fill="#475569" font-weight="600" letter-spacing="0.15em">TRANSACTION FLOW</text>
</svg>