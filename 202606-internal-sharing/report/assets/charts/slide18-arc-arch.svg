  <rect x="85" y="80" width="276.3" height="70" rx="6" ry="6" fill="#0a1528" stroke="#3b82f6" stroke-width="1"/>
  <text x="223.1" y="111" text-anchor="middle" class="component-label" fill="#93bbfc">DeFi</text>
  <text x="223.1" y="127" text-anchor="middle" class="component-sub">Uniswap / Aave / Curve</text>

  <!-- Payments -->
