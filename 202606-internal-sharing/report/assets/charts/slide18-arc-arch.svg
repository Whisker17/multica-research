<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <style>
    text { font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif; fill: #e2e8f0; }
    .layer-label { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .component-label { font-size: 11.5px; font-weight: 500; }
    .component-sub { font-size: 9.5px; fill: #94a3b8; }
    .title { font-size: 18px; font-weight: 700; fill: #ffffff; }
    .subtitle { font-size: 12px; fill: #64748b; }
    .differentiator-label { font-size: 10px; font-weight: 700; fill: #00D395; letter-spacing: 0.08em; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <filter id="glow-green" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="layer-shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="780" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="640" y="32" text-anchor="middle" class="title">Circle Arc Financial OS &#x2014; Platform Architecture</text>
  <text x="640" y="50" text-anchor="middle" class="subtitle">5-Layer Stack &#xB7; Stablecoin-Native &#xB7; EVM-Compatible</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LAYER 5: APPLICATIONS  (y=65, h=100) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="50" y="65" width="1180" height="100" rx="8" ry="8" fill="#1a1625" stroke="#4a3f6b" stroke-width="1" filter="url(#layer-shadow)"/>
  <text x="64" y="119" class="layer-label" fill="#4a3f6b" text-anchor="start" transform="rotate(-90, 64, 119)">APPLICATIONS</text>

