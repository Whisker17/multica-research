<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" width="1100" height="920">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace; fill: #e2e8f0; }
    .title { font-size: 18px; font-weight: 700; fill: #00D395; letter-spacing: 0.05em; }
    .subtitle { font-size: 11px; fill: #94a3b8; letter-spacing: 0.02em; }
    .node-label { font-size: 13px; font-weight: 700; fill: #e2e8f0; }
    .node-sub { font-size: 11px; fill: #94a3b8; }
    .layer-label { font-size: 11px; font-weight: 700; fill: #00D395; letter-spacing: 0.08em; }
    .sidebar-title { font-size: 12px; font-weight: 700; fill: #00D395; }
    .sidebar-num { font-size: 11px; font-weight: 700; fill: #00D395; }
    .sidebar-text { font-size: 10px; fill: #94a3b8; }
    .trust-label { font-size: 11px; fill: #00D395; font-weight: 700; letter-spacing: 0.03em; }
    .arrow-label { font-size: 10px; fill: #94a3b8; }
    .dim-text { font-size: 10px; fill: #475569; }
    .eth-label { font-size: 13px; font-weight: 700; fill: #627EEA; }
    .key-concept { font-size: 10px; fill: #64748b; font-style: italic; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0f1118"/>
    </linearGradient>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00D395"/>
    </marker>
    <marker id="arrow-muted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#627EEA"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" fill="url(#bg-grad)"/>

  <!-- TITLE -->
  <text x="550" y="38" text-anchor="middle" class="title">Prividium: Prove-Not-Reveal Architecture</text>
  <text x="550" y="56" text-anchor="middle" class="subtitle">zkSync Validium  ·  Enterprise Privacy  ·  Zero Data Leakage to L1</text>

  <!-- ============================================================ -->
  <!-- LEFT SIDEBAR - 4-Layer Access Control                        -->
  <!-- ============================================================ -->
  <rect x="30" y="80" width="170" height="680" rx="8" fill="#0d1117" stroke="#1e3a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="115" y="102" text-anchor="middle" class="sidebar-title">4-LAYER ACCESS CONTROL</text>

  <!-- Layer 1: Identity Auth -->
  <rect x="40" y="125" width="150" height="130" rx="6" fill="#0a1f15" stroke="#00D395" stroke-width="0.8" opacity="0.9"/>
  <text x="50" y="145" class="sidebar-num">1</text>
  <text x="65" y="145" class="sidebar-title" style="font-size:11px">Identity Auth</text>
  <text x="50" y="163" class="sidebar-text">Okta SSO</text>
  <text x="50" y="177" class="sidebar-text">SIWE (Sign-In</text>
  <text x="50" y="189" class="sidebar-text"> with Ethereum)</text>
  <text x="50" y="203" class="sidebar-text">Multi-wallet</text>
  <text x="50" y="215" class="sidebar-text">support</text>
  <text x="50" y="237" class="sidebar-text">Keycloak hybrid</text>

  <!-- Layer 2: Proxy RPC Gateway -->
  <rect x="40" y="270" width="150" height="130" rx="6" fill="#0a1f15" stroke="#00D395" stroke-width="0.8" opacity="0.9"/>
  <text x="50" y="290" class="sidebar-num">2</text>
  <text x="65" y="290" class="sidebar-title" style="font-size:11px">Proxy RPC GW</text>
  <text x="50" y="308" class="sidebar-text">3-step verification</text>
  <text x="50" y="322" class="sidebar-text">JWT validation</text>
  <text x="50" y="336" class="sidebar-text">Wallet matching</text>
  <text x="50" y="350" class="sidebar-text">Permission check</text>
  <text x="50" y="370" class="sidebar-text">Full audit logs</text>
  <text x="50" y="384" class="sidebar-text">401/403 on fail</text>

  <!-- Layer 3: RBAC Permissions -->
  <rect x="40" y="415" width="150" height="120" rx="6" fill="#0a1f15" stroke="#00D395" stroke-width="0.8" opacity="0.9"/>
  <text x="50" y="435" class="sidebar-num">3</text>
  <text x="65" y="435" class="sidebar-title" style="font-size:11px">RBAC Permissions</text>
  <text x="50" y="453" class="sidebar-text">Admin Dashboard</text>
  <text x="50" y="467" class="sidebar-text">Contract function-</text>
  <text x="50" y="479" class="sidebar-text">level granularity</text>
  <text x="50" y="499" class="sidebar-text">No code changes</text>
  <text x="50" y="513" class="sidebar-text">needed</text>

  <!-- Layer 4: L1 TransactionFilterer -->
  <rect x="40" y="550" width="150" height="120" rx="6" fill="#0a1f15" stroke="#00D395" stroke-width="0.8" opacity="0.9"/>
  <text x="50" y="570" class="sidebar-num">4</text>
  <text x="65" y="570" class="sidebar-title" style="font-size:11px">L1 TxFilterer</text>
  <text x="50" y="588" class="sidebar-text">On-chain whitelist</text>
  <text x="50" y="602" class="sidebar-text">Forced transaction</text>
  <text x="50" y="614" class="sidebar-text">path filtering</text>
  <text x="50" y="634" class="sidebar-text">Smart contract</text>
  <text x="50" y="648" class="sidebar-text">enforcement</text>

  <!-- ============================================================ -->
  <!-- MAIN FLOW (right area, centered around x=650)                -->
  <!-- ============================================================ -->

  <!-- 1. INSTITUTIONAL USERS -->
  <rect x="520" y="85" width="260" height="50" rx="25" fill="#0a1f15" stroke="#00D395" stroke-width="1.5" filter="url(#glow-green)"/>
  <!-- User stick figures -->
  <circle cx="610" cy="101" r="6" fill="none" stroke="#00D395" stroke-width="1.2"/>
  <line x1="610" y1="107" x2="610" y2="119" stroke="#00D395" stroke-width="1.2"/>
  <line x1="604" y1="113" x2="616" y2="113" stroke="#00D395" stroke-width="1.2"/>
  <circle cx="650" cy="101" r="6" fill="none" stroke="#00D395" stroke-width="1.2"/>
  <line x1="650" y1="107" x2="650" y2="119" stroke="#00D395" stroke-width="1.2"/>
  <line x1="644" y1="113" x2="656" y2="113" stroke="#00D395" stroke-width="1.2"/>
  <circle cx="690" cy="101" r="6" fill="none" stroke="#00D395" stroke-width="1.2"/>
  <line x1="690" y1="107" x2="690" y2="119" stroke="#00D395" stroke-width="1.2"/>
  <line x1="684" y1="113" x2="696" y2="113" stroke="#00D395" stroke-width="1.2"/>
  <text x="650" y="147" text-anchor="middle" class="node-label" style="fill:#00D395;">Institutional Users</text>

  <!-- Arrow: Users -> IdP -->
  <line x1="650" y1="153" x2="650" y2="188" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="662" y="173" class="arrow-label">Identity Authentication</text>

  <!-- 2. IdP (Identity Provider) -->
  <rect x="410" y="196" width="480" height="48" rx="6" fill="#0d1a14" stroke="#00D395" stroke-width="1"/>
  <text x="650" y="216" text-anchor="middle" class="node-label">IdP  (Identity Provider)</text>
  <text x="650" y="232" text-anchor="middle" class="node-sub">Okta OIDC  /  SIWE  /  Hybrid Mode (Keycloak)</text>

  <!-- Arrow: IdP -> Gateway -->
  <line x1="650" y1="252" x2="650" y2="287" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="662" y="272" class="arrow-label">JWT Token</text>

  <!-- 3. PROXY RPC GATEWAY -->
  <rect x="350" y="295" width="600" height="85" rx="6" fill="#0d1a14" stroke="#00D395" stroke-width="1.2"/>
  <text x="650" y="315" text-anchor="middle" class="node-label">Proxy RPC Gateway  (3-Step Verification)</text>

  <!-- 3 step boxes inside -->
  <rect x="370" y="327" width="170" height="32" rx="4" fill="#0f2a1f" stroke="#00D395" stroke-width="0.6" opacity="0.8"/>
  <text x="455" y="347" text-anchor="middle" class="node-sub" style="fill:#b0e0cc; font-size:10px;">1  JWT Validation</text>
  <line x1="542" y1="343" x2="553" y2="343" stroke="#00D395" stroke-width="1" marker-end="url(#arrow-green)"/>

  <rect x="555" y="327" width="170" height="32" rx="4" fill="#0f2a1f" stroke="#00D395" stroke-width="0.6" opacity="0.8"/>
  <text x="640" y="347" text-anchor="middle" class="node-sub" style="fill:#b0e0cc; font-size:10px;">2  Wallet Matching</text>
  <line x1="727" y1="343" x2="738" y2="343" stroke="#00D395" stroke-width="1" marker-end="url(#arrow-green)"/>

  <rect x="740" y="327" width="170" height="32" rx="4" fill="#0f2a1f" stroke="#00D395" stroke-width="0.6" opacity="0.8"/>
  <text x="825" y="347" text-anchor="middle" class="node-sub" style="fill:#b0e0cc; font-size:10px;">3  Permission Check</text>

  <!-- Rejected path -->
  <line x1="950" y1="337" x2="1010" y2="337" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="1020" y="331" class="node-sub" style="fill:#ef4444; font-size:10px;">Unauthorized</text>
  <text x="1020" y="345" class="node-sub" style="fill:#ef4444; font-size:10px;">401/403</text>
  <text x="1020" y="359" class="node-sub" style="fill:#6b4040; font-size:9px;">+ audit log</text>

  <!-- Arrow: Gateway -> Sequencer -->
  <line x1="650" y1="388" x2="650" y2="423" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="662" y="408" class="arrow-label">Authorized Tx</text>

  <!-- 4. SEQUENCER -->
  <rect x="390" y="431" width="520" height="65" rx="6" fill="#0d1a14" stroke="#00D395" stroke-width="1.2"/>
  <text x="650" y="453" text-anchor="middle" class="node-label">Sequencer  —  Private Execution</text>
  <text x="650" y="471" text-anchor="middle" class="node-sub">Tx data: PostgreSQL + Blob Store (private subnet)</text>
  <text x="650" y="485" text-anchor="middle" class="dim-text">No public exposure  ·  Operator sees all (audit asset)</text>

  <!-- Arrow: Sequencer -> Prover -->
  <line x1="650" y1="504" x2="650" y2="539" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="662" y="524" class="arrow-label">State transitions</text>

  <!-- 5. PROVER -->
  <rect x="410" y="547" width="480" height="55" rx="6" fill="#0d1a14" stroke="#00D395" stroke-width="1.2"/>
  <text x="650" y="569" text-anchor="middle" class="node-label">Prover  (Airbender GPU)</text>
  <text x="650" y="587" text-anchor="middle" class="node-sub">STARK proof generation  ·  ~$0.0001/tx  ·  sub-second block proof</text>

  <!-- Arrow: Prover -> Gateway -->
  <line x1="650" y1="610" x2="650" y2="645" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="662" y="630" class="arrow-label">STARK proof</text>

  <!-- 6. ZKsync GATEWAY -->
  <rect x="430" y="653" width="440" height="55" rx="6" fill="#0d1a14" stroke="#00D395" stroke-width="1.2"/>
  <text x="650" y="675" text-anchor="middle" class="node-label">ZKsync Gateway</text>
  <text x="650" y="693" text-anchor="middle" class="node-sub">Aggregate multi-chain proofs  ·  Batch submission</text>

  <!-- ============================================================ -->
  <!-- TRUST BOUNDARY                                               -->
  <!-- ============================================================ -->
  <line x1="240" y1="738" x2="1060" y2="738" stroke="#00D395" stroke-width="2" stroke-dasharray="10,6" opacity="0.8"/>
  <text x="650" y="728" text-anchor="middle" class="trust-label">TRUST BOUNDARY  —  Only state root + STARK proof cross this line</text>
  <text x="1055" y="710" text-anchor="end" class="dim-text" style="font-size:9px; fill:#00D395; opacity:0.5;">PRIVATE CHAIN (Validium)</text>
  <text x="1055" y="754" text-anchor="end" class="dim-text" style="font-size:9px; fill:#627EEA; opacity:0.5;">PUBLIC L1</text>

  <!-- Arrow: across trust boundary -->
  <line x1="650" y1="741" x2="650" y2="786" stroke="#627EEA" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="664" y="766" class="arrow-label" style="fill:#627EEA;">State root + STARK proof only</text>

  <!-- 7. ETHEREUM L1 -->
  <rect x="390" y="796" width="520" height="65" rx="6" fill="#111827" stroke="#627EEA" stroke-width="1.5"/>
  <!-- Ethereum diamond icon -->
  <polygon points="420,819 432,833 420,847 408,833" fill="none" stroke="#627EEA" stroke-width="1.2"/>
  <line x1="420" y1="833" x2="420" y2="819" stroke="#627EEA" stroke-width="0.8" opacity="0.5"/>
  <text x="660" y="820" text-anchor="middle" class="eth-label">Ethereum L1</text>
  <text x="660" y="838" text-anchor="middle" class="node-sub" style="fill:#8b9dc3;">External world sees only: state root hash + verification result</text>
  <text x="660" y="852" text-anchor="middle" class="key-concept">Zero transaction data leakage  ·  Inherent Validium property</text>

  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
  <!-- ============================================================ -->
  <rect x="300" y="878" width="700" height="32" rx="4" fill="#0d1117" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Green arrow legend -->
  <line x1="320" y1="894" x2="350" y2="894" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="358" y="898" class="dim-text">Private chain flow</text>

  <!-- Blue arrow legend -->
  <line x1="490" y1="894" x2="520" y2="894" stroke="#627EEA" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="528" y="898" class="dim-text">L1 settlement</text>

  <!-- Red dashed arrow legend -->
  <line x1="640" y1="894" x2="670" y2="894" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="678" y="898" class="dim-text">Rejected request</text>

  <!-- Trust boundary legend -->
  <line x1="810" y1="894" x2="840" y2="894" stroke="#00D395" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="848" y="898" class="dim-text">Trust boundary</text>
</svg>
