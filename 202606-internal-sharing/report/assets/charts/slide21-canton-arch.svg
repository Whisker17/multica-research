<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
<style>
  text { font-family: "SF Mono", "Fira Code", "Cascadia Code", "Courier New", monospace; fill: #e2e8f0; }
  .title { font-size: 18px; font-weight: 700; fill: #00D395; letter-spacing: 0.05em; }
  .subtitle { font-size: 12px; fill: #94a3b8; letter-spacing: 0.02em; }
  .layer-label { font-size: 14px; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.03em; }
  .node-label { font-size: 12px; font-weight: 600; fill: #e2e8f0; }
  .node-sub { font-size: 10px; fill: #94a3b8; }
  .app-label { font-size: 11px; font-weight: 600; fill: #e2e8f0; }
  .key-concept { font-size: 11px; fill: #00D395; font-style: italic; }
  .table-header { font-size: 10px; font-weight: 700; fill: #e2e8f0; }
  .table-cell { font-size: 9px; fill: #cbd5e1; }
  .table-role { font-size: 9px; fill: #94a3b8; font-weight: 600; }
  .legend-text { font-size: 10px; fill: #94a3b8; }
</style>
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0A0A0A"/>
    <stop offset="100%" stop-color="#0F0F1A"/>
  </linearGradient>
  <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#00D395"/>
  </marker>
  <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
  </marker>
  <linearGradient id="grad-alice" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#4DA6FF" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0.05"/>
  </linearGradient>
  <linearGradient id="grad-bob" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FFA500" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#FFA500" stop-opacity="0.05"/>
  </linearGradient>
  <linearGradient id="grad-reg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#8C8DFC" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#8C8DFC" stop-opacity="0.05"/>
  </linearGradient>
  <linearGradient id="grad-sync" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#00D395" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#00D395" stop-opacity="0.05"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="1200" height="680" fill="url(#bg-grad)"/>

<!-- TITLE -->
<text x="600" y="38" text-anchor="middle" class="title">Canton "Need-to-Know" Participant Model</text>
<text x="600" y="56" text-anchor="middle" class="subtitle">No single node holds the complete global state</text>

<!-- APPLICATION LAYER -->
<rect x="60" y="72" width="780" height="52" rx="6" fill="#0f172a" stroke="#00D395" stroke-width="1" stroke-opacity="0.6"/>
<text x="70" y="89" class="layer-label" fill="#00D395">APPLICATION LAYER</text>
<rect x="80" y="97" width="170" height="22" rx="4" fill="#00D395" fill-opacity="0.15" stroke="#00D395" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="165" y="112" text-anchor="middle" class="app-label">DvP Trading</text>
<rect x="262" y="97" width="170" height="22" rx="4" fill="#00D395" fill-opacity="0.15" stroke="#00D395" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="347" y="112" text-anchor="middle" class="app-label">Repo Settlement</text>
<rect x="444" y="97" width="170" height="22" rx="4" fill="#00D395" fill-opacity="0.15" stroke="#00D395" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="529" y="112" text-anchor="middle" class="app-label">Collateral Mgmt</text>
<rect x="626" y="97" width="170" height="22" rx="4" fill="#00D395" fill-opacity="0.15" stroke="#00D395" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="711" y="112" text-anchor="middle" class="app-label">Bond Lifecycle</text>

<!-- PARTICIPANT LAYER -->
<rect x="60" y="144" width="780" height="210" rx="6" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,3"/>
<text x="70" y="162" class="layer-label">PARTICIPANT LAYER</text>
<text x="838" y="162" text-anchor="end" class="key-concept">"Each sees only its own contracts"</text>

<!-- Participant A: Alice Bank -->
<rect x="80" y="174" width="220" height="165" rx="8" fill="url(#grad-alice)" stroke="#4DA6FF" stroke-width="1.5"/>
<text x="190" y="194" text-anchor="middle" class="node-label" fill="#4DA6FF">Participant A</text>
<text x="190" y="209" text-anchor="middle" class="node-sub">Alice Bank</text>
<rect x="95" y="219" width="190" height="50" rx="4" fill="#0A0A0A" fill-opacity="0.6" stroke="#4DA6FF" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="190" y="239" text-anchor="middle" font-size="11" fill="#4DA6FF">Local ACS</text>
<text x="190" y="254" text-anchor="middle" font-size="9" fill="#94a3b8">Active Contract Set</text>
<rect x="95" y="276" width="55" height="48" rx="3" fill="#4DA6FF" fill-opacity="0.1" stroke="#4DA6FF" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="122" y="296" text-anchor="middle" font-size="8" fill="#4DA6FF">Contract</text>
<text x="122" y="307" text-anchor="middle" font-size="8" fill="#4DA6FF">A-1</text>
<rect x="162" y="276" width="55" height="48" rx="3" fill="#4DA6FF" fill-opacity="0.1" stroke="#4DA6FF" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="189" y="296" text-anchor="middle" font-size="8" fill="#4DA6FF">Contract</text>
<text x="189" y="307" text-anchor="middle" font-size="8" fill="#4DA6FF">A-2</text>
<rect x="229" y="276" width="55" height="48" rx="3" fill="#4DA6FF" fill-opacity="0.1" stroke="#4DA6FF" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="256" y="296" text-anchor="middle" font-size="8" fill="#4DA6FF">Contract</text>
<text x="256" y="307" text-anchor="middle" font-size="8" fill="#4DA6FF">A-3</text>
<text x="190" y="335" text-anchor="middle" font-size="9" fill="#4DA6FF">Only sees own contracts</text>

<!-- Participant B: Bob Fund -->
<rect x="340" y="174" width="220" height="165" rx="8" fill="url(#grad-bob)" stroke="#FFA500" stroke-width="1.5"/>
<text x="450" y="194" text-anchor="middle" class="node-label" fill="#FFA500">Participant B</text>
<text x="450" y="209" text-anchor="middle" class="node-sub">Bob Fund</text>
<rect x="355" y="219" width="190" height="50" rx="4" fill="#0A0A0A" fill-opacity="0.6" stroke="#FFA500" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="450" y="239" text-anchor="middle" font-size="11" fill="#FFA500">Local ACS</text>
<text x="450" y="254" text-anchor="middle" font-size="9" fill="#94a3b8">Active Contract Set</text>
<rect x="355" y="276" width="55" height="48" rx="3" fill="#FFA500" fill-opacity="0.1" stroke="#FFA500" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="382" y="296" text-anchor="middle" font-size="8" fill="#FFA500">Contract</text>
<text x="382" y="307" text-anchor="middle" font-size="8" fill="#FFA500">B-1</text>
<rect x="422" y="276" width="55" height="48" rx="3" fill="#FFA500" fill-opacity="0.1" stroke="#FFA500" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="449" y="296" text-anchor="middle" font-size="8" fill="#FFA500">Contract</text>
<text x="449" y="307" text-anchor="middle" font-size="8" fill="#FFA500">B-2</text>
<rect x="489" y="276" width="55" height="48" rx="3" fill="#FFA500" fill-opacity="0.08" stroke="#FFA500" stroke-width="0.5" stroke-dasharray="3,2" stroke-opacity="0.3"/>
<text x="516" y="303" text-anchor="middle" font-size="14" fill="#FFA500" fill-opacity="0.5">...</text>
<text x="450" y="335" text-anchor="middle" font-size="9" fill="#FFA500">Only sees own contracts</text>

<!-- Participant C: Regulator -->
<rect x="600" y="174" width="220" height="165" rx="8" fill="url(#grad-reg)" stroke="#8C8DFC" stroke-width="1.5"/>
<text x="710" y="194" text-anchor="middle" class="node-label" fill="#8C8DFC">Participant C</text>
<text x="710" y="209" text-anchor="middle" class="node-sub">Regulator</text>
<rect x="615" y="219" width="190" height="50" rx="4" fill="#0A0A0A" fill-opacity="0.6" stroke="#8C8DFC" stroke-width="0.8" stroke-opacity="0.5"/>
<text x="710" y="239" text-anchor="middle" font-size="11" fill="#8C8DFC">Local ACS</text>
<text x="710" y="254" text-anchor="middle" font-size="9" fill="#94a3b8">Observer-role Contracts</text>
<rect x="615" y="276" width="85" height="48" rx="3" fill="#8C8DFC" fill-opacity="0.1" stroke="#8C8DFC" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="657" y="296" text-anchor="middle" font-size="8" fill="#8C8DFC">Observer</text>
<text x="657" y="307" text-anchor="middle" font-size="8" fill="#8C8DFC">View A-1</text>
<rect x="712" y="276" width="85" height="48" rx="3" fill="#8C8DFC" fill-opacity="0.1" stroke="#8C8DFC" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="754" y="296" text-anchor="middle" font-size="8" fill="#8C8DFC">Observer</text>
<text x="754" y="307" text-anchor="middle" font-size="8" fill="#8C8DFC">View B-1</text>
<text x="710" y="335" text-anchor="middle" font-size="9" fill="#8C8DFC">Only Observer-role access</text>

<!-- More participants ellipsis -->
<text x="845" y="260" font-size="24" fill="#475569" text-anchor="middle">...</text>

<!-- ARROWS: Participants to Synchronizer (dashed = encrypted) -->
<line x1="190" y1="359" x2="370" y2="395" stroke="#4DA6FF" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
<line x1="450" y1="359" x2="450" y2="395" stroke="#FFA500" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
<line x1="710" y1="359" x2="530" y2="395" stroke="#8C8DFC" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
<!-- Label on arrows -->
<rect x="355" y="370" width="190" height="18" rx="3" fill="#0A0A0A" fill-opacity="0.9"/>
<text x="450" y="383" text-anchor="middle" font-size="9" fill="#00D395">encrypted messages only</text>

<!-- SYNCHRONIZER LAYER -->
<rect x="60" y="395" width="780" height="100" rx="6" fill="url(#grad-sync)" stroke="#00D395" stroke-width="1.5"/>
<text x="70" y="415" class="layer-label" fill="#00D395">SYNCHRONIZER</text>
<!-- Sequencer -->
<rect x="100" y="427" width="330" height="55" rx="6" fill="#0A0A0A" fill-opacity="0.7" stroke="#00D395" stroke-width="1"/>
<text x="265" y="449" text-anchor="middle" font-size="13" font-weight="600" fill="#00D395">Sequencer</text>
<text x="265" y="465" text-anchor="middle" font-size="10" fill="#94a3b8">Orders &amp; distributes encrypted messages</text>
<text x="265" y="478" text-anchor="middle" font-size="9" fill="#ef4444">Cannot see plaintext</text>
<!-- Mediator -->
<rect x="470" y="427" width="350" height="55" rx="6" fill="#0A0A0A" fill-opacity="0.7" stroke="#00D395" stroke-width="1"/>
<text x="645" y="449" text-anchor="middle" font-size="13" font-weight="600" fill="#00D395">Mediator</text>
<text x="645" y="465" text-anchor="middle" font-size="10" fill="#94a3b8">2PC confirmation aggregation</text>
<text x="645" y="478" text-anchor="middle" font-size="9" fill="#ef4444">Cannot see contract content</text>

<!-- Arrow to Global Synchronizer -->
<line x1="450" y1="495" x2="450" y2="523" stroke="#00D395" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- GLOBAL SYNCHRONIZER -->
<rect x="60" y="525" width="780" height="65" rx="6" fill="#0f172a" stroke="#00D395" stroke-width="1" stroke-opacity="0.5"/>
<text x="70" y="545" class="layer-label" fill="#00D395">GLOBAL SYNCHRONIZER</text>
<text x="450" y="558" text-anchor="middle" font-size="11" fill="#e2e8f0">Cross-application Atomic Settlement</text>
<rect x="160" y="566" width="180" height="18" rx="3" fill="#00D395" fill-opacity="0.1" stroke="#00D395" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="250" y="579" text-anchor="middle" font-size="10" fill="#00D395">Super Validators</text>
<rect x="370" y="566" width="180" height="18" rx="3" fill="#00D395" fill-opacity="0.1" stroke="#00D395" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="460" y="579" text-anchor="middle" font-size="10" fill="#00D395">Governance Layer</text>
<rect x="580" y="566" width="180" height="18" rx="3" fill="#00D395" fill-opacity="0.1" stroke="#00D395" stroke-width="0.5" stroke-opacity="0.4"/>
<text x="670" y="579" text-anchor="middle" font-size="10" fill="#00D395">Canton Coin Incentives</text>

<!-- ========== DvP VISIBILITY TABLE (right side) ========== -->
<rect x="870" y="72" width="310" height="275" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
<text x="1025" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#00D395">DvP Visibility Matrix</text>
<!-- Headers -->
<rect x="878" y="102" width="294" height="20" fill="#00D395" fill-opacity="0.1"/>
<text x="886" y="116" class="table-header">Role</text>
<text x="950" y="116" class="table-header">Can See</text>
<text x="1080" y="116" class="table-header">Cannot See</text>
<line x1="878" y1="124" x2="1172" y2="124" stroke="#334155" stroke-width="0.5"/>
<!-- Alice -->
<text x="886" y="140" class="table-role" fill="#4DA6FF">Alice</text>
<text x="886" y="152" class="table-role" fill="#4DA6FF">(buyer)</text>
<text x="950" y="140" class="table-cell">Own asset transfer</text>
<text x="950" y="152" class="table-cell">+ counterparty output</text>
<text x="1080" y="140" class="table-cell" fill="#ef4444">Other clients'</text>
<text x="1080" y="152" class="table-cell" fill="#ef4444">contracts</text>
<line x1="878" y1="160" x2="1172" y2="160" stroke="#334155" stroke-width="0.3"/>
<!-- Bob -->
<text x="886" y="176" class="table-role" fill="#FFA500">Bob</text>
<text x="886" y="188" class="table-role" fill="#FFA500">(seller)</text>
<text x="950" y="176" class="table-cell">Own asset transfer</text>
<text x="950" y="188" class="table-cell">+ counterparty output</text>
<text x="1080" y="176" class="table-cell" fill="#ef4444">Alice's internal</text>
<text x="1080" y="188" class="table-cell" fill="#ef4444">details</text>
<line x1="878" y1="196" x2="1172" y2="196" stroke="#334155" stroke-width="0.3"/>
<!-- Bank 1 -->
<text x="886" y="212" class="table-role" fill="#00D395">Bank 1</text>
<text x="886" y="224" class="table-role" fill="#00D395">(issuer)</text>
<text x="950" y="212" class="table-cell">Transfer projection</text>
<text x="950" y="224" class="table-cell">of self-issued assets</text>
<text x="1080" y="212" class="table-cell" fill="#ef4444">Transaction reason,</text>
<text x="1080" y="224" class="table-cell" fill="#ef4444">counterparty details</text>
<line x1="878" y1="232" x2="1172" y2="232" stroke="#334155" stroke-width="0.3"/>
<!-- Regulator -->
<text x="886" y="248" class="table-role" fill="#8C8DFC">Regulator</text>
<text x="950" y="248" class="table-cell">Contracts explicitly</text>
<text x="950" y="260" class="table-cell">set as Observer</text>
<text x="1080" y="248" class="table-cell" fill="#ef4444">Unauthorized</text>
<text x="1080" y="260" class="table-cell" fill="#ef4444">transactions</text>

<!-- ========== KEY PRIVACY GUARANTEES (right bottom) ========== -->
<rect x="870" y="365" width="310" height="225" rx="6" fill="#0f172a" stroke="#00D395" stroke-width="1" stroke-opacity="0.6"/>
<text x="886" y="387" font-size="12" font-weight="700" fill="#00D395">Key Privacy Guarantees</text>
<!-- 1 -->
<text x="886" y="409" font-size="11" font-weight="700" fill="#00D395">1.</text>
<text x="905" y="409" font-size="10" fill="#e2e8f0">Each Participant maintains only</text>
<text x="905" y="423" font-size="10" fill="#94a3b8">contract projections for its Party</text>
<!-- 2 -->
<text x="886" y="457" font-size="11" font-weight="700" fill="#00D395">2.</text>
<text x="905" y="457" font-size="10" fill="#e2e8f0">Sequencer orders encrypted msgs</text>
<text x="905" y="471" font-size="10" fill="#94a3b8">but CANNOT read plaintext</text>
<!-- 3 -->
<text x="886" y="505" font-size="11" font-weight="700" fill="#00D395">3.</text>
<text x="905" y="505" font-size="10" fill="#e2e8f0">Mediator aggregates confirmations</text>
<text x="905" y="519" font-size="10" fill="#94a3b8">but CANNOT see contract content</text>
<!-- 4 -->
<text x="886" y="553" font-size="11" font-weight="700" fill="#00D395">4.</text>
<text x="905" y="553" font-size="10" fill="#e2e8f0">No global state viewable by</text>
<text x="905" y="567" font-size="10" fill="#94a3b8">any single network entity</text>

<!-- LEGEND -->
<rect x="60" y="610" width="780" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
<rect x="80" y="624" width="12" height="12" rx="2" fill="#4DA6FF" fill-opacity="0.3" stroke="#4DA6FF" stroke-width="1"/>
<text x="98" y="634" class="legend-text">Participant A (Alice Bank)</text>
<rect x="280" y="624" width="12" height="12" rx="2" fill="#FFA500" fill-opacity="0.3" stroke="#FFA500" stroke-width="1"/>
<text x="298" y="634" class="legend-text">Participant B (Bob Fund)</text>
<rect x="480" y="624" width="12" height="12" rx="2" fill="#8C8DFC" fill-opacity="0.3" stroke="#8C8DFC" stroke-width="1"/>
<text x="498" y="634" class="legend-text">Participant C (Regulator)</text>
<rect x="680" y="624" width="12" height="12" rx="2" fill="#00D395" fill-opacity="0.3" stroke="#00D395" stroke-width="1"/>
<text x="698" y="634" class="legend-text">Synchronizer / Global</text>

</svg>