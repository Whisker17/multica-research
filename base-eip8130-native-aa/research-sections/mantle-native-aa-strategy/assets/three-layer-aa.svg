<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.title { font-size: 22px; font-weight: 700; fill: #111827; }
.subtitle { font-size: 12px; fill: #6b7280; }
.layer { font-size: 12px; font-weight: 700; fill: #374151; letter-spacing: .04em; }
</style>
<defs>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600" y="36" text-anchor="middle" class="title">Three-Layer AA Comparison for Mantle</text>
<text x="600" y="58" text-anchor="middle" class="subtitle">4337: application infrastructure | 7702: EOA enhancement | 8130: protocol-native account and payer semantics</text>
<rect x="60" y="100" width="1080" height="170" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.3" stroke-dasharray="8,5" fill-opacity="0.36"/>
<text x="78" y="126" class="layer">APPLICATION / INFRASTRUCTURE AA</text>
<rect x="60" y="310" width="1080" height="150" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.3" stroke-dasharray="8,5" fill-opacity="0.36"/>
<text x="78" y="336" class="layer">EOA ENHANCEMENT</text>
<rect x="60" y="500" width="1080" height="180" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.3" stroke-dasharray="8,5" fill-opacity="0.36"/>
<text x="78" y="526" class="layer">PROTOCOL-NATIVE AA</text>
<rect x="105" y="145" width="190" height="84" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="200.0" y="173" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">UserOperation</text>
<text x="200.0" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">wallet signs request</text>
<text x="200.0" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">not a native tx</text>
<rect x="350" y="145" width="190" height="84" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="445.0" y="173" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Bundler / alt mempool</text>
<text x="445.0" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">simulate + package</text>
<text x="445.0" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">infra admission</text>
<rect x="595" y="145" width="190" height="84" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="690.0" y="173" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">EntryPoint</text>
<text x="690.0" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">validateUserOp</text>
<text x="690.0" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">paymaster hooks</text>
<rect x="840" y="145" width="240" height="84" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="960.0" y="173" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Bundle transaction</text>
<text x="960.0" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">protocol sees outer tx</text>
<text x="960.0" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">AA logic inside call</text>
<rect x="115" y="355" width="230" height="82" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="230.0" y="383" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Type 0x04 transaction</text>
<text x="230.0" y="405" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">EOA authorization list</text>
<text x="230.0" y="420" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">normal txpool path</text>
<rect x="480" y="355" width="230" height="82" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="595.0" y="383" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Delegation code</text>
<text x="595.0" y="405" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">same EOA address</text>
<text x="595.0" y="420" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">ECDSA root remains</text>
<rect x="845" y="355" width="230" height="82" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="960.0" y="383" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Delegate wallet logic</text>
<text x="960.0" y="405" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">batch / sponsor policy</text>
<text x="960.0" y="420" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">no native account cfg</text>
<rect x="95" y="555" width="210" height="86" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
<text x="200.0" y="583" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">AA typed tx</text>
<text x="200.0" y="605" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">sender_auth + payer_auth</text>
<text x="200.0" y="620" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">account_changes + calls</text>
<rect x="355" y="555" width="210" height="86" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
<text x="460.0" y="583" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Txpool / sequencer</text>
<text x="460.0" y="605" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">structural admission</text>
<text x="460.0" y="620" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">native nonce / payer fields</text>
<rect x="615" y="555" width="220" height="86" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
<text x="725.0" y="583" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">AccountConfiguration</text>
<text x="725.0" y="605" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">actor + authenticator</text>
<text x="725.0" y="620" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">scope + policy</text>
<rect x="890" y="555" width="220" height="86" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
<text x="1000.0" y="583" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Execution + receipts</text>
<text x="1000.0" y="605" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">phased calls</text>
<text x="1000.0" y="620" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">RPC-visible outcome</text>
<line x1="295" y1="187" x2="350" y2="187" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<line x1="540" y1="187" x2="595" y2="187" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<line x1="785" y1="187" x2="840" y2="187" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<line x1="345" y1="396" x2="480" y2="396" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<line x1="710" y1="396" x2="845" y2="396" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<line x1="305" y1="598" x2="355" y2="598" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
<line x1="565" y1="598" x2="615" y2="598" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
<line x1="835" y1="598" x2="890" y2="598" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
<rect x="72" y="245" width="320" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
<text x="232.0" y="272" text-anchor="middle" font-size="12" fill="#374151" font-weight="400">4337 strength: mature ecosystem, no hardfork</text>
<rect x="432" y="245" width="320" height="44" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
<text x="592.0" y="272" text-anchor="middle" font-size="12" fill="#374151" font-weight="400">7702 strength: original EOA address bridge</text>
<rect x="792" y="245" width="320" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2"/>
<text x="952.0" y="272" text-anchor="middle" font-size="12" fill="#374151" font-weight="400">8130 strength: native payer + bounded admission</text>
<text x="600" y="486" text-anchor="middle" font-size="12" fill="#6b7280">deeper protocol visibility generally means higher client / fork cost</text>
<g transform="translate(95,700)">
<line x1="0" y1="8" x2="34" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="44" y="12" font-size="12" fill="#6b7280">4337 UserOp path</text>
<line x1="310" y1="8" x2="344" y2="8" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<text x="354" y="12" font-size="12" fill="#6b7280">7702 delegation path</text>
<line x1="620" y1="8" x2="654" y2="8" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
<text x="664" y="12" font-size="12" fill="#6b7280">8130 native tx path</text>
</g></svg>