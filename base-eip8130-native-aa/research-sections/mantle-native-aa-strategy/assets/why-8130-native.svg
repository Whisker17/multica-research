<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.title { font-size: 22px; font-weight: 700; fill: #111827; }
.subtitle { font-size: 12px; fill: #6b7280; }
.layer { font-size: 12px; font-weight: 700; fill: #374151; letter-spacing: .04em; }
</style>
<defs>
  <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
</defs>
<rect width="1200" height="760" fill="#ffffff"/>
<text x="600" y="36" text-anchor="middle" class="title">Why EIP-8130 Is Native AA</text>
<text x="600" y="58" text-anchor="middle" class="subtitle">Typed transaction fields expose account validation, payer, nonce, configuration, batched execution, and receipt outcomes to the client pipeline</text>
<rect x="65" y="130" width="185" height="116" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
<text x="157.5" y="158" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">AA typed tx</text>
<text x="157.5" y="180" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">sender_auth</text>
<text x="157.5" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">payer_auth</text>
<text x="157.5" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">account_changes</text>
<text x="157.5" y="225" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">phased calls</text>
<rect x="300" y="130" width="185" height="116" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="392.5" y="158" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Txpool / sequencer</text>
<text x="392.5" y="180" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">sees payer / nonce</text>
<text x="392.5" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">bounded auth surface</text>
<text x="392.5" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">admission caps</text>
<rect x="535" y="130" width="205" height="116" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
<text x="637.5" y="158" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">AccountConfiguration</text>
<text x="637.5" y="180" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">actors + scopes</text>
<text x="637.5" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">authenticator set</text>
<text x="637.5" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">config changes</text>
<rect x="790" y="130" width="205" height="116" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text x="892.5" y="158" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Execution pipeline</text>
<text x="892.5" y="180" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">payer settlement</text>
<text x="892.5" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">phase atomicity</text>
<text x="892.5" y="210" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">state updates</text>
<rect x="1045" y="130" width="110" height="116" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
<text x="1100.0" y="158" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Receipt / RPC</text>
<text x="1100.0" y="180" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">phase status</text>
<text x="1100.0" y="195" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">AA tx fields</text>
<line x1="250" y1="188" x2="300" y2="188" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrow-red)"/>
<line x1="485" y1="188" x2="535" y2="188" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrow-red)"/>
<line x1="740" y1="188" x2="790" y2="188" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrow-red)"/>
<line x1="995" y1="188" x2="1045" y2="188" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrow-red)"/>
<rect x="90" y="325" width="465" height="155" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.3" stroke-dasharray="8,5" fill-opacity="0.28"/>
<text x="110" y="351" class="layer">ERC-4337 SIDE LANE</text>
<rect x="125" y="390" width="160" height="62" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="205.0" y="418" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">UserOperation</text>
<text x="205.0" y="440" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">bundler + EntryPoint</text>
<rect x="360" y="390" width="160" height="62" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
<text x="440.0" y="418" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Bundle tx</text>
<text x="440.0" y="440" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">protocol sees outer tx</text>
<line x1="285" y1="421" x2="360" y2="421" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<rect x="165" y="283" width="315" height="34" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
<text x="322" y="305" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="400">Validation remains mostly off-protocol until EntryPoint execution</text>
<rect x="645" y="325" width="465" height="155" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.3" stroke-dasharray="8,5" fill-opacity="0.30"/>
<text x="665" y="351" class="layer">EIP-7702 SIDE LANE</text>
<rect x="685" y="390" width="160" height="62" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="765.0" y="418" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Type 0x04</text>
<text x="765.0" y="440" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">EOA set-code</text>
<rect x="920" y="390" width="160" height="62" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
<text x="1000.0" y="418" text-anchor="middle" font-size="14" fill="#111827" font-weight="700">Delegate wallet</text>
<text x="1000.0" y="440" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">policy in code</text>
<line x1="845" y1="421" x2="920" y2="421" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<rect x="700" y="283" width="345" height="34" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
<text x="872" y="305" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="400">Delegation is native; account lifecycle remains in wallet code</text>
<text x="70" y="558" class="layer">WHAT BECOMES PROTOCOL-VISIBLE IN 8130</text>
<rect x="80" y="590" width="155" height="70" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.2"/>
<text x="157.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Validation</text>
<text x="157.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">sender_auth + authenticator</text>
<rect x="260" y="590" width="155" height="70" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2"/>
<text x="337.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Sponsorship</text>
<text x="337.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">payer + payer_auth</text>
<rect x="440" y="590" width="155" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
<text x="517.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Replay control</text>
<text x="517.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">2D nonce + expiry</text>
<rect x="620" y="590" width="155" height="70" rx="8" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.2"/>
<text x="697.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Configuration</text>
<text x="697.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">account changes</text>
<rect x="800" y="590" width="155" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
<text x="877.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Batching</text>
<text x="877.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">phased calls</text>
<rect x="980" y="590" width="155" height="70" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
<text x="1057.5" y="618" text-anchor="middle" font-size="13" fill="#111827" font-weight="700">Observability</text>
<text x="1057.5" y="639" text-anchor="middle" font-size="11" fill="#4b5563" font-weight="400">AA receipt + RPC</text>
<g transform="translate(120,715)">
<line x1="0" y1="8" x2="34" y2="8" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
<text x="44" y="12" font-size="12" fill="#6b7280">8130 native path</text>
<line x1="310" y1="8" x2="344" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
<text x="354" y="12" font-size="12" fill="#6b7280">4337 side lane</text>
<line x1="620" y1="8" x2="654" y2="8" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
<text x="664" y="12" font-size="12" fill="#6b7280">7702 side lane</text>
</g></svg>