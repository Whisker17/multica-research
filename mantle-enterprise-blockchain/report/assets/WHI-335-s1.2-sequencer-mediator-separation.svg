<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1"/>
    </linearGradient>
    <!-- Blue accent gradient for Sequencer -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1"/>
    </linearGradient>
    <!-- Teal accent gradient for Mediator -->
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14B8A6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1"/>
    </linearGradient>
    <!-- Amber gradient for bottom callout -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <!-- Lighter shadow for inner cards -->
    <filter id="innerShadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.12"/>
    </filter>
    <!-- Sync container shadow -->
    <filter id="syncShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#6366F1" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════════ -->
  <rect width="1000" height="620" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <text x="500" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B" letter-spacing="0.3">WHI-335 §1.2 — Sequencer-Mediator Role Separation</text>
  <text x="500" y="57" text-anchor="middle" font-size="10.5" font-weight="600" fill="#94A3B8" letter-spacing="2.5">FLAT ICON STYLE · LEAST PRIVILEGE DESIGN</text>

  <!-- Decorative header underline -->
  <rect x="380" y="63" width="240" height="2" rx="1" fill="url(#blueGrad)" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════
       SYNCHRONIZER CONTAINER (dashed border)
  ═══════════════════════════════════════════ -->
  <rect x="28" y="76" width="944" height="414" rx="18" fill="white" fill-opacity="0.55" stroke="#6366F1" stroke-width="2" stroke-dasharray="10 5" filter="url(#syncShadow)"/>

  <!-- Synchronizer label badge -->
  <rect x="400" y="67" width="200" height="22" rx="11" fill="#6366F1"/>
  <text x="500" y="82.5" text-anchor="middle" font-size="11" font-weight="700" fill="white" letter-spacing="1.5">SYNCHRONIZER</text>

  <!-- ═══════════════════════════════════════════
       LEFT CARD — SEQUENCER
  ═══════════════════════════════════════════ -->
  <!-- Card background -->
  <rect x="50" y="96" width="418" height="380" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Blue accent bar -->
  <rect x="50" y="96" width="418" height="6" rx="14" fill="url(#blueGrad)"/>
  <rect x="50" y="102" width="418" height="6" fill="url(#blueGrad)"/>

  <!-- Sequencer header -->
  <text x="259" y="136" text-anchor="middle" font-size="26" dominant-baseline="middle">📡</text>
  <text x="259" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Sequencer</text>
  <text x="259" y="175" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6366F1" letter-spacing="1">ORDER &amp; DELIVER</text>

  <!-- Divider -->
  <line x1="74" y1="185" x2="444" y2="185" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- KNOWS section -->
  <rect x="66" y="193" width="402" height="22" rx="6" fill="#EFF6FF"/>
  <text x="80" y="208" font-size="11" font-weight="700" fill="#3B82F6" letter-spacing="0.8">✓  KNOWS</text>

  <!-- Know items for Sequencer -->
  <!-- Item 1: Encrypted blobs -->
  <rect x="72" y="220" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="88" y="229" font-size="12.5" font-weight="600" fill="#334155">Encrypted blobs</text>
  <text x="88" y="244" font-size="11" fill="#64748B">Raw ciphertext envelopes — content opaque</text>

  <!-- Item 2: Recipient lists -->
  <rect x="72" y="254" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="88" y="263" font-size="12.5" font-weight="600" fill="#334155">Recipient lists</text>
  <text x="88" y="278" font-size="11" fill="#64748B">Which participant nodes receive each message</text>

  <!-- Item 3: Timestamps -->
  <rect x="72" y="288" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="88" y="297" font-size="12.5" font-weight="600" fill="#334155">Timestamps</text>
  <text x="88" y="312" font-size="11" fill="#64748B">Global ordering and sequencing time</text>

  <!-- Item 4: Message sizes -->
  <rect x="72" y="322" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="88" y="331" font-size="12.5" font-weight="600" fill="#334155">Message sizes</text>
  <text x="88" y="346" font-size="11" fill="#64748B">Byte-length metadata only</text>

  <!-- Divider -->
  <line x1="74" y1="356" x2="444" y2="356" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- DOES NOT KNOW section -->
  <rect x="66" y="362" width="402" height="22" rx="6" fill="#FFF1F2"/>
  <text x="80" y="377" font-size="11" font-weight="700" fill="#F43F5E" letter-spacing="0.8">✗  DOES NOT KNOW</text>

  <!-- Not-know items for Sequencer -->
  <text x="80" y="398" font-size="12" fill="#9CA3AF">
    <tspan font-size="11" fill="#E11D48">✗ </tspan>Transaction content
    <tspan dx="12" font-size="11" fill="#E11D48">✗ </tspan>Contract state
  </text>
  <text x="80" y="418" font-size="12" fill="#9CA3AF">
    <tspan font-size="11" fill="#E11D48">✗ </tspan>Business logic
    <tspan dx="12" font-size="11" fill="#E11D48">✗ </tspan>Who sent the message
  </text>
  <!-- Sequencer not-know as pills -->
  <rect x="72" y="387" width="134" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="139" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Transaction content</text>

  <rect x="214" y="387" width="110" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="269" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Contract state</text>

  <rect x="332" y="387" width="100" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="382" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Business logic</text>

  <rect x="72" y="414" width="176" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="160" y="428" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Who sent the message</text>

  <!-- ═══════════════════════════════════════════
       MIDDLE DIVIDER / SEPARATION ARROW
  ═══════════════════════════════════════════ -->
  <!-- Vertical separator line -->
  <line x1="500" y1="106" x2="500" y2="468" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Separation badge in the middle -->
  <rect x="451" y="270" width="98" height="46" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5" filter="url(#innerShadow)"/>
  <text x="500" y="290" text-anchor="middle" font-size="16">🔒</text>
  <text x="500" y="308" text-anchor="middle" font-size="9" font-weight="700" fill="#6366F1" letter-spacing="0.8">ISOLATED</text>

  <!-- Arrows pointing away from center -->
  <polygon points="447,290 437,285 437,295" fill="#6366F1" opacity="0.5"/>
  <polygon points="553,290 563,285 563,295" fill="#14B8A6" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════
       RIGHT CARD — MEDIATOR
  ═══════════════════════════════════════════ -->
  <!-- Card background -->
  <rect x="532" y="96" width="418" height="380" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Teal accent bar -->
  <rect x="532" y="96" width="418" height="6" rx="14" fill="url(#tealGrad)"/>
  <rect x="532" y="102" width="418" height="6" fill="url(#tealGrad)"/>

  <!-- Mediator header -->
  <text x="741" y="136" text-anchor="middle" font-size="26" dominant-baseline="middle">⚖️</text>
  <text x="741" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">Mediator</text>
  <text x="741" y="175" text-anchor="middle" font-size="10.5" font-weight="500" fill="#14B8A6" letter-spacing="1">CONFIRM &amp; DECIDE</text>

  <!-- Divider -->
  <line x1="556" y1="185" x2="926" y2="185" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- KNOWS section -->
  <rect x="548" y="193" width="402" height="22" rx="6" fill="#F0FDFA"/>
  <text x="562" y="208" font-size="11" font-weight="700" fill="#14B8A6" letter-spacing="0.8">✓  KNOWS</text>

  <!-- Know items for Mediator -->
  <!-- Item 1 -->
  <rect x="554" y="220" width="8" height="8" rx="2" fill="#14B8A6"/>
  <text x="570" y="229" font-size="12.5" font-weight="600" fill="#334155">Which Participants need to confirm</text>
  <text x="570" y="244" font-size="11" fill="#64748B">Set of stakeholder nodes required for consensus</text>

  <!-- Item 2 -->
  <rect x="554" y="254" width="8" height="8" rx="2" fill="#14B8A6"/>
  <text x="570" y="263" font-size="12.5" font-weight="600" fill="#334155">Confirm / Reject signals</text>
  <text x="570" y="278" font-size="11" fill="#64748B">Boolean approvals from each participant</text>

  <!-- Item 3 -->
  <rect x="554" y="288" width="8" height="8" rx="2" fill="#14B8A6"/>
  <text x="570" y="297" font-size="12.5" font-weight="600" fill="#334155">Decision deadline</text>
  <text x="570" y="312" font-size="11" fill="#64748B">Timeout window for confirmation collection</text>

  <!-- Spacer row (mediator has one fewer "knows" item) -->
  <rect x="554" y="322" width="8" height="8" rx="2" fill="#14B8A6" opacity="0.2"/>
  <text x="570" y="331" font-size="12.5" font-weight="500" fill="#CBD5E1" font-style="italic">Transaction ID reference (opaque handle)</text>

  <!-- Divider -->
  <line x1="556" y1="356" x2="926" y2="356" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- DOES NOT KNOW section -->
  <rect x="548" y="362" width="402" height="22" rx="6" fill="#FFF1F2"/>
  <text x="562" y="377" font-size="11" font-weight="700" fill="#F43F5E" letter-spacing="0.8">✗  DOES NOT KNOW</text>

  <!-- Not-know pills for Mediator -->
  <rect x="554" y="387" width="134" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="621" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Transaction content</text>

  <rect x="696" y="387" width="110" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="751" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Contract state</text>

  <rect x="814" y="387" width="100" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="864" y="401" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Business logic</text>

  <rect x="554" y="414" width="240" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="674" y="428" text-anchor="middle" font-size="10.5" fill="#E11D48" font-weight="500">Why Participants confirmed / rejected</text>

  <!-- ═══════════════════════════════════════════
       BOTTOM AMBER CALLOUT — Separation Guarantees
  ═══════════════════════════════════════════ -->
  <rect x="28" y="500" width="944" height="108" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Amber left accent stripe -->
  <rect x="28" y="500" width="6" height="108" rx="14" fill="url(#amberGrad)"/>
  <rect x="28" y="500" width="6" height="94" fill="url(#amberGrad)"/>

  <!-- Amber header badge -->
  <rect x="44" y="510" width="230" height="22" rx="6" fill="#FEF3C7"/>
  <text x="50" y="525.5" font-size="11" font-weight="700" fill="#D97706" letter-spacing="0.8">🛡️  SEPARATION GUARANTEES</text>

  <!-- Four guarantees in a 2×2 grid -->
  <!-- Row 1 -->
  <circle cx="58" cy="549" r="9" fill="#F59E0B"/>
  <text x="58" y="553.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">1</text>
  <text x="74" y="553.5" font-size="11.5" font-weight="600" fill="#334155">No single component sees full transaction</text>

  <circle cx="516" cy="549" r="9" fill="#F59E0B"/>
  <text x="516" y="553.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">2</text>
  <text x="532" y="553.5" font-size="11.5" font-weight="600" fill="#334155">Sequencer compromise ≠ content leak</text>

  <!-- Row 2 -->
  <circle cx="58" cy="578" r="9" fill="#FBBF24"/>
  <text x="58" y="582.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">3</text>
  <text x="74" y="582.5" font-size="11.5" font-weight="600" fill="#334155">Mediator compromise ≠ message ordering manipulation</text>

  <circle cx="516" cy="578" r="9" fill="#FBBF24"/>
  <text x="516" y="582.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">4</text>
  <text x="532" y="582.5" font-size="11.5" font-weight="600" fill="#334155">Each can be independently scaled / decentralized</text>

  <!-- Subtle vertical divider in callout -->
  <line x1="503" y1="516" x2="503" y2="592" stroke="#FDE68A" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════
       FOOTER ATTRIBUTION
  ═══════════════════════════════════════════ -->
  <text x="500" y="613" text-anchor="middle" font-size="9.5" fill="#CBD5E1" letter-spacing="0.5">Canton Synchronizer · Least-Privilege Design Pattern · WHI-335 §1.2</text>
</svg>
