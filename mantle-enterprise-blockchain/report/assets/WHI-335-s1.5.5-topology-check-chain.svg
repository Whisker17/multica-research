<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="800" height="750" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Pill drop shadow -->
    <filter id="pillShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#64748B" flood-opacity="0.22"/>
    </filter>

    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-10%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#DC2626" flood-opacity="0.20"/>
    </filter>

    <!-- Arrow marker — dark gray -->
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M2,2 L5,9 L8,2" fill="none" stroke="#64748B" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>

    <!-- Arrow marker — red (NO branches) -->
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M2,2 L5,9 L8,2" fill="none" stroke="#EF4444" stroke-width="1.6" stroke-linejoin="round"/>
    </marker>

    <!-- Green arrow marker -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="9" orient="auto">
      <path d="M2,2 L5,9 L8,2" fill="none" stroke="#22C55E" stroke-width="1.8" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════════ -->
  <rect width="800" height="750" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════
       TITLE BLOCK
  ═══════════════════════════════════════════ -->
  <rect x="40" y="18" width="720" height="54" rx="12" fill="white" filter="url(#cardShadow)"/>
  <rect x="40" y="18" width="6" height="54" rx="3" fill="#3B82F6"/>
  <text x="400" y="40" text-anchor="middle" font-size="12" fill="#94A3B8" font-weight="500" letter-spacing="0.5">WHI-335 §1.5.5</text>
  <text x="400" y="60" text-anchor="middle" font-size="15" fill="#1E293B" font-weight="700">交易提交前的拓扑检查链</text>

  <!-- ═══════════════════════════════════════════
       START NODE — dark pill [交易 TX]
  ═══════════════════════════════════════════ -->
  <rect x="284" y="90" width="232" height="40" rx="20" fill="#1E293B" filter="url(#pillShadow)"/>
  <text x="400" y="107" text-anchor="middle" font-size="12" fill="#94A3B8" font-weight="500">START</text>
  <text x="400" y="122" text-anchor="middle" font-size="13" fill="white" font-weight="600">📄 交易 TX</text>

  <!-- Arrow: Start → Step 1 -->
  <line x1="400" y1="130" x2="400" y2="148" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ═══════════════════════════════════════════
       STEP 1 — Blue accent
  ═══════════════════════════════════════════ -->
  <rect x="100" y="150" width="440" height="72" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="100" y="150" width="6" height="72" rx="3" fill="#3B82F6"/>
  <text x="126" y="172" font-size="10.5" fill="#3B82F6" font-weight="600" letter-spacing="0.3">CHECK 1 · 提交者权限</text>
  <text x="126" y="191" font-size="12" fill="#1E293B" font-weight="500">提交者 Party 是否有 Submission 权限的</text>
  <text x="126" y="208" font-size="12" fill="#1E293B" font-weight="500">Participant？</text>

  <!-- NO badge right of Step 1 -->
  <!-- Horizontal arrow from right edge of card -->
  <line x1="540" y1="186" x2="598" y2="186" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <rect x="600" y="167" width="165" height="38" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2" filter="url(#badgeShadow)"/>
  <text x="609" y="183" font-size="10" fill="#DC2626" font-weight="700">NO →</text>
  <text x="609" y="197" font-size="10" fill="#DC2626" font-weight="500">交易无法提交</text>

  <!-- YES label + arrow down -->
  <line x1="400" y1="222" x2="400" y2="248" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="374" y="224" width="52" height="18" rx="9" fill="#DCFCE7"/>
  <text x="400" y="237" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">YES ✓</text>

  <!-- ═══════════════════════════════════════════
       STEP 2 — Indigo accent
  ═══════════════════════════════════════════ -->
  <rect x="100" y="250" width="440" height="86" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="100" y="250" width="6" height="86" rx="3" fill="#6366F1"/>
  <text x="126" y="272" font-size="10.5" fill="#6366F1" font-weight="600" letter-spacing="0.3">CHECK 2 · Synchronizer 确认权限</text>
  <text x="126" y="291" font-size="12" fill="#1E293B" font-weight="500">所有 Signatory Parties 的 Participant 是否在</text>
  <text x="126" y="307" font-size="12" fill="#1E293B" font-weight="500">目标 Synchronizer 上有 Confirmation 权限？</text>
  <text x="126" y="323" font-size="11" fill="#6366F1" font-weight="400" font-style="italic">（Confirming Participants 集合验证）</text>

  <!-- NO badge right of Step 2 -->
  <line x1="540" y1="293" x2="598" y2="293" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <rect x="600" y="268" width="165" height="50" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2" filter="url(#badgeShadow)"/>
  <text x="609" y="285" font-size="10" fill="#DC2626" font-weight="700">NO →</text>
  <text x="609" y="300" font-size="10" fill="#DC2626" font-weight="500">交易无法在此</text>
  <text x="609" y="313" font-size="10" fill="#DC2626" font-weight="500">Synchronizer 确认</text>

  <!-- YES arrow down -->
  <line x1="400" y1="336" x2="400" y2="360" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="374" y="338" width="52" height="18" rx="9" fill="#DCFCE7"/>
  <text x="400" y="351" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">YES ✓</text>

  <!-- ═══════════════════════════════════════════
       STEP 3 — Teal accent
  ═══════════════════════════════════════════ -->
  <rect x="100" y="362" width="440" height="86" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="100" y="362" width="6" height="86" rx="3" fill="#14B8A6"/>
  <text x="126" y="384" font-size="10.5" fill="#14B8A6" font-weight="600" letter-spacing="0.3">CHECK 3 · VettedPackages 验证</text>
  <text x="126" y="403" font-size="12" fill="#1E293B" font-weight="500">交易涉及的 Daml packages 是否被所有</text>
  <text x="126" y="419" font-size="12" fill="#1E293B" font-weight="500">Confirming Participants 的 VettedPackages</text>
  <text x="126" y="435" font-size="12" fill="#1E293B" font-weight="500">列表包含？</text>

  <!-- NO badge right of Step 3 -->
  <line x1="540" y1="405" x2="598" y2="405" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <rect x="600" y="380" width="165" height="50" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2" filter="url(#badgeShadow)"/>
  <text x="609" y="397" font-size="10" fill="#DC2626" font-weight="700">NO →</text>
  <text x="609" y="412" font-size="10" fill="#DC2626" font-weight="500">Participant 拒绝确认</text>
  <text x="609" y="425" font-size="10" fill="#DC2626" font-weight="400" font-style="italic">（package 未审核）</text>

  <!-- YES arrow down -->
  <line x1="400" y1="448" x2="400" y2="472" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="374" y="450" width="52" height="18" rx="9" fill="#DCFCE7"/>
  <text x="400" y="463" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">YES ✓</text>

  <!-- ═══════════════════════════════════════════
       STEP 4 — Amber accent
  ═══════════════════════════════════════════ -->
  <rect x="100" y="474" width="440" height="86" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="100" y="474" width="6" height="86" rx="3" fill="#F59E0B"/>
  <text x="126" y="496" font-size="10.5" fill="#F59E0B" font-weight="600" letter-spacing="0.3">CHECK 4 · 签名密钥链完整性</text>
  <text x="126" y="515" font-size="12" fill="#1E293B" font-weight="500">签名方密钥链是否从签名密钥到根命名空间</text>
  <text x="126" y="531" font-size="12" fill="#1E293B" font-weight="500">密钥完整无断裂？</text>
  <text x="126" y="547" font-size="11" fill="#F59E0B" font-weight="400" font-style="italic">（Namespace Delegation 链验证）</text>

  <!-- NO badge right of Step 4 -->
  <line x1="540" y1="517" x2="598" y2="517" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <rect x="600" y="492" width="165" height="50" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2" filter="url(#badgeShadow)"/>
  <text x="609" y="509" font-size="10" fill="#DC2626" font-weight="700">NO →</text>
  <text x="609" y="524" font-size="10" fill="#DC2626" font-weight="500">签名验证失败</text>
  <text x="609" y="537" font-size="10" fill="#DC2626" font-weight="400" font-style="italic">（密钥链断裂）</text>

  <!-- YES arrow down -->
  <line x1="400" y1="560" x2="400" y2="584" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="374" y="562" width="52" height="18" rx="9" fill="#DCFCE7"/>
  <text x="400" y="575" text-anchor="middle" font-size="10" fill="#16A34A" font-weight="700">YES ✓</text>

  <!-- ═══════════════════════════════════════════
       END NODE — green pill
  ═══════════════════════════════════════════ -->
  <rect x="220" y="588" width="360" height="50" rx="25" fill="#16A34A" filter="url(#pillShadow)"/>
  <!-- Subtle inner highlight -->
  <rect x="220" y="588" width="360" height="25" rx="25" fill="white" opacity="0.08"/>
  <text x="400" y="608" text-anchor="middle" font-size="11" fill="#BBF7D0" font-weight="500">ALL CHECKS PASSED</text>
  <text x="400" y="627" text-anchor="middle" font-size="13.5" fill="white" font-weight="700">✅ 交易可以被路由和确认</text>

  <!-- ═══════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════ -->
  <rect x="100" y="658" width="600" height="72" rx="12" fill="white" opacity="0.75" filter="url(#cardShadow)"/>
  <text x="400" y="676" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="600" letter-spacing="0.5">LEGEND</text>

  <!-- Legend items -->
  <!-- Blue -->
  <rect x="118" y="684" width="10" height="10" rx="2" fill="#3B82F6"/>
  <text x="133" y="694" font-size="10" fill="#475569">CHECK 1: 提交权限</text>
  <!-- Indigo -->
  <rect x="118" y="700" width="10" height="10" rx="2" fill="#6366F1"/>
  <text x="133" y="710" font-size="10" fill="#475569">CHECK 2: Synchronizer 确认权</text>

  <!-- Teal -->
  <rect x="300" y="684" width="10" height="10" rx="2" fill="#14B8A6"/>
  <text x="315" y="694" font-size="10" fill="#475569">CHECK 3: VettedPackages</text>
  <!-- Amber -->
  <rect x="300" y="700" width="10" height="10" rx="2" fill="#F59E0B"/>
  <text x="315" y="710" font-size="10" fill="#475569">CHECK 4: 密钥链完整性</text>

  <!-- Arrow legend -->
  <line x1="498" y1="689" x2="520" y2="689" stroke="#22C55E" stroke-width="2"/>
  <text x="525" y="693" font-size="10" fill="#475569">YES / 通过</text>
  <line x1="498" y1="705" x2="520" y2="705" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="525" y="709" font-size="10" fill="#475569">NO / 拒绝</text>
</svg>
