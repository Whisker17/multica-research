<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Soft glow for center card -->
    <filter id="centerShadow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#6366F1" flood-opacity="0.14"/>
    </filter>

    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>

    <!-- Panel gradient: green -->
    <linearGradient id="greenPanelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>

    <!-- Panel gradient: red -->
    <linearGradient id="redPanelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="100%" stop-color="#FFE4E6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1" fill="#CBD5E1" opacity="0.4"/>
  </pattern>
  <rect width="900" height="550" fill="url(#dots)"/>

  <!-- ─────────────── TITLE BAR ─────────────── -->
  <rect x="30" y="20" width="840" height="48" rx="12" fill="#1E293B" filter="url(#cardShadow)"/>
  <!-- Indigo accent stripe -->
  <rect x="30" y="20" width="6" height="48" rx="3" fill="#6366F1"/>
  <text x="54" y="50" font-size="14" font-weight="700" fill="#F8FAFC" letter-spacing="0.3">WHI-335 §2.2</text>
  <text x="148" y="50" font-size="14" font-weight="400" fill="#94A3B8">加密承诺方案 — Sequencer 接收的信息</text>

  <!-- Separator dot -->
  <circle cx="137" cy="47" r="2.5" fill="#6366F1"/>

  <!-- ─────────────── LEFT PANEL: CAN infer ─────────────── -->
  <rect x="30" y="84" width="196" height="430" rx="14" fill="url(#greenPanelGrad)" filter="url(#cardShadow)"/>
  <!-- Teal accent top bar -->
  <rect x="30" y="84" width="196" height="5" rx="3" fill="#10B981"/>

  <!-- Panel header -->
  <text x="128" y="113" font-size="13" font-weight="700" fill="#064E3B" text-anchor="middle">CAN infer</text>
  <text x="128" y="129" font-size="18" text-anchor="middle">⚠️</text>
  <!-- Subtext -->
  <text x="128" y="151" font-size="10" fill="#6EE7B7" text-anchor="middle" font-weight="500">Sequencer 可推断</text>

  <!-- Divider -->
  <line x1="50" y1="160" x2="206" y2="160" stroke="#6EE7B7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Pill items: CAN infer -->
  <!-- Item 1: Number of recipients -->
  <rect x="42" y="172" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="42" y="172" width="4" height="44" rx="2" fill="#F59E0B"/>
  <text x="57" y="189" font-size="13">📬</text>
  <text x="78" y="189" font-size="10" font-weight="700" fill="#1E293B">接收方数量</text>
  <text x="78" y="203" font-size="9" fill="#64748B">Number of Recipients</text>

  <!-- Item 2: Message sizes -->
  <rect x="42" y="224" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="42" y="224" width="4" height="44" rx="2" fill="#F59E0B"/>
  <text x="57" y="241" font-size="13">📏</text>
  <text x="78" y="241" font-size="10" font-weight="700" fill="#1E293B">消息大小</text>
  <text x="78" y="255" font-size="9" fill="#64748B">Message Sizes</text>

  <!-- Item 3: Timing patterns -->
  <rect x="42" y="276" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="42" y="276" width="4" height="44" rx="2" fill="#F59E0B"/>
  <text x="57" y="293" font-size="13">⏱️</text>
  <text x="78" y="293" font-size="10" font-weight="700" fill="#1E293B">时序模式</text>
  <text x="78" y="307" font-size="9" fill="#64748B">Timing Patterns</text>

  <!-- Item 4: Communication graph -->
  <rect x="42" y="328" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="42" y="328" width="4" height="44" rx="2" fill="#F59E0B"/>
  <text x="57" y="345" font-size="13">🕸️</text>
  <text x="78" y="345" font-size="10" font-weight="700" fill="#1E293B">通信图谱</text>
  <text x="78" y="359" font-size="9" fill="#64748B">Communication Graph</text>

  <!-- Risk callout -->
  <rect x="42" y="388" width="172" height="106" rx="10" fill="#FEF3C7"/>
  <rect x="42" y="388" width="172" height="4" rx="2" fill="#F59E0B"/>
  <text x="128" y="408" font-size="11" text-anchor="middle">⚠️</text>
  <text x="128" y="423" font-size="9.5" font-weight="700" fill="#92400E" text-anchor="middle">元数据泄漏风险</text>
  <text x="128" y="439" font-size="8.5" fill="#B45309" text-anchor="middle">Traffic analysis may</text>
  <text x="128" y="452" font-size="8.5" fill="#B45309" text-anchor="middle">reveal business patterns</text>
  <text x="128" y="465" font-size="8.5" fill="#B45309" text-anchor="middle">even without content</text>
  <text x="128" y="479" font-size="8.5" fill="#B45309" text-anchor="middle">access.</text>

  <!-- ─────────────── CENTER CARD: What Sequencer Receives ─────────────── -->
  <rect x="244" y="84" width="412" height="430" rx="14" fill="white" filter="url(#centerShadow)"/>
  <!-- Indigo top accent -->
  <rect x="244" y="84" width="412" height="6" rx="3" fill="#6366F1"/>

  <!-- Center card header -->
  <text x="450" y="115" font-size="15" text-anchor="middle">📦</text>
  <text x="450" y="138" font-size="14" font-weight="800" fill="#1E293B" text-anchor="middle">What Sequencer Receives</text>
  <text x="450" y="155" font-size="9.5" fill="#6366F1" text-anchor="middle" font-weight="600">CANTON NETWORK · 加密承诺消息结构</text>

  <!-- Divider under header -->
  <line x1="264" y1="163" x2="636" y2="163" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Code block background -->
  <rect x="262" y="171" width="374" height="286" rx="10" fill="#0F172A"/>
  <!-- Code block top bar -->
  <rect x="262" y="171" width="374" height="28" rx="10" fill="#1E293B"/>
  <rect x="262" y="184" width="374" height="15" fill="#1E293B"/>
  <!-- Traffic light dots -->
  <circle cx="281" cy="185" r="5" fill="#EF4444"/>
  <circle cx="299" cy="185" r="5" fill="#F59E0B"/>
  <circle cx="317" cy="185" r="5" fill="#22C55E"/>
  <text x="340" y="190" font-size="9" fill="#64748B" font-family="'Courier New', Courier, monospace">EncryptedMessage</text>

  <!-- JSON content lines -->
  <!-- Line: { -->
  <text x="278" y="218" font-size="11" fill="#94A3B8" font-family="'Courier New', Courier, monospace">{</text>

  <!-- recipients field -->
  <text x="290" y="237" font-size="11" fill="#7DD3FC" font-family="'Courier New', Courier, monospace">"recipients":</text>
  <text x="380" y="237" font-size="11" fill="#86EFAC" font-family="'Courier New', Courier, monospace">[P1, P2, P3],</text>
  <!-- Green "plaintext" badge -->
  <rect x="490" y="225" width="60" height="16" rx="8" fill="#16A34A"/>
  <text x="520" y="237" font-size="8" fill="white" font-weight="700" text-anchor="middle">plaintext</text>

  <!-- timestamp field -->
  <text x="290" y="261" font-size="11" fill="#7DD3FC" font-family="'Courier New', Courier, monospace">"timestamp":</text>
  <text x="380" y="261" font-size="10.5" fill="#FDE68A" font-family="'Courier New', Courier, monospace">2026-05-06T..,</text>
  <!-- Blue badge -->
  <rect x="490" y="249" width="76" height="16" rx="8" fill="#2563EB"/>
  <text x="528" y="261" font-size="7.5" fill="white" font-weight="700" text-anchor="middle">assigned by Seq</text>

  <!-- payload field -->
  <text x="290" y="285" font-size="11" fill="#7DD3FC" font-family="'Courier New', Courier, monospace">"payload":</text>
  <text x="370" y="285" font-size="11" fill="#FCA5A5" font-family="'Courier New', Courier, monospace">0xAE3F...B2C1,</text>
  <!-- Red badge -->
  <rect x="490" y="273" width="80" height="16" rx="8" fill="#DC2626"/>
  <text x="530" y="285" font-size="7.5" fill="white" font-weight="700" text-anchor="middle">encrypted opaque</text>

  <!-- commitment field -->
  <text x="290" y="309" font-size="11" fill="#7DD3FC" font-family="'Courier New', Courier, monospace">"commitment":</text>
  <text x="385" y="309" font-size="10.5" fill="#FDE68A" font-family="'Courier New', Courier, monospace">SHA256(payload),</text>
  <!-- Amber badge -->
  <rect x="490" y="297" width="74" height="16" rx="8" fill="#D97706"/>
  <text x="527" y="309" font-size="7.5" fill="white" font-weight="700" text-anchor="middle">integrity check</text>

  <!-- size field -->
  <text x="290" y="333" font-size="11" fill="#7DD3FC" font-family="'Courier New', Courier, monospace">"size":</text>
  <text x="340" y="333" font-size="11" fill="#C4B5FD" font-family="'Courier New', Courier, monospace">4096 bytes</text>
  <!-- Gray badge -->
  <rect x="490" y="321" width="70" height="16" rx="8" fill="#475569"/>
  <text x="525" y="333" font-size="7.5" fill="white" font-weight="700" text-anchor="middle">traffic mgmt</text>

  <!-- Line: } -->
  <text x="278" y="353" font-size="11" fill="#94A3B8" font-family="'Courier New', Courier, monospace">}</text>

  <!-- Divider -->
  <line x1="264" y1="365" x2="636" y2="365" stroke="#1E3A5F" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Comment line -->
  <text x="290" y="381" font-size="9.5" fill="#475569" font-family="'Courier New', Courier, monospace">// Sequencer sees structure,</text>
  <text x="290" y="395" font-size="9.5" fill="#475569" font-family="'Courier New', Courier, monospace">// never content</text>
  <text x="290" y="411" font-size="9.5" fill="#475569" font-family="'Courier New', Courier, monospace">// — Daml privacy guarantee</text>

  <!-- Bottom note -->
  <rect x="262" y="468" width="374" height="30" rx="8" fill="#EEF2FF"/>
  <text x="450" y="488" font-size="9" fill="#4338CA" text-anchor="middle" font-weight="600">🔐 Canton 加密承诺协议 · Sequencer 仅作路由与排序 · 不解密 payload</text>

  <!-- ─────────────── RIGHT PANEL: CANNOT infer ─────────────── -->
  <rect x="674" y="84" width="196" height="430" rx="14" fill="url(#redPanelGrad)" filter="url(#cardShadow)"/>
  <!-- Red top accent -->
  <rect x="674" y="84" width="196" height="5" rx="3" fill="#EF4444"/>

  <!-- Panel header -->
  <text x="772" y="113" font-size="13" font-weight="700" fill="#7F1D1D" text-anchor="middle">CANNOT infer</text>
  <text x="772" y="129" font-size="18" text-anchor="middle">🔒</text>
  <text x="772" y="151" font-size="10" fill="#FCA5A5" text-anchor="middle" font-weight="500">Sequencer 无法推断</text>

  <!-- Divider -->
  <line x1="694" y1="160" x2="850" y2="160" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Pill items: CANNOT infer -->
  <!-- Item 1: Transaction content -->
  <rect x="686" y="172" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="686" y="172" width="4" height="44" rx="2" fill="#22C55E"/>
  <text x="701" y="189" font-size="13">📄</text>
  <text x="722" y="189" font-size="10" font-weight="700" fill="#1E293B">交易内容</text>
  <text x="722" y="203" font-size="9" fill="#64748B">Transaction Content</text>

  <!-- Item 2: Contract types/values -->
  <rect x="686" y="224" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="686" y="224" width="4" height="44" rx="2" fill="#22C55E"/>
  <text x="701" y="241" font-size="13">📜</text>
  <text x="722" y="241" font-size="10" font-weight="700" fill="#1E293B">合约类型/价值</text>
  <text x="722" y="255" font-size="9" fill="#64748B">Contract Types &amp; Values</text>

  <!-- Item 3: Business logic -->
  <rect x="686" y="276" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="686" y="276" width="4" height="44" rx="2" fill="#22C55E"/>
  <text x="701" y="293" font-size="13">⚙️</text>
  <text x="722" y="293" font-size="10" font-weight="700" fill="#1E293B">业务逻辑</text>
  <text x="722" y="307" font-size="9" fill="#64748B">Business Logic</text>

  <!-- Item 4: Sender identity -->
  <rect x="686" y="328" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="686" y="328" width="4" height="44" rx="2" fill="#22C55E"/>
  <text x="701" y="345" font-size="13">🎭</text>
  <text x="722" y="345" font-size="10" font-weight="700" fill="#1E293B">发送方身份</text>
  <text x="722" y="359" font-size="9" fill="#64748B">Sender Identity</text>

  <!-- Item 5: Approval/rejection status -->
  <rect x="686" y="380" width="172" height="44" rx="10" fill="white" filter="url(#badgeShadow)"/>
  <rect x="686" y="380" width="4" height="44" rx="2" fill="#22C55E"/>
  <text x="701" y="397" font-size="13">✅</text>
  <text x="722" y="397" font-size="10" font-weight="700" fill="#1E293B">审批/拒绝状态</text>
  <text x="722" y="411" font-size="9" fill="#64748B">Approval/Rejection Status</text>

  <!-- Strong privacy callout -->
  <rect x="686" y="432" width="172" height="62" rx="10" fill="#14532D"/>
  <rect x="686" y="432" width="172" height="4" rx="2" fill="#22C55E"/>
  <text x="772" y="452" font-size="11" text-anchor="middle">🔒</text>
  <text x="772" y="467" font-size="9.5" font-weight="700" fill="#86EFAC" text-anchor="middle">强隐私保证</text>
  <text x="772" y="481" font-size="8" fill="#4ADE80" text-anchor="middle">Cryptographically enforced</text>

  <!-- ─────────────── BOTTOM LEGEND / FOOTER ─────────────── -->
  <rect x="30" y="524" width="840" height="16" rx="6" fill="#E2E8F0" opacity="0.6"/>
  <!-- Legend items inline -->
  <rect x="44" y="528" width="8" height="8" rx="2" fill="#16A34A"/>
  <text x="56" y="537" font-size="8" fill="#475569">plaintext</text>
  <rect x="110" y="528" width="8" height="8" rx="2" fill="#2563EB"/>
  <text x="122" y="537" font-size="8" fill="#475569">assigned by Sequencer</text>
  <rect x="234" y="528" width="8" height="8" rx="2" fill="#DC2626"/>
  <text x="246" y="537" font-size="8" fill="#475569">encrypted opaque</text>
  <rect x="358" y="528" width="8" height="8" rx="2" fill="#D97706"/>
  <text x="370" y="537" font-size="8" fill="#475569">integrity check</text>
  <rect x="450" y="528" width="8" height="8" rx="2" fill="#475569"/>
  <text x="462" y="537" font-size="8" fill="#475569">traffic mgmt</text>

  <!-- Source tag right-aligned -->
  <text x="862" y="537" font-size="8" fill="#94A3B8" text-anchor="end">Canton Network · WHI-335 §2.2 · 2026-05-08</text>

</svg>
