<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Divulgence amber accent -->
    <linearGradient id="divulgenceAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>

    <!-- Disclosure green accent -->
    <linearGradient id="disclosureAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>

    <!-- Indigo bottom accent -->
    <linearGradient id="indigoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>

    <!-- Title underline gradient -->
    <linearGradient id="titleUnder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="114%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Icon shadow -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.10"/>
    </filter>

    <!-- VS badge shadow -->
    <filter id="vsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1E293B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <text x="500" y="36" text-anchor="middle" font-size="10.5" font-weight="600" letter-spacing="2.5" fill="#64748B">FLAT ICON STYLE · CANTON PRIVACY MODEL</text>
  <text x="500" y="64" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">WHI-335 §2.3.2  Divulgence vs Disclosure 的关键区分</text>
  <!-- Decorative underline -->
  <rect x="160" y="75" width="680" height="3" rx="2" fill="url(#titleUnder)" opacity="0.75"/>

  <!-- ═══════════════════════════════════════════
       VS BADGE (center)
  ═══════════════════════════════════════════ -->
  <circle cx="500" cy="230" r="26" fill="#1E293B" filter="url(#vsShadow)"/>
  <text x="500" y="236" text-anchor="middle" font-size="12" font-weight="800" fill="#F8FAFC" letter-spacing="1">VS</text>

  <!-- ═══════════════════════════════════════════
       LEFT CARD — Divulgence (被动)
  ═══════════════════════════════════════════ -->
  <!-- Card base -->
  <rect x="30" y="90" width="434" height="295" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Accent top bar -->
  <rect x="30" y="90" width="434" height="7" rx="14" fill="url(#divulgenceAccent)"/>
  <rect x="30" y="97" width="434" height="3" fill="url(#divulgenceAccent)" opacity="0.35"/>

  <!-- Card header -->
  <circle cx="68" cy="128" r="20" fill="#FEF3C7" filter="url(#iconShadow)"/>
  <text x="68" y="135" text-anchor="middle" font-size="19">🔔</text>
  <text x="100" y="122" font-size="17" font-weight="700" fill="#B45309">Divulgence</text>
  <text x="100" y="140" font-size="12" font-weight="600" fill="#D97706" letter-spacing="0.4">被动 — 自动发生</text>

  <!-- Divider below header -->
  <line x1="48" y1="156" x2="446" y2="156" stroke="#FDE68A" stroke-width="1.5"/>

  <!-- ROW 1 -->
  <rect x="48" y="165" width="32" height="32" rx="9" fill="#FEF3C7" filter="url(#iconShadow)"/>
  <text x="64" y="186" text-anchor="middle" font-size="16">⚡</text>
  <text x="92" y="178" font-size="10.5" font-weight="700" fill="#B45309" letter-spacing="0.8">触发方式</text>
  <text x="92" y="193" font-size="12" fill="#334155">自动发生，作为交易执行的副作用</text>

  <line x1="48" y1="208" x2="446" y2="208" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 2 -->
  <rect x="48" y="216" width="32" height="32" rx="9" fill="#FEF3C7" filter="url(#iconShadow)"/>
  <text x="64" y="237" text-anchor="middle" font-size="16">👁️</text>
  <text x="92" y="229" font-size="10.5" font-weight="700" fill="#B45309" letter-spacing="0.8">可见范围</text>
  <text x="92" y="244" font-size="12" fill="#334155">只能看到合约创建</text>

  <line x1="48" y1="259" x2="446" y2="259" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 3 -->
  <rect x="48" y="267" width="32" height="32" rx="9" fill="#FEE2E2" filter="url(#iconShadow)"/>
  <text x="64" y="288" text-anchor="middle" font-size="16">🚫</text>
  <text x="92" y="280" font-size="10.5" font-weight="700" fill="#B91C1C" letter-spacing="0.8">使用权限</text>
  <text x="92" y="295" font-size="12" fill="#334155">不授予后续使用权</text>

  <line x1="48" y1="310" x2="446" y2="310" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 4 -->
  <rect x="48" y="318" width="32" height="32" rx="9" fill="#FEE2E2" filter="url(#iconShadow)"/>
  <text x="64" y="339" text-anchor="middle" font-size="16">🙈</text>
  <text x="92" y="331" font-size="10.5" font-weight="700" fill="#B91C1C" letter-spacing="0.8">后续状态</text>
  <text x="92" y="346" font-size="12" fill="#334155">无法看到后续归档/修改</text>

  <!-- Bottom status badge -->
  <rect x="48" y="362" width="396" height="16" rx="8" fill="#FEF3C7"/>
  <text x="246" y="374" text-anchor="middle" font-size="10.5" font-weight="600" fill="#92400E">⚠ 被动观察者 — 信息碎片化，无完整上下文</text>

  <!-- ═══════════════════════════════════════════
       RIGHT CARD — Disclosure (主动)
  ═══════════════════════════════════════════ -->
  <!-- Card base -->
  <rect x="536" y="90" width="434" height="295" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Accent top bar -->
  <rect x="536" y="90" width="434" height="7" rx="14" fill="url(#disclosureAccent)"/>
  <rect x="536" y="97" width="434" height="3" fill="url(#disclosureAccent)" opacity="0.35"/>

  <!-- Card header -->
  <circle cx="574" cy="128" r="20" fill="#DCFCE7" filter="url(#iconShadow)"/>
  <text x="574" y="135" text-anchor="middle" font-size="19">📤</text>
  <text x="606" y="122" font-size="17" font-weight="700" fill="#15803D">Disclosure</text>
  <text x="606" y="140" font-size="12" font-weight="600" fill="#22C55E" letter-spacing="0.4">主动 — 显式调用</text>

  <!-- Divider below header -->
  <line x1="554" y1="156" x2="952" y2="156" stroke="#BBF7D0" stroke-width="1.5"/>

  <!-- ROW 1 -->
  <rect x="554" y="165" width="32" height="32" rx="9" fill="#DCFCE7" filter="url(#iconShadow)"/>
  <text x="570" y="186" text-anchor="middle" font-size="16">📝</text>
  <text x="598" y="178" font-size="10.5" font-weight="700" fill="#15803D" letter-spacing="0.8">触发方式</text>
  <text x="598" y="193" font-size="12" fill="#334155">需要显式调用 submitWithDisclosures</text>

  <line x1="554" y1="208" x2="952" y2="208" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 2 -->
  <rect x="554" y="216" width="32" height="32" rx="9" fill="#DCFCE7" filter="url(#iconShadow)"/>
  <text x="570" y="237" text-anchor="middle" font-size="16">🔑</text>
  <text x="598" y="229" font-size="10.5" font-weight="700" fill="#15803D" letter-spacing="0.8">使用权限</text>
  <text x="598" y="244" font-size="12" fill="#334155">授予临时使用权</text>

  <line x1="554" y1="259" x2="952" y2="259" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 3 -->
  <rect x="554" y="267" width="32" height="32" rx="9" fill="#DCFCE7" filter="url(#iconShadow)"/>
  <text x="570" y="288" text-anchor="middle" font-size="16">🤝</text>
  <text x="598" y="280" font-size="10.5" font-weight="700" fill="#15803D" letter-spacing="0.8">主动性</text>
  <text x="598" y="295" font-size="12" fill="#334155">发送者主动选择分享</text>

  <line x1="554" y1="310" x2="952" y2="310" stroke="#F1F5F9" stroke-width="1"/>

  <!-- ROW 4 -->
  <rect x="554" y="318" width="32" height="32" rx="9" fill="#DCFCE7" filter="url(#iconShadow)"/>
  <text x="570" y="339" text-anchor="middle" font-size="16">♻️</text>
  <text x="598" y="331" font-size="10.5" font-weight="700" fill="#15803D" letter-spacing="0.8">后续使用</text>
  <text x="598" y="346" font-size="12" fill="#334155">接收者可以在后续交易中使用</text>

  <!-- Bottom status badge -->
  <rect x="554" y="362" width="396" height="16" rx="8" fill="#DCFCE7"/>
  <text x="752" y="374" text-anchor="middle" font-size="10.5" font-weight="600" fill="#166534">✅ 主动共享者 — 完整上下文，可控的使用权边界</text>

  <!-- ═══════════════════════════════════════════
       BOTTOM EXPLANATION CARD
  ═══════════════════════════════════════════ -->
  <!-- Card base -->
  <rect x="30" y="400" width="940" height="85" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Indigo left accent bar -->
  <rect x="30" y="400" width="6" height="85" rx="14" fill="url(#indigoAccent)"/>
  <rect x="36" y="400" width="4" height="85" fill="url(#indigoAccent)" opacity="0.3"/>

  <!-- Explanation icon -->
  <circle cx="60" cy="427" r="16" fill="#EEF2FF" filter="url(#iconShadow)"/>
  <text x="60" y="433" text-anchor="middle" font-size="15">💡</text>

  <!-- Line 1: design reason -->
  <text x="86" y="421" font-size="10.5" font-weight="700" fill="#4338CA" letter-spacing="0.6">设计原因</text>
  <text x="86" y="435" font-size="11.5" fill="#334155">如果 divulgence 自动授予使用权，会导致"脆弱工作流"——非利益相关方看到合约创建但看不到归档，导致系统行为不可预测</text>

  <!-- Divider -->
  <line x1="48" y1="447" x2="962" y2="447" stroke="#E0E7FF" stroke-width="1"/>

  <!-- Line 2: explicit disclosure solution -->
  <circle cx="60" cy="465" r="16" fill="#EEF2FF" filter="url(#iconShadow)"/>
  <text x="60" y="471" text-anchor="middle" font-size="15">🔗</text>
  <text x="86" y="459" font-size="10.5" font-weight="700" fill="#4338CA" letter-spacing="0.6">显式 Disclosure 解决</text>
  <text x="86" y="474" font-size="11.5" fill="#334155">发送者知道当前状态 → 接收者通过正式渠道获得使用权 → 避免观察者列表二次方膨胀</text>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <text x="500" y="495" text-anchor="middle" font-size="10" fill="#94A3B8" letter-spacing="0.5">WHI-335 · M1 Canton Research · Enterprise Blockchain Feasibility Study · 2026</text>
</svg>
