<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" width="1100" height="650" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <filter id="headerShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#64748B" flood-opacity="0.22"/>
    </filter>
    <filter id="titleShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#475569" flood-opacity="0.15"/>
    </filter>

    <!-- BFT header gradient (red/orange) -->
    <linearGradient id="bftHeaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>

    <!-- Canton header gradient (green/teal) -->
    <linearGradient id="cantonHeaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>

    <!-- BFT cell tint -->
    <linearGradient id="bftCellGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEF2F2"/>
      <stop offset="100%" style="stop-color:#FFF7ED"/>
    </linearGradient>

    <!-- Canton cell tint -->
    <linearGradient id="cantonCellGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0FDF4"/>
      <stop offset="100%" style="stop-color:#F0F9FF"/>
    </linearGradient>

    <!-- Alternate row BFT -->
    <linearGradient id="bftCellAlt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FEE2E2"/>
      <stop offset="100%" style="stop-color:#FFEDD5"/>
    </linearGradient>

    <!-- Alternate row Canton -->
    <linearGradient id="cantonCellAlt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DCFCE7"/>
      <stop offset="100%" style="stop-color:#E0F2FE"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1100" height="650" fill="url(#bgGrad)"/>

  <!-- ── Title Card ── -->
  <rect x="60" y="18" width="980" height="52" rx="14" fill="white" filter="url(#titleShadow)"/>
  <rect x="60" y="18" width="6" height="52" rx="3" fill="#6366F1"/>
  <text x="82" y="37" font-size="11.5" font-weight="600" fill="#6366F1" letter-spacing="0.5">WHI-335 §3.3</text>
  <text x="82" y="58" font-size="17" font-weight="700" fill="#1E293B" letter-spacing="-0.3">Canton 共识 vs 传统 BFT 共识</text>
  <text x="1030" y="50" font-size="12" fill="#94A3B8" text-anchor="middle">对比分析</text>

  <!-- ── Column Layout Constants ──
       Dimension col: x=60  w=195
       BFT col:       x=260 w=385
       Canton col:    x=650 w=390
       Total right:   1040
  -->

  <!-- ══ HEADER CARDS ══ -->

  <!-- Dimension label header -->
  <rect x="60" y="84" width="195" height="68" rx="12" fill="#1E293B" filter="url(#cardShadow)"/>
  <text x="157" y="112" font-size="12" font-weight="600" fill="#94A3B8" text-anchor="middle">维度</text>
  <text x="157" y="130" font-size="11" fill="#64748B" text-anchor="middle">Dimension</text>

  <!-- BFT header card -->
  <rect x="262" y="84" width="382" height="68" rx="12" fill="url(#bftHeaderGrad)" filter="url(#headerShadow)"/>
  <text x="362" y="108" font-size="22" text-anchor="middle">⚡</text>
  <text x="410" y="107" font-size="14" font-weight="700" fill="white" text-anchor="start">传统 BFT 共识</text>
  <text x="410" y="127" font-size="11" fill="rgba(255,255,255,0.82)" text-anchor="start">Tendermint / PBFT</text>

  <!-- Canton header card -->
  <rect x="652" y="84" width="388" height="68" rx="12" fill="url(#cantonHeaderGrad)" filter="url(#headerShadow)"/>
  <text x="752" y="108" font-size="22" text-anchor="middle">🔐</text>
  <text x="800" y="107" font-size="14" font-weight="700" fill="white" text-anchor="start">Canton 协议</text>
  <text x="800" y="127" font-size="11" fill="rgba(255,255,255,0.82)" text-anchor="start">Sequencer + Mediator 2PC</text>

  <!-- ══ TABLE ROWS ══
       Row height: 46px
       Start y: 160
       Rows 0-9
  -->

  <!-- Helper: rows alternate between shade 0 (lighter) and shade 1 (darker) -->

  <!-- ── ROW 0: 目的 (even - lighter) ── -->
  <rect x="60" y="160" width="195" height="46" rx="0" fill="#F1F5F9"/>
  <rect x="262" y="160" width="382" height="46" fill="url(#bftCellGrad)"/>
  <rect x="652" y="160" width="388" height="46" fill="url(#cantonCellGrad)"/>
  <!-- Dimension pill -->
  <rect x="68" y="168" width="72" height="22" rx="8" fill="#1E293B"/>
  <text x="104" y="183" font-size="11" font-weight="600" fill="white" text-anchor="middle">目的</text>
  <!-- BFT text -->
  <text x="278" y="178" font-size="12" fill="#7F1D1D" font-weight="500">全局状态转换达成一致</text>
  <text x="278" y="196" font-size="10.5" fill="#B45309">Global state-transition consensus</text>
  <!-- Canton text -->
  <text x="668" y="178" font-size="12" fill="#14532D" font-weight="500">相关方就特定交易达成一致</text>
  <text x="668" y="196" font-size="10.5" fill="#0369A1">Per-transaction consensus among informees</text>

  <!-- ── ROW 1: 参与者 (odd - darker) ── -->
  <rect x="60" y="206" width="195" height="46" rx="0" fill="#E2E8F0"/>
  <rect x="262" y="206" width="382" height="46" fill="url(#bftCellAlt)"/>
  <rect x="652" y="206" width="388" height="46" fill="url(#cantonCellAlt)"/>
  <rect x="68" y="214" width="72" height="22" rx="8" fill="#334155"/>
  <text x="104" y="229" font-size="11" font-weight="600" fill="white" text-anchor="middle">参与者</text>
  <text x="278" y="224" font-size="12" fill="#7F1D1D" font-weight="500">所有验证者</text>
  <text x="278" y="242" font-size="10.5" fill="#B45309">All validators participate</text>
  <text x="668" y="224" font-size="12" fill="#14532D" font-weight="500">只有 informees 的 Participants</text>
  <text x="668" y="242" font-size="10.5" fill="#0369A1">Only Participants of transaction informees</text>

  <!-- ── ROW 2: 可见性 (even) ── -->
  <rect x="60" y="252" width="195" height="46" rx="0" fill="#F1F5F9"/>
  <rect x="262" y="252" width="382" height="46" fill="url(#bftCellGrad)"/>
  <rect x="652" y="252" width="388" height="46" fill="url(#cantonCellGrad)"/>
  <rect x="68" y="260" width="72" height="22" rx="8" fill="#1E293B"/>
  <text x="104" y="275" font-size="11" font-weight="600" fill="white" text-anchor="middle">可见性</text>
  <text x="278" y="270" font-size="12" fill="#7F1D1D" font-weight="500">所有验证者看到全部交易</text>
  <text x="278" y="288" font-size="10.5" fill="#B45309">All validators see all transactions</text>
  <text x="668" y="270" font-size="12" fill="#14532D" font-weight="500">每个 Participant 只看到自己的子树</text>
  <text x="668" y="288" font-size="10.5" fill="#0369A1">Each Participant sees only its subtree</text>

  <!-- ── ROW 3: 协调者 (odd) ── -->
  <rect x="60" y="298" width="195" height="46" rx="0" fill="#E2E8F0"/>
  <rect x="262" y="298" width="382" height="46" fill="url(#bftCellAlt)"/>
  <rect x="652" y="298" width="388" height="46" fill="url(#cantonCellAlt)"/>
  <rect x="68" y="306" width="72" height="22" rx="8" fill="#334155"/>
  <text x="104" y="321" font-size="11" font-weight="600" fill="white" text-anchor="middle">协调者</text>
  <text x="278" y="316" font-size="12" fill="#7F1D1D" font-weight="500">轮转 Leader</text>
  <text x="278" y="334" font-size="10.5" fill="#B45309">Rotating leader election</text>
  <text x="668" y="316" font-size="12" fill="#14532D" font-weight="500">固定 Mediator（可多个，阈值投票）</text>
  <text x="668" y="334" font-size="10.5" fill="#0369A1">Fixed Mediator(s) with threshold voting</text>

  <!-- ── ROW 4: 提议 (even) ── -->
  <rect x="60" y="344" width="195" height="46" rx="0" fill="#F1F5F9"/>
  <rect x="262" y="344" width="382" height="46" fill="url(#bftCellGrad)"/>
  <rect x="652" y="344" width="388" height="46" fill="url(#cantonCellGrad)"/>
  <rect x="68" y="352" width="72" height="22" rx="8" fill="#1E293B"/>
  <text x="104" y="367" font-size="11" font-weight="600" fill="white" text-anchor="middle">提议</text>
  <text x="278" y="362" font-size="12" fill="#7F1D1D" font-weight="500">Leader 打包区块</text>
  <text x="278" y="380" font-size="10.5" fill="#B45309">Leader proposes batched block</text>
  <text x="668" y="362" font-size="12" fill="#14532D" font-weight="500">提交者构造交易 Merkle DAG</text>
  <text x="668" y="380" font-size="10.5" fill="#0369A1">Submitter constructs transaction Merkle DAG</text>

  <!-- ── ROW 5: 投票 (odd) ── -->
  <rect x="60" y="390" width="195" height="46" rx="0" fill="#E2E8F0"/>
  <rect x="262" y="390" width="382" height="46" fill="url(#bftCellAlt)"/>
  <rect x="652" y="390" width="388" height="46" fill="url(#cantonCellAlt)"/>
  <rect x="68" y="398" width="72" height="22" rx="8" fill="#334155"/>
  <text x="104" y="413" font-size="11" font-weight="600" fill="white" text-anchor="middle">投票</text>
  <text x="278" y="408" font-size="12" fill="#7F1D1D" font-weight="500">所有验证者投票</text>
  <text x="278" y="426" font-size="10.5" fill="#B45309">All validators vote on every block</text>
  <text x="668" y="408" font-size="12" fill="#14532D" font-weight="500">只有 confirmers 确认 / 拒绝</text>
  <text x="668" y="426" font-size="10.5" fill="#0369A1">Only confirmers approve or reject</text>

  <!-- ── ROW 6: 终局性 (even) ── -->
  <rect x="60" y="436" width="195" height="46" rx="0" fill="#F1F5F9"/>
  <rect x="262" y="436" width="382" height="46" fill="url(#bftCellGrad)"/>
  <rect x="652" y="436" width="388" height="46" fill="url(#cantonCellGrad)"/>
  <rect x="68" y="444" width="72" height="22" rx="8" fill="#1E293B"/>
  <text x="104" y="459" font-size="11" font-weight="600" fill="white" text-anchor="middle">终局性</text>
  <text x="278" y="454" font-size="12" fill="#7F1D1D" font-weight="500">2/3 投票 → 即时终局</text>
  <text x="278" y="472" font-size="10.5" fill="#B45309">⅔ quorum → instant finality</text>
  <text x="668" y="451" font-size="11.5" fill="#14532D" font-weight="500">所有 confirmers 同意 → 终局</text>
  <text x="668" y="467" font-size="11.5" fill="#065F46" font-weight="500">任一方拒绝 → 回滚</text>
  <text x="668" y="480" font-size="10" fill="#0369A1">All agree→commit  /  any reject→rollback</text>

  <!-- ── ROW 7: 区块 (odd) ── -->
  <rect x="60" y="482" width="195" height="46" rx="0" fill="#E2E8F0"/>
  <rect x="262" y="482" width="382" height="46" fill="url(#bftCellAlt)"/>
  <rect x="652" y="482" width="388" height="46" fill="url(#cantonCellAlt)"/>
  <rect x="68" y="490" width="72" height="22" rx="8" fill="#334155"/>
  <text x="104" y="505" font-size="11" font-weight="600" fill="white" text-anchor="middle">区块</text>
  <text x="278" y="500" font-size="12" fill="#7F1D1D" font-weight="500">有（批量交易打包）</text>
  <text x="278" y="518" font-size="10.5" fill="#B45309">Yes — batched transaction blocks</text>
  <text x="668" y="500" font-size="12" fill="#14532D" font-weight="500">无（单笔交易独立提交）</text>
  <text x="668" y="518" font-size="10.5" fill="#0369A1">None — each transaction submitted independently</text>

  <!-- ── ROW 8: 全局排序 (even) ── -->
  <rect x="60" y="528" width="195" height="46" rx="0" fill="#F1F5F9"/>
  <rect x="262" y="528" width="382" height="46" fill="url(#bftCellGrad)"/>
  <rect x="652" y="528" width="388" height="46" fill="url(#cantonCellGrad)"/>
  <rect x="68" y="536" width="72" height="22" rx="8" fill="#1E293B"/>
  <text x="104" y="551" font-size="10.5" font-weight="600" fill="white" text-anchor="middle">全局排序</text>
  <text x="278" y="546" font-size="12" fill="#7F1D1D" font-weight="500">是（区块高度 = 全局序列）</text>
  <text x="278" y="564" font-size="10.5" fill="#B45309">Yes — block height = global sequence</text>
  <text x="668" y="546" font-size="12" fill="#14532D" font-weight="500">仅 Synchronizer 内排序</text>
  <text x="668" y="564" font-size="10.5" fill="#0369A1">Ordering only within a Synchronizer domain</text>

  <!-- ── ROW 9: 冲突解决 (odd) ── -->
  <rect x="60" y="574" width="195" height="46" rx="0" fill="#E2E8F0"/>
  <rect x="262" y="574" width="382" height="46" fill="url(#bftCellAlt)"/>
  <rect x="652" y="574" width="388" height="46" fill="url(#cantonCellAlt)"/>
  <!-- Round bottom-left corners on dimension col -->
  <rect x="68" y="582" width="80" height="22" rx="8" fill="#334155"/>
  <text x="108" y="597" font-size="10" font-weight="600" fill="white" text-anchor="middle">冲突解决</text>
  <text x="278" y="592" font-size="12" fill="#7F1D1D" font-weight="500">在共识层处理（mempool 去重）</text>
  <text x="278" y="610" font-size="10.5" fill="#B45309">Handled at consensus layer (mempool dedup)</text>
  <text x="668" y="592" font-size="12" fill="#14532D" font-weight="500">Participant 层检测，Mediator 层裁决</text>
  <text x="668" y="610" font-size="10.5" fill="#0369A1">Detected by Participant, adjudicated by Mediator</text>

  <!-- ══ TABLE BORDER OVERLAY ══ -->
  <!-- Outer rounded border -->
  <rect x="60" y="160" width="980" height="460" rx="0" fill="none" stroke="#CBD5E1" stroke-width="1.2"/>
  <!-- Vertical dividers -->
  <line x1="257" y1="160" x2="257" y2="620" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="648" y1="160" x2="648" y2="620" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Horizontal dividers for each row -->
  <line x1="60" y1="206" x2="1040" y2="206" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="252" x2="1040" y2="252" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="298" x2="1040" y2="298" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="344" x2="1040" y2="344" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="390" x2="1040" y2="390" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="436" x2="1040" y2="436" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="482" x2="1040" y2="482" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="528" x2="1040" y2="528" stroke="#CBD5E1" stroke-width="0.8"/>
  <line x1="60" y1="574" x2="1040" y2="574" stroke="#CBD5E1" stroke-width="0.8"/>

  <!-- ══ ACCENT BAR UNDER HEADERS ══ -->
  <rect x="262" y="148" width="382" height="4" rx="2" fill="url(#bftHeaderGrad)"/>
  <rect x="652" y="148" width="388" height="4" rx="2" fill="url(#cantonHeaderGrad)"/>

  <!-- ══ FOOTER LEGEND ══ -->
  <rect x="60" y="628" width="980" height="18" rx="4" fill="none"/>
  <circle cx="72" cy="637" r="5" fill="#EF4444" opacity="0.8"/>
  <text x="82" y="641" font-size="10" fill="#64748B">传统 BFT — 全局广播模型</text>
  <circle cx="260" cy="637" r="5" fill="#10B981" opacity="0.8"/>
  <text x="270" y="641" font-size="10" fill="#64748B">Canton — 局部隐私 2PC 模型</text>
  <text x="1040" y="641" font-size="10" fill="#94A3B8" text-anchor="end">WHI-335 §3.3 · 2026-05-08</text>
</svg>
