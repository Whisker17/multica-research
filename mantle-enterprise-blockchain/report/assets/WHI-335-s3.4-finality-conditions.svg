<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-8%" y="-20%" width="116%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22C55E" flood-opacity="0.28"/>
    </filter>

    <!-- Small card shadow -->
    <filter id="smallShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TITLE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="400" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B" letter-spacing="0.3">WHI-335 §3.4 终局性保证</text>
  <text x="400" y="52" text-anchor="middle" font-size="11.5" fill="#64748B" letter-spacing="0.2">Canton Finality Conditions — Deterministic &amp; Immediate</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MAIN CARD -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="66" width="640" height="240" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Indigo accent bar -->
  <rect x="80" y="66" width="7" height="240" rx="7" fill="#6366F1"/>
  <!-- Clip the right side of accent bar so only left side is rounded -->
  <rect x="84" y="66" width="3" height="240" fill="#6366F1"/>

  <!-- Card title row -->
  <text x="108" y="93" font-size="15" font-weight="700" fill="#1E293B">🏁</text>
  <text x="132" y="93" font-size="15" font-weight="700" fill="#1E293B">Finality Conditions</text>
  <text x="132" y="109" font-size="10.5" fill="#6366F1" font-weight="500" letter-spacing="0.4">Canton Transaction Finality Protocol</text>

  <!-- Divider -->
  <line x1="108" y1="118" x2="695" y2="118" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ── Row 1 ── -->
  <circle cx="126" cy="142" r="11" fill="#DCFCE7"/>
  <text x="126" y="147" text-anchor="middle" font-size="12">✅</text>
  <text x="148" y="139" font-size="12.5" font-weight="600" fill="#334155">Sequencer has assigned a batch timestamp</text>
  <text x="148" y="154" font-size="10.5" fill="#64748B">时序器已为批次分配时间戳</text>

  <!-- ── Row 2 ── -->
  <circle cx="126" cy="178" r="11" fill="#DCFCE7"/>
  <text x="126" y="183" text-anchor="middle" font-size="12">✅</text>
  <text x="148" y="175" font-size="12.5" font-weight="600" fill="#334155">All confirming Participants have approved</text>
  <text x="148" y="190" font-size="10.5" fill="#64748B">所有确认参与方已批准</text>

  <!-- ── Row 3 ── -->
  <circle cx="126" cy="214" r="11" fill="#DCFCE7"/>
  <text x="126" y="219" text-anchor="middle" font-size="12">✅</text>
  <text x="148" y="211" font-size="12.5" font-weight="600" fill="#334155">Mediator has issued APPROVE verdict</text>
  <text x="148" y="226" font-size="10.5" fill="#64748B">调解者已发出 APPROVE 裁决</text>

  <!-- ── Row 4 ── -->
  <circle cx="126" cy="250" r="11" fill="#DCFCE7"/>
  <text x="126" y="255" text-anchor="middle" font-size="12">✅</text>
  <text x="148" y="247" font-size="12.5" font-weight="600" fill="#334155">Verdict has been distributed via Sequencer</text>
  <text x="148" y="262" font-size="10.5" fill="#64748B">裁决已通过时序器分发</text>

  <!-- ── Row 5 ── -->
  <circle cx="126" cy="286" r="11" fill="#DCFCE7"/>
  <text x="126" y="291" text-anchor="middle" font-size="12">✅</text>
  <text x="148" y="283" font-size="12.5" font-weight="600" fill="#334155">All relevant Participants have applied the verdict to their ACS</text>
  <text x="148" y="298" font-size="10.5" fill="#64748B">所有相关参与方已将裁决应用至其活跃合约集 (ACS)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW DOWN -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="400" y1="310" x2="400" y2="330" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="400,338 394,326 406,326" fill="#94A3B8"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- RESULT BADGE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="230" y="342" width="340" height="44" rx="22" fill="#16A34A" filter="url(#badgeShadow)"/>
  <text x="400" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="white" letter-spacing="0.3">→ Transaction is FINAL</text>
  <text x="400" y="376" text-anchor="middle" font-size="10.5" fill="#BBF7D0" letter-spacing="0.2">交易已达到最终性 · 不可撤销</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM PROPERTY CARDS (4 × small) -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Card 1: Deterministic (blue) -->
  <rect x="44" y="402" width="163" height="78" rx="12" fill="white" filter="url(#smallShadow)"/>
  <rect x="44" y="402" width="163" height="5" rx="5" fill="#3B82F6"/>
  <rect x="44" y="404" width="163" height="3" fill="#3B82F6"/>
  <text x="126" y="427" text-anchor="middle" font-size="18">🎯</text>
  <text x="126" y="445" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">Deterministic</text>
  <text x="126" y="461" text-anchor="middle" font-size="9.5" fill="#64748B">no probabilistic</text>
  <text x="126" y="472" text-anchor="middle" font-size="9.5" fill="#64748B">waiting period</text>

  <!-- Card 2: Immediate (green) -->
  <rect x="221" y="402" width="163" height="78" rx="12" fill="white" filter="url(#smallShadow)"/>
  <rect x="221" y="402" width="163" height="5" rx="5" fill="#22C55E"/>
  <rect x="221" y="404" width="163" height="3" fill="#22C55E"/>
  <text x="303" y="427" text-anchor="middle" font-size="18">⚡</text>
  <text x="303" y="445" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">Immediate</text>
  <text x="303" y="461" text-anchor="middle" font-size="9.5" fill="#64748B">once verdict applied,</text>
  <text x="303" y="472" text-anchor="middle" font-size="9.5" fill="#64748B">it's done</text>

  <!-- Card 3: Irrevocable (indigo) -->
  <rect x="398" y="402" width="163" height="78" rx="12" fill="white" filter="url(#smallShadow)"/>
  <rect x="398" y="402" width="163" height="5" rx="5" fill="#6366F1"/>
  <rect x="398" y="404" width="163" height="3" fill="#6366F1"/>
  <text x="480" y="427" text-anchor="middle" font-size="18">🔒</text>
  <text x="480" y="445" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">Irrevocable</text>
  <text x="480" y="461" text-anchor="middle" font-size="9.5" fill="#64748B">no reorg, no</text>
  <text x="480" y="472" text-anchor="middle" font-size="9.5" fill="#64748B">challenge period</text>

  <!-- Card 4: Partial (amber) -->
  <rect x="575" y="402" width="163" height="78" rx="12" fill="white" filter="url(#smallShadow)"/>
  <rect x="575" y="402" width="163" height="5" rx="5" fill="#F59E0B"/>
  <rect x="575" y="404" width="163" height="3" fill="#F59E0B"/>
  <text x="657" y="427" text-anchor="middle" font-size="18">📍</text>
  <text x="657" y="445" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1E293B">Partial</text>
  <text x="657" y="461" text-anchor="middle" font-size="9.5" fill="#64748B">only affects</text>
  <text x="657" y="472" text-anchor="middle" font-size="9.5" fill="#64748B">participating Participants</text>

</svg>
