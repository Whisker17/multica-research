<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#64748B" flood-opacity="0.15"/>
    </filter>

    <!-- Subtle inner glow for accent bars -->
    <filter id="accentGlow" x="0%" y="0%" width="100%" height="100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Indigo gradient for signatory -->
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>

    <!-- Blue gradient for observer -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Green gradient for controller -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>

    <!-- Amber gradient for rules -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.4" opacity="0.5"/>
  </pattern>
  <rect width="1000" height="700" fill="url(#grid)" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TITLE SECTION -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="500" y="36" text-anchor="middle" font-size="11" font-weight="500" fill="#94A3B8" letter-spacing="2">WHI-335 §4.1</text>
  <text x="500" y="60" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B" letter-spacing="-0.3">Daml 授权模型 — Signatory / Observer / Controller</text>
  <line x1="340" y1="72" x2="660" y2="72" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CARD 1 — SIGNATORY (✍️, Indigo) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Card background -->
  <rect x="28" y="84" width="944" height="132" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Accent bar -->
  <rect x="28" y="84" width="10" height="132" rx="5" fill="url(#indigoGrad)" filter="url(#accentGlow)"/>
  <!-- Right top color block -->
  <rect x="892" y="84" width="80" height="132" rx="14" fill="#6366F1" opacity="0.06"/>

  <!-- Icon + Label group -->
  <text x="56" y="118" font-size="26">✍️</text>
  <text x="92" y="112" font-size="16" font-weight="700" fill="#4338CA" letter-spacing="-0.2">SIGNATORY</text>
  <text x="92" y="129" font-size="11.5" font-weight="500" fill="#6366F1" letter-spacing="0.5">签署方</text>

  <!-- Divider line under header -->
  <line x1="56" y1="136" x2="320" y2="136" stroke="#E0E7FF" stroke-width="1.2"/>

  <!-- Bullet points -->
  <!-- Row 1: 3 bullets -->
  <circle cx="63" cy="152" r="3" fill="#6366F1"/>
  <text x="74" y="156" font-size="11.5" fill="#374151">MUST authorize contract creation</text>
  <circle cx="295" cy="152" r="3" fill="#6366F1"/>
  <text x="306" y="156" font-size="11.5" fill="#374151">Notified when contract is archived</text>
  <circle cx="530" cy="152" r="3" fill="#6366F1"/>
  <text x="541" y="156" font-size="11.5" fill="#374151">Cannot have obligations imposed without consent</text>

  <!-- Row 2: 2 bullets -->
  <circle cx="63" cy="172" r="3" fill="#6366F1"/>
  <text x="74" y="176" font-size="11.5" fill="#374151">Rights cannot be unilaterally removed</text>
  <circle cx="295" cy="172" r="3" fill="#6366F1"/>
  <text x="306" y="176" font-size="11.5" fill="#374151">Determines contract identity and validity</text>

  <!-- Analogy badge -->
  <rect x="56" y="187" width="308" height="22" rx="11" fill="#EEF2FF" filter="url(#badgeShadow)"/>
  <text x="66" y="202" font-size="10.5" fill="#4338CA" font-weight="500">⚖️ 类比：法律合同的联合签署人</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CARD 2 — OBSERVER (👁️, Blue) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="28" y="228" width="944" height="132" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="28" y="228" width="10" height="132" rx="5" fill="url(#blueGrad)" filter="url(#accentGlow)"/>
  <rect x="892" y="228" width="80" height="132" rx="14" fill="#3B82F6" opacity="0.06"/>

  <text x="56" y="262" font-size="26">👁️</text>
  <text x="92" y="256" font-size="16" font-weight="700" fill="#1D4ED8" letter-spacing="-0.2">OBSERVER</text>
  <text x="92" y="273" font-size="11.5" font-weight="500" fill="#3B82F6" letter-spacing="0.5">观察方</text>

  <line x1="56" y1="280" x2="310" y2="280" stroke="#DBEAFE" stroke-width="1.2"/>

  <!-- Row 1 -->
  <circle cx="63" cy="296" r="3" fill="#3B82F6"/>
  <text x="74" y="300" font-size="11.5" fill="#374151">Can <tspan font-weight="600" fill="#1D4ED8">SEE</tspan> the contract and related events</text>
  <circle cx="295" cy="296" r="3" fill="#3B82F6"/>
  <text x="306" y="300" font-size="11.5" fill="#374151">Does NOT need to authorize creation</text>
  <circle cx="530" cy="296" r="3" fill="#3B82F6"/>
  <text x="541" y="300" font-size="11.5" fill="#374151">Notified of create/consuming exercise</text>

  <!-- Row 2 -->
  <circle cx="63" cy="316" r="3" fill="#3B82F6"/>
  <text x="74" y="320" font-size="11.5" fill="#374151">NOT notified of non-consuming exercise/fetch</text>
  <circle cx="295" cy="316" r="3" fill="#3B82F6"/>
  <text x="306" y="320" font-size="11.5" fill="#374151">Cannot exercise choices (unless also controller)</text>

  <!-- Analogy badge -->
  <rect x="56" y="331" width="348" height="22" rx="11" fill="#EFF6FF" filter="url(#badgeShadow)"/>
  <text x="66" y="346" font-size="10.5" fill="#1D4ED8" font-weight="500">🏛️ 类比：被通知的第三方（如监管机构）</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CARD 3 — CONTROLLER (🎮, Green) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="28" y="372" width="944" height="132" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="28" y="372" width="10" height="132" rx="5" fill="url(#greenGrad)" filter="url(#accentGlow)"/>
  <rect x="892" y="372" width="80" height="132" rx="14" fill="#22C55E" opacity="0.06"/>

  <text x="56" y="406" font-size="26">🎮</text>
  <text x="92" y="400" font-size="16" font-weight="700" fill="#15803D" letter-spacing="-0.2">CONTROLLER</text>
  <text x="92" y="417" font-size="11.5" font-weight="500" fill="#22C55E" letter-spacing="0.5">控制方</text>

  <line x1="56" y1="424" x2="334" y2="424" stroke="#DCFCE7" stroke-width="1.2"/>

  <!-- Row 1 -->
  <circle cx="63" cy="440" r="3" fill="#22C55E"/>
  <text x="74" y="444" font-size="11.5" fill="#374151">Can <tspan font-weight="600" fill="#15803D">EXERCISE</tspan> a specific choice on the contract</text>
  <circle cx="295" cy="440" r="3" fill="#22C55E"/>
  <text x="306" y="444" font-size="11.5" fill="#374151">Becomes the <tspan font-weight="600" fill="#15803D">ACTOR</tspan> when exercising</text>
  <circle cx="530" cy="440" r="3" fill="#22C55E"/>
  <text x="541" y="444" font-size="11.5" fill="#374151">Authorization flows from controller designation</text>

  <!-- Row 2 -->
  <circle cx="63" cy="460" r="3" fill="#22C55E"/>
  <text x="74" y="464" font-size="11.5" fill="#374151">Can be: a specific party, signatory, observer</text>

  <!-- Analogy badge -->
  <rect x="56" y="475" width="298" height="22" rx="11" fill="#F0FDF4" filter="url(#badgeShadow)"/>
  <text x="66" y="490" font-size="10.5" fill="#15803D" font-weight="500">🔑 类比：有权行动的授权人</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM — Authorization Rules (Amber) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="28" y="516" width="944" height="160" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="28" y="516" width="10" height="160" rx="5" fill="url(#amberGrad)" filter="url(#accentGlow)"/>
  <!-- Amber header band -->
  <rect x="38" y="516" width="934" height="42" rx="0" fill="#FFFBEB"/>
  <rect x="38" y="516" width="934" height="42" rx="0" fill="none"/>
  <!-- top-right corner clip for header -->
  <rect x="962" y="516" width="10" height="42" rx="0" fill="#FFFBEB"/>
  <path d="M38 516 h914 a14 14 0 0 1 14 14 v28 h-928 z" fill="#FFFBEB"/>

  <!-- Amber icon + title -->
  <text x="56" y="544" font-size="20">⚡</text>
  <text x="84" y="540" font-size="14" font-weight="700" fill="#92400E" letter-spacing="-0.2">Authorization Rules</text>
  <text x="84" y="554" font-size="10.5" font-weight="500" fill="#D97706" letter-spacing="0.5">授权规则</text>

  <!-- 5 rule pills arranged in grid -->
  <!-- Row 1: 3 pills -->
  <!-- Pill 1 -->
  <rect x="56" y="570" width="244" height="38" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="70" y="584" font-size="10" font-weight="600" fill="#92400E">CREATE</text>
  <text x="70" y="598" font-size="10.5" fill="#78350F">→ requires ALL signatories</text>

  <!-- Pill 2 -->
  <rect x="314" y="570" width="244" height="38" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="328" y="584" font-size="10" font-weight="600" fill="#92400E">EXERCISE</text>
  <text x="328" y="598" font-size="10.5" fill="#78350F">→ requires ALL actors (controllers)</text>

  <!-- Pill 3 -->
  <rect x="572" y="570" width="244" height="38" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="586" y="584" font-size="10" font-weight="600" fill="#92400E">FETCH</text>
  <text x="586" y="598" font-size="10.5" fill="#78350F">→ requires ALL actors</text>

  <!-- Row 2: 2 pills + note -->
  <!-- Pill 4 -->
  <rect x="56" y="618" width="244" height="38" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="70" y="632" font-size="10" font-weight="600" fill="#92400E">ARCHIVE</text>
  <text x="70" y="646" font-size="10.5" fill="#78350F">→ automatic on consuming exercise</text>

  <!-- Pill 5 — Transitive -->
  <rect x="314" y="618" width="502" height="38" rx="10" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1.8"/>
  <text x="328" y="632" font-size="10" font-weight="700" fill="#B45309">TRANSITIVE</text>
  <text x="328" y="646" font-size="10.5" fill="#78350F">Exercise consequences are jointly authorized by all actors</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Role Relationship Connectors (subtle arrows on right side) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Signatory → Observer arrow -->
  <line x1="960" y1="150" x2="960" y2="228" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="956,224 960,232 964,224" fill="#94A3B8"/>
  <text x="967" y="192" font-size="9" fill="#94A3B8" font-weight="500">∋</text>

  <!-- Observer → Controller arrow -->
  <line x1="960" y1="294" x2="960" y2="372" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="956,368 960,376 964,368" fill="#94A3B8"/>

  <!-- Controller → Rules arrow -->
  <line x1="960" y1="440" x2="960" y2="516" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="956,512 960,520 964,512" fill="#94A3B8"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ROLE LEGEND chips (top-right corner) -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="792" y="84" width="90" height="22" rx="11" fill="#EEF2FF" opacity="0.9"/>
  <circle cx="806" cy="95" r="4" fill="#6366F1"/>
  <text x="815" y="99" font-size="10" fill="#4338CA" font-weight="600">Signatory</text>

  <rect x="792" y="228" width="84" height="22" rx="11" fill="#EFF6FF" opacity="0.9"/>
  <circle cx="806" cy="239" r="4" fill="#3B82F6"/>
  <text x="815" y="243" font-size="10" fill="#1D4ED8" font-weight="600">Observer</text>

  <rect x="792" y="372" width="90" height="22" rx="11" fill="#F0FDF4" opacity="0.9"/>
  <circle cx="806" cy="383" r="4" fill="#22C55E"/>
  <text x="815" y="387" font-size="10" fill="#15803D" font-weight="600">Controller</text>

</svg>
