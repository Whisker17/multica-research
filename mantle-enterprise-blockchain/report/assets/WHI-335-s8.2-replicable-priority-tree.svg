  <rect x="22" y="522" width="856" height="18" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Legend items -->
  <circle cx="50" cy="531" r="4" fill="#22C55E"/>
  <text x="60" y="535" font-size="9" fill="#475569" font-weight="600">优先级 1：直接可实施</text>

  <circle cx="220" cy="531" r="4" fill="#F59E0B"/>
  <text x="230" y="535" font-size="9" fill="#475569" font-weight="600">优先级 2：需架构适配</text>

  <circle cx="400" cy="531" r="4" fill="#3B82F6"/>
  <text x="410" y="535" font-size="9" fill="#475569" font-weight="600">优先级 3：理念借鉴</text>

