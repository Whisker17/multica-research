  <line x1="628" y1="210" x2="646" y2="210" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="628" cy="210" r="3.5" fill="#3B82F6"/>
  <rect x="650" y="194" width="212" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="662" y="207" font-size="10" fill="#1D4ED8" font-weight="700" letter-spacing="0.3">├──</text>
  <text x="694" y="207" font-size="11" fill="#1E3A8A" font-weight="600">Need-to-know 投影</text>
  <text x="694" y="221" font-size="11" fill="#1E3A8A" font-weight="600">→ view-based access</text>
  <text x="662" y="237" font-size="10" fill="#2563EB">视图访问控制转化</text>

  <!-- Item 2 -->
  <line x1="628" y1="280" x2="646" y2="280" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="628" cy="280" r="3.5" fill="#3B82F6"/>
  <rect x="650" y="264" width="212" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="662" y="277" font-size="10" fill="#1D4ED8" font-weight="700" letter-spacing="0.3">├──</text>
  <text x="694" y="277" font-size="11" fill="#1E3A8A" font-weight="600">不可变审计轨迹</text>
  <text x="694" y="291" font-size="11" fill="#1E3A8A" font-weight="600">→ event sourcing 层</text>
  <text x="662" y="307" font-size="10" fill="#2563EB">可变存储增强审计</text>

  <!-- Item 3 -->
  <line x1="628" y1="350" x2="646" y2="350" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="628" cy="350" r="3.5" fill="#3B82F6"/>
  <rect x="650" y="334" width="212" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="662" y="347" font-size="10" fill="#1D4ED8" font-weight="700" letter-spacing="0.3">└──</text>
  <text x="694" y="347" font-size="11" fill="#1E3A8A" font-weight="600">确定性执行消除 MEV</text>
  <text x="694" y="361" font-size="11" fill="#1E3A8A" font-weight="600">（参考，实现路径不同）</text>
  <text x="662" y="377" font-size="10" fill="#2563EB">MEV 防护参考</text>

  <!-- Bottom note -->
  <rect x="620" y="402" width="244" height="94" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="742" y="420" text-anchor="middle" font-size="10" fill="#64748B" font-weight="600">实施策略</text>
  <text x="632" y="436" font-size="9.5" fill="#64748B">• 架构理念值得借鉴</text>
  <text x="632" y="451" font-size="9.5" fill="#64748B">• 直接复制实现代价极高</text>
  <text x="632" y="466" font-size="9.5" fill="#64748B">• 转化为 Mantle 原生方案</text>
  <text x="632" y="481" font-size="9.5" fill="#64748B">• 长期路线图参考</text>

  <!-- ══════════════════════════════════════════
       BOTTOM LEGEND BAR
