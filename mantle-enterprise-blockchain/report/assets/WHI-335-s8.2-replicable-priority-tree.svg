  <line x1="336" y1="210" x2="354" y2="210" stroke="#FCD34D" stroke-width="2"/>
  <circle cx="336" cy="210" r="3.5" fill="#F59E0B"/>
  <rect x="358" y="194" width="212" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="370" y="207" font-size="10" fill="#B45309" font-weight="700" letter-spacing="0.3">├──</text>
  <text x="402" y="207" font-size="11" fill="#92400E" font-weight="600">多 Rollup 水平扩展</text>
  <text x="402" y="221" font-size="11" fill="#92400E" font-weight="600">+ 跨链资产转移</text>
  <text x="370" y="237" font-size="10" fill="#B45309">Rollup 扩展性</text>

  <!-- Item 2 -->
  <line x1="336" y1="280" x2="354" y2="280" stroke="#FCD34D" stroke-width="2"/>
  <circle cx="336" cy="280" r="3.5" fill="#F59E0B"/>
  <rect x="358" y="264" width="212" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="370" y="277" font-size="10" fill="#B45309" font-weight="700" letter-spacing="0.3">├──</text>
  <text x="402" y="277" font-size="11" fill="#92400E" font-weight="600">Sequencer 角色细化</text>
  <text x="402" y="291" font-size="11" fill="#92400E" font-weight="600">（减少信息暴露面）</text>
  <text x="370" y="307" font-size="10" fill="#B45309">隐私保护增强</text>

  <!-- Item 3 -->
  <line x1="336" y1="350" x2="354" y2="350" stroke="#FCD34D" stroke-width="2"/>
  <circle cx="336" cy="350" r="3.5" fill="#F59E0B"/>
  <rect x="358" y="334" width="212" height="52" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
  <text x="370" y="347" font-size="10" fill="#B45309" font-weight="700" letter-spacing="0.3">└──</text>
  <text x="402" y="347" font-size="11" fill="#92400E" font-weight="600">Smart Contract 授权</text>
  <text x="402" y="361" font-size="11" fill="#92400E" font-weight="600">Signatory-like 模式</text>
  <text x="370" y="377" font-size="10" fill="#B45309">智能合约授权</text>

  <!-- Bottom note -->
  <rect x="328" y="402" width="244" height="94" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#64748B" font-weight="600">实施策略</text>
  <text x="340" y="436" font-size="9.5" fill="#64748B">• 需要额外架构层设计</text>
  <text x="340" y="451" font-size="9.5" fill="#64748B">• Canton 模式可参考，实现需适配</text>
  <text x="340" y="466" font-size="9.5" fill="#64748B">• 建议 M4 阶段实施</text>
  <text x="340" y="481" font-size="9.5" fill="#64748B">• 中等复杂度，高业务价值</text>

  <!-- ══════════════════════════════════════════
       CARD 3 — 优先级 3  (blue)
       ══════════════════════════════════════════ -->
  <g filter="url(#cardShadow)">
    <rect x="606" y="82" width="272" height="430" rx="14" fill="white"/>
