  <!-- Priority label -->
  <text x="620" y="114" font-size="10" fill="#3B82F6" font-weight="700" letter-spacing="1.2">优先级 3</text>

  <!-- Card title -->
  <text x="620" y="136" font-size="13.5" fill="#1E293B" font-weight="700">理念参考、不直接复制</text>

  <!-- Divider -->
  <line x1="620" y1="148" x2="862" y2="148" stroke="#E2E8F0" stroke-width="1.2"/>

  <!-- Tree root indicator -->
  <circle cx="628" cy="170" r="5" fill="#3B82F6"/>
  <text x="640" y="174" font-size="11.5" fill="#475569" font-weight="600">理念借鉴特性</text>

  <!-- Vertical tree line -->
  <line x1="628" y1="175" x2="628" y2="380" stroke="#BFDBFE" stroke-width="2" stroke-dasharray="3,2"/>

