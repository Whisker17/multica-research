    <filter id="shadowLight" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#94A3B8" flood-opacity="0.13"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60A5FA"/>
    </marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2DD4BF"/>
