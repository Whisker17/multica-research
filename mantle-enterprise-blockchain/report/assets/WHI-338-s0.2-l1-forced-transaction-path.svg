<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>

    <!-- Stronger shadow for middle card -->
    <filter id="bigShadow" x="-8%" y="-6%" width="116%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1E293B" flood-opacity="0.13"/>
    </filter>

    <!-- Subtle glow for arrow -->
    <filter id="arrowGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#6366F1" flood-opacity="0.35"/>
    </filter>

    <!-- Green pill filter -->
    <filter id="pillShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#16A34A" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BACKGROUND                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect width="900" height="550" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <pattern id="gridPat" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#CBD5E1" stroke-width="0.4" opacity="0.5"/>
  </pattern>
  <rect width="900" height="550" fill="url(#gridPat)"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TITLE BAR                                               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="40" y="18" width="820" height="48" rx="12" fill="white" filter="url(#cardShadow)" opacity="0.92"/>
  <rect x="40" y="18" width="6" height="48" rx="3" fill="#6366F1"/>
  <text x="62" y="38" font-size="11" font-weight="600" fill="#6366F1" letter-spacing="0.5">WHI-338 §0.2</text>
  <text x="62" y="55" font-size="14" font-weight="700" fill="#1E293B">L1 → L2 强制交易路径（绕过 Proxy RPC）</text>
  <!-- Chain icon -->
  <text x="835" y="49" font-size="22" text-anchor="middle">⛓️</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- TOP CARD — Ethereum 外部账户/合约                        -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="220" y="82" width="460" height="118" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Indigo accent bar -->
  <rect x="220" y="82" width="460" height="5" rx="3" fill="#6366F1"/>
  <!-- Top-right corner cap -->
  <rect x="660" y="82" width="20" height="5" rx="0" fill="#6366F1"/>

  <!-- Emoji + header -->
  <text x="248" y="112" font-size="22">🌐</text>
  <text x="278" y="108" font-size="13" font-weight="700" fill="#1E293B">Ethereum 外部账户 / 合约</text>
  <text x="278" y="124" font-size="11" fill="#6366F1" font-weight="600">任意 L1 地址</text>

  <!-- Bullet lines -->
  <text x="248" y="143" font-size="11" fill="#475569">•  直接通过 L1 合约发起强制交易</text>
  <text x="248" y="159" font-size="11" fill="#475569">•  完全绕过 ②③（无 IdP / 无 Proxy RPC 验证）</text>

  <!-- Warning badge -->
  <rect x="248" y="168" width="252" height="22" rx="11" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.2"/>
  <text x="372" y="183" font-size="10.5" font-weight="700" fill="#DC2626" text-anchor="middle">⚠️  绕过所有访问控制</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW 1 — L1 → L2 forced inclusion                     -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Vertical line -->
  <line x1="450" y1="200" x2="450" y2="228" stroke="#6366F1" stroke-width="2.5" stroke-dasharray="5,3" filter="url(#arrowGlow)"/>
  <!-- Arrowhead -->
  <polygon points="450,238 443,222 457,222" fill="#6366F1"/>
  <!-- Label -->
  <rect x="312" y="207" width="177" height="20" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="400" y="221" font-size="10" font-weight="600" fill="#4338CA" text-anchor="middle">L1 → L2 forced inclusion</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- MIDDLE CARD — PrividiumTransactionFilterer              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="80" y="238" width="740" height="198" rx="14" fill="white" filter="url(#bigShadow)"/>
  <!-- Amber accent bar -->
  <rect x="80" y="238" width="740" height="5" rx="3" fill="#F59E0B"/>

  <!-- Header row -->
  <text x="108" y="267" font-size="22">🔍</text>
  <text x="140" y="263" font-size="13" font-weight="700" fill="#1E293B">PrividiumTransactionFilterer</text>
  <text x="140" y="279" font-size="10.5" fill="#92400E" font-weight="600" letter-spacing="0.3">L1 合约  ·  访问控制门卫</text>

  <!-- Decision label -->
  <text x="450" y="300" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">发送方在白名单中？</text>
  <!-- Diamond -->
  <polygon points="450,308 460,318 450,328 440,318" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="322" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">?</text>

  <!-- ─── LEFT BRANCH ✅ ─── -->
  <!-- Line left -->
  <line x1="440" y1="318" x2="230" y2="318" stroke="#16A34A" stroke-width="2"/>
  <line x1="230" y1="318" x2="230" y2="345" stroke="#16A34A" stroke-width="2"/>
  <polygon points="230,352 224,338 236,338" fill="#16A34A"/>
  <!-- ✅ label -->
  <text x="330" y="312" font-size="10" font-weight="700" fill="#16A34A" text-anchor="middle">✅ 是</text>

  <!-- Green pill -->
  <rect x="108" y="358" width="246" height="50" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#pillShadow)"/>
  <rect x="108" y="358" width="246" height="5" rx="3" fill="#22C55E"/>
  <text x="231" y="378" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">✅ 允许不受限的强制交易</text>
  <text x="231" y="396" font-size="9.5" fill="#166534" text-anchor="middle">白名单账户可自由执行任意调用</text>

  <!-- ─── RIGHT BRANCH ❌ ─── -->
  <!-- Line right -->
  <line x1="460" y1="318" x2="670" y2="318" stroke="#DC2626" stroke-width="2"/>
  <line x1="670" y1="318" x2="670" y2="345" stroke="#DC2626" stroke-width="2"/>
  <polygon points="670,352 664,338 676,338" fill="#DC2626"/>
  <!-- ❌ label -->
  <text x="570" y="312" font-size="10" font-weight="700" fill="#DC2626" text-anchor="middle">❌ 否</text>

  <!-- Red-outlined restricted card -->
  <rect x="548" y="358" width="262" height="50" rx="12" fill="#FFF7F7" stroke="#FCA5A5" stroke-width="1.8"/>
  <rect x="548" y="358" width="262" height="5" rx="3" fill="#EF4444"/>
  <text x="679" y="377" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="middle">仅允许 ETH / ERC-20 转账</text>
  <text x="679" y="396" font-size="9.5" fill="#991B1B" text-anchor="middle">禁止合约部署和任意函数调用</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM WARNING CARDS                                    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Card 1 -->
  <rect x="80" y="450" width="372" height="64" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="80" y="450" width="372" height="5" rx="3" fill="#F59E0B"/>
  <text x="103" y="476" font-size="14">⚠️</text>
  <text x="127" y="473" font-size="11" font-weight="700" fill="#92400E">非默认部署</text>
  <text x="103" y="492" font-size="10.5" fill="#78350F">此合约非默认部署，需运营商显式配置</text>
  <text x="103" y="507" font-size="9.5" fill="#B45309">— 运营商必须在链上注册并启用该过滤器</text>

  <!-- Card 2 -->
  <rect x="468" y="450" width="372" height="64" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="468" y="450" width="372" height="5" rx="3" fill="#F59E0B"/>
  <text x="491" y="476" font-size="14">⚠️</text>
  <text x="515" y="473" font-size="11" font-weight="700" fill="#92400E">信任模型</text>
  <text x="491" y="492" font-size="10.5" fill="#78350F">信任类型: L1 合约逻辑（可审计，由运营商管理）</text>
  <text x="491" y="507" font-size="9.5" fill="#B45309">— Ethereum 安全保证，但取决于运营商诚信</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- FOOTER                                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="450" y="543" font-size="9" fill="#94A3B8" text-anchor="middle">WHI-338 §0.2 · zkSync Prividium 强制交易路径分析 · 企业区块链可行性研究</text>
</svg>
