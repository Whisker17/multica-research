<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Stronger shadow for gateway -->
    <filter id="gatewayShadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#6366F1" flood-opacity="0.20"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrowDashed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>

    <!-- Connect arrow (bidirectional label) -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowBlueRev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad)" rx="0"/>

  <!-- ──────────────────────────────────────────
       TITLE
  ────────────────────────────────────────── -->
  <text x="350" y="32" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B" letter-spacing="0.2">
    WHI-338 §1.3 多链架构（当前可行路径）
  </text>

  <!-- ──────────────────────────────────────────
       GATEWAY CARD  (top-center)
       card: 220×90 centered at x=350, top y=52
  ────────────────────────────────────────── -->
  <g filter="url(#gatewayShadow)">
    <!-- card body -->
    <rect x="240" y="52" width="220" height="90" rx="14" fill="#FFFFFF"/>
    <!-- accent bar -->
    <rect x="240" y="52" width="220" height="6" rx="3" fill="#6366F1" clip-path="url(#gwClip)"/>
    <clipPath id="gwClip">
      <rect x="240" y="52" width="220" height="6" rx="3"/>
    </clipPath>
    <!-- round top corners only trick: overlay bottom of accent bar -->
    <rect x="240" y="55" width="220" height="3" fill="#6366F1"/>
  </g>

  <!-- Gateway icon + labels -->
  <text x="350" y="97" text-anchor="middle" font-size="26" dominant-baseline="middle">🔗</text>
  <text x="350" y="118" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">ZKsync Gateway</text>
  <text x="350" y="134" text-anchor="middle" font-size="11.5" fill="#6366F1" font-weight="600">共享结算层</text>

  <!-- ──────────────────────────────────────────
       DASHED CONNECTORS  Gateway → children
       Gateway bottom center: (350, 142)
       Left child top center:  (185, 222)
       Right child top center: (515, 222)
  ────────────────────────────────────────── -->

  <!-- Left dashed line: gateway → prividium -->
  <line
    x1="350" y1="142"
    x2="185" y2="222"
    stroke="#94A3B8" stroke-width="1.8"
    stroke-dasharray="6,4"
    marker-end="url(#arrowDashed)"
  />

  <!-- Right dashed line: gateway → era -->
  <line
    x1="350" y1="142"
    x2="515" y2="222"
    stroke="#94A3B8" stroke-width="1.8"
    stroke-dasharray="6,4"
    marker-end="url(#arrowDashed)"
  />

  <!-- ──────────────────────────────────────────
       LEFT CARD — Prividium (Validium)
       220×100, left-center x=75, top y=222
  ────────────────────────────────────────── -->
  <g filter="url(#cardShadow)">
    <rect x="75" y="222" width="220" height="100" rx="14" fill="#FFFFFF"/>
    <rect x="75" y="222" width="220" height="6" rx="3" fill="#22C55E"/>
    <rect x="75" y="225" width="220" height="3" fill="#22C55E"/>
  </g>

  <!-- Prividium icon + labels -->
  <text x="185" y="265" text-anchor="middle" font-size="24" dominant-baseline="middle">🔒</text>
  <text x="185" y="286" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">Prividium</text>
  <text x="185" y="302" text-anchor="middle" font-size="11.5" fill="#64748B" font-weight="500">(Validium)</text>
  <text x="185" y="316" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="600">私有交易</text>

  <!-- ──────────────────────────────────────────
       RIGHT CARD — zkSync Era (Rollup)
       220×100, right-center x=405, top y=222
  ────────────────────────────────────────── -->
  <g filter="url(#cardShadow)">
    <rect x="405" y="222" width="220" height="100" rx="14" fill="#FFFFFF"/>
    <rect x="405" y="222" width="220" height="6" rx="3" fill="#3B82F6"/>
    <rect x="405" y="225" width="220" height="3" fill="#3B82F6"/>
  </g>

  <!-- Era icon + labels -->
  <text x="515" y="265" text-anchor="middle" font-size="24" dominant-baseline="middle">🌐</text>
  <text x="515" y="286" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">zkSync Era</text>
  <text x="515" y="302" text-anchor="middle" font-size="11.5" fill="#64748B" font-weight="500">(Rollup)</text>
  <text x="515" y="316" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="600">公开交易</text>

  <!-- ──────────────────────────────────────────
       BOTTOM: ZKsync Connect dashed line
       Connects right edge of Prividium card to
       left edge of Era card, with label below.
       Prividium right: (295, 272)
       Era left:        (405, 272)
  ────────────────────────────────────────── -->

  <!-- Dashed bidirectional line -->
  <line
    x1="299" y1="358"
    x2="401" y2="358"
    stroke="#3B82F6" stroke-width="1.8"
    stroke-dasharray="5,4"
    marker-end="url(#arrowBlue)"
    marker-start="url(#arrowBlueRev)"
  />

  <!-- Vertical drop lines from card bottoms to horizontal connector -->
  <line x1="185" y1="322" x2="185" y2="358" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="515" y1="322" x2="515" y2="358" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Horizontal connector line spanning both cards -->
  <line x1="185" y1="358" x2="299" y2="358" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="401" y1="358" x2="515" y2="358" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Label background pill -->
  <rect x="254" y="348" width="192" height="22" rx="11" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <!-- Label text -->
  <text x="350" y="363" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2563EB">
    ZKsync Connect（跨链）
  </text>

  <!-- ──────────────────────────────────────────
       FOOTER
  ────────────────────────────────────────── -->
  <text x="350" y="392" text-anchor="middle" font-size="9.5" fill="#94A3B8">
    Source: WHI-338 Prividium Architecture Research · 2026-05-08
  </text>
</svg>
