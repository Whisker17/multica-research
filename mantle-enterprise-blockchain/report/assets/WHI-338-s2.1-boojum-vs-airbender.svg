<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Arrow glow -->
    <filter id="arrowGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366F1" flood-opacity="0.35"/>
    </filter>

    <!-- Amber accent gradient -->
    <linearGradient id="amberAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB923C;stop-opacity:1" />
    </linearGradient>

    <!-- Green accent gradient -->
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>

    <!-- Bottom bar gradient -->
    <linearGradient id="bottomBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>

    <!-- Badge amber -->
    <linearGradient id="badgeAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:1" />
    </linearGradient>

    <!-- Badge green -->
    <linearGradient id="badgeGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DCFCE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBF7D0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1000" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- ── Title ── -->
  <text x="500" y="38" text-anchor="middle" font-size="17" font-weight="700" fill="#0F172A" letter-spacing="0.2">WHI-338 §2.1　ZK 证明系统演进 — Boojum vs Airbender</text>
  <line x1="120" y1="50" x2="880" y2="50" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════════════
       LEFT CARD — Boojum (Gen 1)
       ════════════════════════════════════════ -->
  <g filter="url(#cardShadow)">
    <rect x="48" y="66" width="360" height="360" rx="14" fill="white"/>
  </g>
  <!-- Amber accent bar -->
  <rect x="48" y="66" width="360" height="8" rx="4" fill="url(#amberAccent)"/>
  <rect x="48" y="70" width="360" height="4" fill="url(#amberAccent)"/>

  <!-- Gen 1 badge -->
  <rect x="342" y="80" width="52" height="22" rx="11" fill="url(#badgeAmber)"/>
  <text x="368" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">Gen 1</text>

  <!-- Icon + title row -->
  <text x="88" y="118" font-size="34">🔧</text>
  <text x="132" y="107" font-size="20" font-weight="700" fill="#1E293B">Boojum</text>
  <text x="132" y="127" font-size="13" fill="#92400E" font-weight="600">FRI-based STARK</text>

  <!-- Divider -->
  <line x1="68" y1="145" x2="388" y2="145" stroke="#FDE68A" stroke-width="1.5"/>

  <!-- Property rows -->
  <!-- Row 1 -->
  <rect x="68" y="158" width="320" height="38" rx="8" fill="#FFFBEB"/>
  <circle cx="90" cy="177" r="6" fill="#F59E0B"/>
  <text x="106" y="181" font-size="13.5" fill="#1E293B" font-weight="500">CPU 密集型</text>

  <!-- Row 2 -->
  <rect x="68" y="204" width="320" height="38" rx="8" fill="#FFF7ED"/>
  <circle cx="90" cy="223" r="6" fill="#FB923C"/>
  <text x="106" y="227" font-size="13.5" fill="#1E293B" font-weight="500">分钟级证明时间</text>

  <!-- Row 3 -->
  <rect x="68" y="250" width="320" height="38" rx="8" fill="#FFFBEB"/>
  <circle cx="90" cy="269" r="6" fill="#F59E0B"/>
  <text x="106" y="273" font-size="13.5" fill="#1E293B" font-weight="500">较高硬件门槛</text>

  <!-- Row 4 -->
  <rect x="68" y="296" width="320" height="38" rx="8" fill="#FFF7ED"/>
  <circle cx="90" cy="315" r="6" fill="#FB923C"/>
  <text x="106" y="319" font-size="13.5" fill="#1E293B" font-weight="500">单 VM 支持</text>

  <!-- Row 5 -->
  <rect x="68" y="342" width="320" height="38" rx="8" fill="#FFFBEB"/>
  <circle cx="90" cy="361" r="6" fill="#16A34A"/>
  <text x="106" y="365" font-size="13.5" fill="#1E293B" font-weight="500">已部署 (Era)　</text>
  <rect x="268" y="350" width="52" height="18" rx="9" fill="#DCFCE7"/>
  <text x="294" y="363" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">✓ 生产</text>

  <!-- ════════════════════════════════════════
       CENTER — Evolution Arrow
       ════════════════════════════════════════ -->
  <!-- Arrow shaft -->
  <g filter="url(#arrowGlow)">
    <line x1="436" y1="240" x2="560" y2="240" stroke="#6366F1" stroke-width="4" stroke-linecap="round"/>
    <polygon points="560,230 576,240 560,250" fill="#6366F1"/>
  </g>

  <!-- Dashed evolution trail -->
  <line x1="430" y1="240" x2="564" y2="240" stroke="#A5B4FC" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- "进化" label -->
  <rect x="455" y="204" width="90" height="26" rx="13" fill="#EEF2FF"/>
  <text x="500" y="221" text-anchor="middle" font-size="12" font-weight="700" fill="#4338CA" letter-spacing="1">── 进化 ──→</text>

  <!-- Sparkle decorations -->
  <text x="476" y="270" font-size="14" opacity="0.85">✨</text>
  <text x="514" y="212" font-size="11" opacity="0.7">⚡</text>
  <text x="498" y="275" font-size="10" opacity="0.6">💡</text>

  <!-- ════════════════════════════════════════
       RIGHT CARD — Airbender (Gen 2)
       ════════════════════════════════════════ -->
  <g filter="url(#cardShadow)">
    <rect x="592" y="66" width="360" height="360" rx="14" fill="white"/>
  </g>
  <!-- Green accent bar -->
  <rect x="592" y="66" width="360" height="8" rx="4" fill="url(#greenAccent)"/>
  <rect x="592" y="70" width="360" height="4" fill="url(#greenAccent)"/>

  <!-- Gen 2 badge -->
  <rect x="886" y="80" width="52" height="22" rx="11" fill="url(#badgeGreen)"/>
  <text x="912" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Gen 2</text>

  <!-- Icon + title row -->
  <text x="632" y="118" font-size="34">🚀</text>
  <text x="676" y="107" font-size="20" font-weight="700" fill="#1E293B">Airbender</text>
  <text x="676" y="127" font-size="13" fill="#15803D" font-weight="600">RISC-V Prover</text>

  <!-- Divider -->
  <line x1="612" y1="145" x2="932" y2="145" stroke="#BBF7D0" stroke-width="1.5"/>

  <!-- Property rows -->
  <!-- Row 1 -->
  <rect x="612" y="158" width="320" height="38" rx="8" fill="#F0FDF4"/>
  <circle cx="634" cy="177" r="6" fill="#22C55E"/>
  <text x="650" y="181" font-size="13.5" fill="#1E293B" font-weight="500">CUDA GPU 加速</text>

  <!-- Row 2 -->
  <rect x="612" y="204" width="320" height="38" rx="8" fill="#ECFDF5"/>
  <circle cx="634" cy="223" r="6" fill="#10B981"/>
  <text x="650" y="227" font-size="13.5" fill="#1E293B" font-weight="500">亚秒级证明时间</text>

  <!-- Row 3 -->
  <rect x="612" y="250" width="320" height="38" rx="8" fill="#F0FDF4"/>
  <circle cx="634" cy="269" r="6" fill="#22C55E"/>
  <text x="650" y="273" font-size="13.5" fill="#1E293B" font-weight="500">商用 GPU 即可</text>

  <!-- Row 4 -->
  <rect x="612" y="296" width="320" height="38" rx="8" fill="#ECFDF5"/>
  <circle cx="634" cy="315" r="6" fill="#10B981"/>
  <text x="650" y="319" font-size="13.5" fill="#1E293B" font-weight="500">多 VM 支持 (含完整 EVM 等价)</text>

  <!-- Row 5 -->
  <rect x="612" y="342" width="320" height="38" rx="8" fill="#F0FDF4"/>
  <circle cx="634" cy="361" r="6" fill="#6366F1"/>
  <text x="650" y="365" font-size="13.5" fill="#1E293B" font-weight="500">Atlas 升级引入</text>
  <rect x="840" y="350" width="68" height="18" rx="9" fill="#EEF2FF"/>
  <text x="874" y="363" text-anchor="middle" font-size="10" font-weight="700" fill="#4338CA">🔭 即将上线</text>

  <!-- ════════════════════════════════════════
       BOTTOM STRIP — Shared Properties
       ════════════════════════════════════════ -->
  <rect x="48" y="442" width="904" height="42" rx="12" fill="url(#bottomBarGrad)"/>

  <!-- Shield icon -->
  <text x="76" y="469" font-size="16">🛡️</text>

  <!-- Label -->
  <text x="100" y="469" font-size="12.5" fill="#94A3B8" font-weight="600">共同属性:</text>

  <!-- Divider dots -->
  <text x="178" y="469" font-size="13" fill="#64748B">·</text>

  <!-- Property 1 -->
  <rect x="188" y="453" width="120" height="22" rx="11" fill="#334155"/>
  <text x="248" y="468" text-anchor="middle" font-size="11.5" fill="#E2E8F0" font-weight="500">无需可信设置</text>

  <!-- Separator -->
  <text x="314" y="469" font-size="13" fill="#475569">|</text>

  <!-- Property 2 -->
  <rect x="324" y="453" width="104" height="22" rx="11" fill="#334155"/>
  <text x="376" y="468" text-anchor="middle" font-size="11.5" fill="#E2E8F0" font-weight="500">量子安全</text>

  <!-- Separator -->
  <text x="434" y="469" font-size="13" fill="#475569">|</text>

  <!-- Property 3 -->
  <rect x="444" y="453" width="140" height="22" rx="11" fill="#334155"/>
  <text x="514" y="468" text-anchor="middle" font-size="11.5" fill="#E2E8F0" font-weight="500">相同安全保证</text>

  <!-- Lock icon decoration right side -->
  <text x="888" y="469" font-size="15">🔒</text>
  <text x="864" y="469" font-size="15">⚛️</text>

</svg>
