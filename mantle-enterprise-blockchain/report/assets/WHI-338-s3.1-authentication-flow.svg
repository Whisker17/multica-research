<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="1000" height="550" font-family="Inter, system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000018" />
    </filter>

    <!-- Pill drop shadow -->
    <filter id="pillShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020" />
    </filter>

    <!-- Blue accent gradient -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>

    <!-- Indigo accent gradient -->
    <linearGradient id="indigoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1" />
    </linearGradient>

    <!-- Green accent gradient -->
    <linearGradient id="greenAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ADE80;stop-opacity:1" />
    </linearGradient>

    <!-- Output pill gradient -->
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16A34A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:1" />
    </linearGradient>

    <!-- Start node gradient -->
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94A3B8;stop-opacity:1" />
    </linearGradient>

    <!-- Arrowhead markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6" />
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366F1" />
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E" />
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8" />
    </marker>
    <marker id="arrowOutput" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16A34A" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="550" fill="url(#bgGrad)" rx="0" />

  <!-- ─────────────── TITLE ─────────────── -->
  <text x="500" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1E293B" letter-spacing="0.3">WHI-338 §3.1 身份认证层 — SSO 集成认证流程</text>
  <text x="500" y="52" text-anchor="middle" font-size="11" fill="#64748B">Prividium Authentication Layer: OIDC / SIWE / Hybrid Flow</text>

  <!-- ─────────────── START NODE ─────────────── -->
  <!-- Pill -->
  <rect x="330" y="68" width="340" height="36" rx="18" fill="url(#startGrad)" filter="url(#pillShadow)" />
  <text x="500" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="white">👤 用户</text>
  <text x="500" y="96" text-anchor="middle" font-size="11" fill="#E2E8F0">选择认证方式 ▼</text>

  <!-- Fan-out arrows from start node to three cards -->
  <!-- To Card A -->
  <line x1="394" y1="104" x2="178" y2="138" stroke="#3B82F6" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowBlue)" />
  <!-- To Card B -->
  <line x1="500" y1="104" x2="500" y2="138" stroke="#6366F1" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowIndigo)" />
  <!-- To Card C -->
  <line x1="606" y1="104" x2="822" y2="138" stroke="#22C55E" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrowGreen)" />

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CARD A — OIDC                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="28" y="138" width="295" height="310" rx="14" fill="white" filter="url(#cardShadow)" />
  <!-- Accent bar -->
  <rect x="28" y="138" width="295" height="6" rx="3" fill="url(#blueAccent)" />
  <!-- Card header -->
  <text x="176" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#1E3A8A">🏢 Card A — OIDC</text>
  <text x="176" y="181" text-anchor="middle" font-size="11" fill="#3B82F6" font-weight="600">企业 SSO</text>

  <!-- Step boxes inside Card A -->
  <!-- Step 1 -->
  <rect x="46" y="192" width="259" height="30" rx="7" fill="#EFF6FF" />
  <text x="176" y="211" text-anchor="middle" font-size="11" fill="#1D4ED8">① 用户 → Okta 登录页</text>
  <!-- Arrow -->
  <line x1="176" y1="222" x2="176" y2="232" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <!-- Step 2 -->
  <rect x="46" y="232" width="259" height="30" rx="7" fill="#EFF6FF" />
  <text x="176" y="251" text-anchor="middle" font-size="11" fill="#1D4ED8">② MFA 验证</text>
  <!-- Arrow -->
  <line x1="176" y1="262" x2="176" y2="272" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <!-- Step 3 -->
  <rect x="46" y="272" width="259" height="30" rx="7" fill="#DBEAFE" />
  <text x="176" y="291" text-anchor="middle" font-size="11" fill="#1D4ED8" font-weight="600">③ OIDC Token 签发</text>
  <!-- Arrow -->
  <line x1="176" y1="302" x2="176" y2="312" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <!-- Step 4 -->
  <rect x="46" y="312" width="259" height="30" rx="7" fill="#EFF6FF" />
  <text x="176" y="331" text-anchor="middle" font-size="11" fill="#1E40AF">④ subject ID → 用户记录映射</text>
  <!-- Arrow -->
  <line x1="176" y1="342" x2="176" y2="352" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <!-- Step 5 -->
  <rect x="46" y="352" width="259" height="30" rx="7" fill="#EFF6FF" />
  <text x="176" y="371" text-anchor="middle" font-size="11" fill="#1E40AF">⑤ 检索角色和权限</text>
  <!-- Arrow -->
  <line x1="176" y1="382" x2="176" y2="392" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)" />
  <!-- Step 6 — JWT output pill inside card -->
  <rect x="56" y="392" width="239" height="40" rx="10" fill="url(#blueAccent)" />
  <text x="176" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="white">⑥ 签发 JWT</text>
  <text x="176" y="423" text-anchor="middle" font-size="10" fill="#DBEAFE">含身份 + 角色声明</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CARD B — SIWE                                          -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="353" y="138" width="295" height="310" rx="14" fill="white" filter="url(#cardShadow)" />
  <!-- Accent bar -->
  <rect x="353" y="138" width="295" height="6" rx="3" fill="url(#indigoAccent)" />
  <!-- Card header -->
  <text x="500" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#312E81">🦊 Card B — SIWE</text>
  <text x="500" y="181" text-anchor="middle" font-size="11" fill="#6366F1" font-weight="600">钱包签名</text>

  <!-- Step boxes inside Card B -->
  <rect x="371" y="192" width="259" height="30" rx="7" fill="#EEF2FF" />
  <text x="500" y="211" text-anchor="middle" font-size="11" fill="#3730A3">① 用户 → 钱包签名 SIWE 消息</text>
  <line x1="500" y1="222" x2="500" y2="232" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)" />

  <rect x="371" y="232" width="259" height="30" rx="7" fill="#EEF2FF" />
  <text x="500" y="251" text-anchor="middle" font-size="11" fill="#3730A3">② 签名验证</text>
  <line x1="500" y1="262" x2="500" y2="272" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)" />

  <rect x="371" y="272" width="259" height="30" rx="7" fill="#E0E7FF" />
  <text x="500" y="291" text-anchor="middle" font-size="11" fill="#3730A3" font-weight="600">③ 钱包地址匹配用户记录</text>
  <line x1="500" y1="302" x2="500" y2="312" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)" />

  <rect x="371" y="312" width="259" height="30" rx="7" fill="#EEF2FF" />
  <text x="500" y="331" text-anchor="middle" font-size="11" fill="#3730A3">④ Prividium 用户记录映射</text>
  <line x1="500" y1="342" x2="500" y2="352" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)" />

  <rect x="371" y="352" width="259" height="30" rx="7" fill="#EEF2FF" />
  <text x="500" y="371" text-anchor="middle" font-size="11" fill="#3730A3">⑤ 检索角色和权限</text>
  <line x1="500" y1="382" x2="500" y2="392" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowIndigo)" />

  <rect x="381" y="392" width="239" height="40" rx="10" fill="url(#indigoAccent)" />
  <text x="500" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="white">⑥ 签发 JWT</text>
  <text x="500" y="423" text-anchor="middle" font-size="10" fill="#E0E7FF">含身份 + 角色声明</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CARD C — HYBRID                                        -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="678" y="138" width="295" height="310" rx="14" fill="white" filter="url(#cardShadow)" />
  <!-- Accent bar -->
  <rect x="678" y="138" width="295" height="6" rx="3" fill="url(#greenAccent)" />
  <!-- Card header -->
  <text x="825" y="165" text-anchor="middle" font-size="14" font-weight="700" fill="#14532D">🔄 Card C — 混合用户</text>
  <text x="825" y="181" text-anchor="middle" font-size="11" fill="#22C55E" font-weight="600">Hybrid Authentication</text>

  <!-- Note box -->
  <rect x="696" y="192" width="259" height="44" rx="7" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1" />
  <text x="825" y="208" text-anchor="middle" font-size="10.5" fill="#166534">用户可通过 OIDC 或 SIWE</text>
  <text x="825" y="224" text-anchor="middle" font-size="10.5" fill="#166534">任意一种方式认证</text>

  <!-- Dual path indicator -->
  <line x1="825" y1="236" x2="825" y2="252" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <rect x="696" y="252" width="115" height="28" rx="7" fill="#DCFCE7" />
  <text x="754" y="270" text-anchor="middle" font-size="10" fill="#166534">via OIDC</text>
  <rect x="820" y="252" width="115" height="28" rx="7" fill="#DCFCE7" />
  <text x="877" y="270" text-anchor="middle" font-size="10" fill="#166534">via SIWE</text>

  <!-- Converge arrow -->
  <line x1="754" y1="280" x2="825" y2="296" stroke="#22C55E" stroke-width="1.2" marker-end="url(#arrowGreen)" />
  <line x1="877" y1="280" x2="825" y2="296" stroke="#22C55E" stroke-width="1.2" marker-end="url(#arrowGreen)" />

  <rect x="696" y="296" width="259" height="30" rx="7" fill="#DCFCE7" />
  <text x="825" y="315" text-anchor="middle" font-size="11" fill="#15803D" font-weight="600">映射到同一用户记录</text>
  <line x1="825" y1="326" x2="825" y2="352" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <rect x="696" y="352" width="259" height="30" rx="7" fill="#DCFCE7" />
  <text x="825" y="371" text-anchor="middle" font-size="11" fill="#15803D">相同的角色和权限</text>
  <line x1="825" y1="382" x2="825" y2="392" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)" />

  <rect x="706" y="392" width="239" height="40" rx="10" fill="url(#greenAccent)" />
  <text x="825" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="white">✅ 签发 JWT</text>
  <text x="825" y="423" text-anchor="middle" font-size="10" fill="#DCFCE7">含身份 + 角色声明</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CONVERGENCE ARROWS → JWT → Proxy RPC                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- From Card A JWT pill -->
  <path d="M 176,432 C 176,465 500,465 500,478" stroke="#3B82F6" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOutput)" />
  <!-- From Card B JWT pill -->
  <line x1="500" y1="432" x2="500" y2="478" stroke="#6366F1" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrowOutput)" />
  <!-- From Card C JWT pill -->
  <path d="M 825,432 C 825,465 500,465 500,478" stroke="#22C55E" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOutput)" />

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- OUTPUT PILL — JWT Token → Proxy RPC                    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="330" y="478" width="340" height="52" rx="18" fill="url(#outputGrad)" filter="url(#pillShadow)" />
  <text x="500" y="499" text-anchor="middle" font-size="13" font-weight="700" fill="white">🔑 JWT Token → Proxy RPC</text>
  <text x="500" y="517" text-anchor="middle" font-size="11" fill="#DCFCE7">身份验证完成 · 角色授权就绪</text>

  <!-- ─────────────── LEGEND ─────────────── -->
  <rect x="28" y="494" width="190" height="46" rx="10" fill="white" fill-opacity="0.85" filter="url(#cardShadow)" />
  <text x="38" y="511" font-size="10" fill="#64748B" font-weight="600">图例</text>
  <rect x="38" y="516" width="10" height="3" rx="1" fill="#3B82F6" />
  <text x="52" y="521" font-size="9.5" fill="#64748B">OIDC 路径</text>
  <rect x="90" y="516" width="10" height="3" rx="1" fill="#6366F1" />
  <text x="104" y="521" font-size="9.5" fill="#64748B">SIWE 路径</text>
  <rect x="38" y="528" width="10" height="3" rx="1" fill="#22C55E" />
  <text x="52" y="534" font-size="9.5" fill="#64748B">混合路径</text>
  <rect x="90" y="528" width="10" height="3" rx="1" fill="#16A34A" />
  <text x="104" y="534" font-size="9.5" fill="#64748B">输出汇聚</text>

  <!-- Watermark -->
  <text x="972" y="543" text-anchor="end" font-size="9" fill="#CBD5E1">WHI-338 §3.1 · 2026-05-08</text>
</svg>
