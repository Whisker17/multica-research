<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="1000" height="550" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#EEF2F7"/>
    </linearGradient>

    <!-- Card drop shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.10"/>
    </filter>

    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>

    <!-- Arrow marker — red/amber -->
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>

    <!-- Arrow marker — green -->
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>

    <!-- Strike-through red line for NO middleman -->
    <marker id="arrowStrike" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444" opacity="0.4"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="1000" height="550" fill="url(#bgGrad)"/>

  <!-- ══════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════ -->
  <text x="500" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A" letter-spacing="-0.3">
    WHI-338 §4.1 传统合规 vs ZK 合规模式
  </text>

  <!-- ══════════════════════════════════════════
       SECTION LABEL — Traditional (top)
  ══════════════════════════════════════════ -->
  <!-- Section pill -->
  <rect x="28" y="62" width="200" height="28" rx="8" fill="#FEF3C7"/>
  <text x="128" y="81" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">⚠ 传统合规模式</text>

  <!-- ── CARD 1: 银行 A (traditional) ── -->
  <g filter="url(#cardShadow)">
    <rect x="28" y="102" width="200" height="140" rx="14" fill="white"/>
    <!-- Red accent bar -->
    <rect x="28" y="102" width="200" height="6" rx="14" fill="#EF4444"/>
    <rect x="28" y="108" width="200" height="6" fill="#EF4444"/>
  </g>
  <text x="128" y="140" text-anchor="middle" font-size="36">🏦</text>
  <text x="128" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">银行 A</text>
  <text x="128" y="191" text-anchor="middle" font-size="11.5" fill="#64748B">完整交易数据暴露</text>
  <!-- Data badge -->
  <rect x="58" y="205" width="140" height="24" rx="6" fill="#FEE2E2"/>
  <text x="128" y="221" text-anchor="middle" font-size="10.5" font-weight="600" fill="#B91C1C">📤 全部 PII 外发</text>

  <!-- Arrow 1 → 2 (传统) with label -->
  <line x1="230" y1="172" x2="368" y2="172" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowRed)" stroke-dasharray="none"/>
  <rect x="264" y="152" width="70" height="18" rx="5" fill="#FEF9EE"/>
  <text x="299" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">完整数据 →</text>

  <!-- ── CARD 2: 中间人 ── -->
  <g filter="url(#cardShadow)">
    <rect x="370" y="102" width="258" height="140" rx="14" fill="white"/>
    <rect x="370" y="102" width="258" height="6" rx="14" fill="#F59E0B"/>
    <rect x="370" y="108" width="258" height="6" fill="#F59E0B"/>
  </g>
  <text x="499" y="140" text-anchor="middle" font-size="36">🔄</text>
  <text x="499" y="170" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1E293B">中间人</text>
  <text x="499" y="188" text-anchor="middle" font-size="11" fill="#64748B">(清算所 / 审计公司)</text>
  <text x="499" y="208" text-anchor="middle" font-size="11" fill="#64748B">存储全部 PII 数据</text>
  <!-- Data badge -->
  <rect x="409" y="218" width="180" height="24" rx="6" fill="#FEF3C7"/>
  <text x="499" y="234" text-anchor="middle" font-size="10.5" font-weight="600" fill="#92400E">💾 PII 副本 × 风险叠加</text>

  <!-- Arrow 2 → 3 (传统) with label -->
  <line x1="630" y1="172" x2="768" y2="172" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="664" y="152" width="70" height="18" rx="5" fill="#FEF9EE"/>
  <text x="699" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">完整数据 →</text>

  <!-- ── CARD 3: 监管机构 (traditional) ── -->
  <g filter="url(#cardShadow)">
    <rect x="770" y="102" width="202" height="140" rx="14" fill="white"/>
    <rect x="770" y="102" width="202" height="6" rx="14" fill="#EF4444"/>
    <rect x="770" y="108" width="202" height="6" fill="#EF4444"/>
  </g>
  <text x="871" y="140" text-anchor="middle" font-size="36">🏛️</text>
  <text x="871" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">监管机构</text>
  <text x="871" y="191" text-anchor="middle" font-size="11.5" fill="#64748B">存储全部 PII 数据</text>
  <!-- Data badge -->
  <rect x="801" y="205" width="140" height="24" rx="6" fill="#FEE2E2"/>
  <text x="871" y="221" text-anchor="middle" font-size="10.5" font-weight="600" fill="#B91C1C">💾 PII 副本 × 风险</text>

  <!-- ── Problem badge ── -->
  <g filter="url(#badgeShadow)">
    <rect x="200" y="264" width="600" height="38" rx="10" fill="#FEE2E2" stroke="#FECACA" stroke-width="1"/>
  </g>
  <text x="500" y="279" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">⚠️  问题：多方持有完整 PII</text>
  <text x="500" y="295" text-anchor="middle" font-size="11.5" fill="#B91C1C">→ 隐私泄露风险 × N（每增一个中间方，攻击面倍增）</text>

  <!-- ══════════════════════════════════════════
       DIVIDER
  ══════════════════════════════════════════ -->
  <line x1="28" y1="322" x2="972" y2="322" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- ══════════════════════════════════════════
       SECTION LABEL — ZK (bottom)
  ══════════════════════════════════════════ -->
  <rect x="28" y="332" width="230" height="28" rx="8" fill="#D1FAE5"/>
  <text x="143" y="351" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">✅ ZK 合规模式（Prividium）</text>

  <!-- ── CARD 1: 银行 A (ZK) ── -->
  <g filter="url(#cardShadow)">
    <rect x="28" y="372" width="200" height="140" rx="14" fill="white"/>
    <rect x="28" y="372" width="200" height="6" rx="14" fill="#10B981"/>
    <rect x="28" y="378" width="200" height="6" fill="#10B981"/>
  </g>
  <text x="128" y="410" text-anchor="middle" font-size="36">🏦</text>
  <text x="128" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">银行 A</text>
  <text x="128" y="461" text-anchor="middle" font-size="11.5" fill="#64748B">本地持有完整数据</text>
  <rect x="48" y="472" width="160" height="24" rx="6" fill="#D1FAE5"/>
  <text x="128" y="488" text-anchor="middle" font-size="10.5" font-weight="600" fill="#065F46">🔒 PII 不离境</text>

  <!-- ── NO middleman zone ── -->
  <!-- Ghost / crossed-out middle card -->
  <rect x="370" y="372" width="258" height="140" rx="14" fill="white" opacity="0.35" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="7,4"/>
  <!-- Big X mark -->
  <line x1="390" y1="390" x2="608" y2="494" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="608" y1="390" x2="390" y2="494" stroke="#EF4444" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <!-- "No middleman" label -->
  <text x="499" y="435" text-anchor="middle" font-size="13" font-weight="700" fill="#EF4444" opacity="0.65">中间人已消除</text>
  <text x="499" y="455" text-anchor="middle" font-size="11" fill="#EF4444" opacity="0.55">NO MIDDLEMAN</text>

  <!-- Arrow 1 → 3 (ZK) — skips middleman, long arrow over empty zone -->
  <!-- Short segment Bank→left of ghost -->
  <line x1="230" y1="442" x2="358" y2="442" stroke="#10B981" stroke-width="2.5" stroke-dasharray="none"/>
  <!-- Gap over ghost zone (dashed to signal "skip") -->
  <line x1="358" y1="442" x2="632" y2="442" stroke="#10B981" stroke-width="2.5" stroke-dasharray="8,5"/>
  <!-- Final segment to regulator -->
  <line x1="632" y1="442" x2="768" y2="442" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <!-- Arrow label -->
  <rect x="390" y="418" width="218" height="20" rx="6" fill="#F0FDF4"/>
  <text x="499" y="431" text-anchor="middle" font-size="10.5" font-weight="700" fill="#065F46">⚡ ZK 证明（无 PII）</text>

  <!-- ── CARD 3: 监管机构 (ZK) ── -->
  <g filter="url(#cardShadow)">
    <rect x="770" y="372" width="202" height="140" rx="14" fill="white"/>
    <rect x="770" y="372" width="202" height="6" rx="14" fill="#10B981"/>
    <rect x="770" y="378" width="202" height="6" fill="#10B981"/>
  </g>
  <text x="871" y="410" text-anchor="middle" font-size="36">🏛️</text>
  <text x="871" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">监管机构</text>
  <text x="871" y="460" text-anchor="middle" font-size="11" fill="#64748B">验证证明，无需存储</text>
  <text x="871" y="476" text-anchor="middle" font-size="11" fill="#64748B">PII 数据</text>
  <rect x="791" y="486" width="160" height="24" rx="6" fill="#D1FAE5"/>
  <text x="871" y="502" text-anchor="middle" font-size="10.5" font-weight="600" fill="#065F46">✅ 零 PII 存储</text>

  <!-- ── Advantage badge ── -->
  <g filter="url(#badgeShadow)">
    <rect x="200" y="527" width="600" height="16" rx="8" fill="#D1FAE5" stroke="#A7F3D0" stroke-width="1"/>
  </g>
  <text x="500" y="538.5" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">🎯 优势：零 PII 暴露 + 更高质量的合规信号（完整性由密码学保证）</text>
</svg>
