<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>

    <!-- Drop shadow for pills -->
    <filter id="pillShadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#64748B" flood-opacity="0.13"/>
    </filter>

    <!-- Arrow marker — dark gray -->
    <marker id="arrow" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#64748B"/>
    </marker>

    <!-- Arrow marker — blue (Tempo) -->
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#3B82F6"/>
    </marker>

    <!-- Arrow marker — green (Zones) -->
    <marker id="arrowGreen" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#22C55E"/>
    </marker>

    <!-- Arrow marker — orange (git dep) -->
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="550" fill="url(#bgGrad)"/>

  <!-- ── Title ── -->
  <text x="450" y="34" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B" letter-spacing="0.3">WHI-340 §2.4 Tempo / Zones 依赖关系图</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748B">Tempo L1 (v1.6.0) → Zones L2 (v0.1.0) · git dependency chain</text>

  <!-- ══════════════════════════════════════
       TEMPO L1 CARD
  ══════════════════════════════════════ -->
  <rect x="40" y="68" width="820" height="196" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Blue accent bar -->
  <rect x="40" y="68" width="6" height="196" rx="3" fill="#3B82F6"/>

  <!-- Card header -->
  <text x="64" y="90" font-size="13" font-weight="700" fill="#1E293B">🔵  Tempo L1</text>
  <text x="64" y="107" font-size="11" fill="#64748B">crates/  ·  v1.6.0  ·  reth-based Ethereum execution client + HotShot consensus</text>

  <!-- ── ROW 1: primitives chain ── -->
  <!-- primitives pill -->
  <rect x="76" y="122" width="86" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="119" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">primitives</text>

  <!-- primitives → chainspec -->
  <line x1="162" y1="135" x2="192" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="196" y="122" width="74" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="233" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">chainspec</text>

  <!-- chainspec → evm -->
  <line x1="270" y1="135" x2="298" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="302" y="122" width="46" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="325" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">evm</text>

  <!-- ── ROW 2: primitives → contracts → precompiles → node ── -->
  <!-- primitives already placed at (76,148) — draw connector down from row1 pill -->
  <line x1="119" y1="148" x2="119" y2="162" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- contracts pill -->
  <rect x="76" y="162" width="76" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="114" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">contracts</text>

  <!-- contracts → precompiles -->
  <line x1="152" y1="175" x2="182" y2="175" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="186" y="162" width="82" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="227" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">precompiles</text>

  <!-- precompiles → node -->
  <line x1="268" y1="175" x2="298" y2="175" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="302" y="162" width="46" height="26" rx="6" fill="#DBEAFE" filter="url(#pillShadow)"/>
  <text x="325" y="179" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8" font-family="'JetBrains Mono', 'Fira Code', monospace">node</text>

  <!-- ── Consensus row ── -->
  <!-- consensus pill -->
  <rect x="420" y="122" width="82" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="461" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">consensus</text>

  <!-- arrow from commonware-node → consensus (reverse: commonware provides consensus) -->
  <line x1="594" y1="135" x2="508" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- commonware-node pill (external dep) -->
  <rect x="598" y="122" width="120" height="26" rx="6" fill="#F0FDF4" filter="url(#pillShadow)" stroke="#86EFAC" stroke-width="1"/>
  <text x="658" y="136" text-anchor="middle" font-size="9.5" font-weight="600" fill="#15803D" font-family="'JetBrains Mono', 'Fira Code', monospace">commonware-node</text>
  <text x="658" y="146" text-anchor="middle" font-size="8" fill="#16A34A">(external crate)</text>

  <!-- ── tx-pool → payload/builder row ── -->
  <rect x="420" y="162" width="92" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="466" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">transaction-pool</text>

  <!-- tx-pool → payload/builder -->
  <line x1="512" y1="175" x2="542" y2="175" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <rect x="546" y="162" width="108" height="26" rx="6" fill="#EFF6FF" filter="url(#pillShadow)"/>
  <text x="600" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB" font-family="'JetBrains Mono', 'Fira Code', monospace">payload/builder</text>

  <!-- divider label -->
  <line x1="395" y1="118" x2="395" y2="248" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="393" y="116" text-anchor="end" font-size="9" fill="#94A3B8">core chain</text>
  <text x="397" y="116" font-size="9" fill="#94A3B8">engine + consensus</text>

  <!-- ── Legend row inside Tempo card ── -->
  <circle cx="76" cy="238" r="4" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="85" y="242" font-size="9" fill="#64748B">internal crate</text>
  <rect x="148" y="234" width="32" height="8" rx="3" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="186" y="242" font-size="9" fill="#64748B">external crate</text>
  <line x1="244" y1="238" x2="262" y2="238" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="268" y="242" font-size="9" fill="#64748B">depends on</text>

  <!-- ══════════════════════════════════════
       GIT DEPENDENCY CONNECTOR
  ══════════════════════════════════════ -->
  <line x1="450" y1="264" x2="450" y2="302" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowOrange)"/>

  <!-- Label on connector -->
  <rect x="348" y="272" width="204" height="24" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="450" y="288" text-anchor="middle" font-size="10.5" font-weight="600" fill="#B45309">📦  Cargo.toml  git dependency</text>

  <!-- ══════════════════════════════════════
       ZONES L2 CARD
  ══════════════════════════════════════ -->
  <rect x="40" y="306" width="820" height="214" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Green accent bar -->
  <rect x="40" y="306" width="6" height="214" rx="3" fill="#22C55E"/>

  <!-- Card header -->
  <text x="64" y="328" font-size="13" font-weight="700" fill="#1E293B">🟢  Zones L2</text>
  <text x="64" y="345" font-size="11" fill="#64748B">crates/  ·  v0.1.0  ·  Tempo-aware sequencer/rollup  ·  no_std primitives</text>

  <!-- ── ROW A: primitives (no_std) → precompiles ── -->
  <!-- primitives pill (no_std badge) -->
  <rect x="76" y="360" width="104" height="26" rx="6" fill="#F0FDF4" filter="url(#pillShadow)"/>
  <text x="128" y="377" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D" font-family="'JetBrains Mono', 'Fira Code', monospace">primitives</text>
  <!-- no_std badge -->
  <rect x="130" y="360" width="46" height="12" rx="3" fill="#DCFCE7"/>
  <text x="153" y="370" text-anchor="middle" font-size="7.5" font-weight="700" fill="#166534">no_std</text>

  <!-- primitives → precompiles -->
  <line x1="180" y1="373" x2="210" y2="373" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="214" y="360" width="82" height="26" rx="6" fill="#F0FDF4" filter="url(#pillShadow)"/>
  <text x="255" y="377" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D" font-family="'JetBrains Mono', 'Fira Code', monospace">precompiles</text>

  <!-- ── ROW B: primitives → tempo-zone ── -->
  <line x1="128" y1="386" x2="128" y2="400" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- tempo-zone pill (central) -->
  <rect x="76" y="400" width="104" height="26" rx="6" fill="#DCFCE7" filter="url(#pillShadow)" stroke="#4ADE80" stroke-width="1"/>
  <text x="128" y="417" text-anchor="middle" font-size="10" font-weight="700" fill="#14532D" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-zone</text>

  <!-- Sub-module chips row inside tempo-zone region -->
  <text x="196" y="407" font-size="8.5" fill="#94A3B8">(sub-modules)</text>
  <!-- engine chip -->
  <rect x="196" y="411" width="46" height="16" rx="4" fill="#BBF7D0"/>
  <text x="219" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">engine</text>
  <!-- l1 chip -->
  <rect x="248" y="411" width="28" height="16" rx="4" fill="#BBF7D0"/>
  <text x="262" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">l1</text>
  <!-- batch chip -->
  <rect x="282" y="411" width="36" height="16" rx="4" fill="#BBF7D0"/>
  <text x="300" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">batch</text>
  <!-- ... chip -->
  <text x="328" y="422" font-size="9" fill="#94A3B8">···</text>

  <!-- ── ROW C: tempo-zone → rpc ── -->
  <line x1="180" y1="413" x2="430" y2="413" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="1,0" marker-end="url(#arrowGreen)"/>

  <!-- rpc pill (central) -->
  <rect x="434" y="400" width="46" height="26" rx="6" fill="#DCFCE7" filter="url(#pillShadow)" stroke="#4ADE80" stroke-width="1"/>
  <text x="457" y="417" text-anchor="middle" font-size="10" font-weight="700" fill="#14532D" font-family="'JetBrains Mono', 'Fira Code', monospace">rpc</text>

  <!-- rpc sub-module chips -->
  <text x="490" y="407" font-size="8.5" fill="#94A3B8">(sub-modules)</text>
  <!-- auth chip -->
  <rect x="490" y="411" width="32" height="16" rx="4" fill="#BBF7D0"/>
  <text x="506" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">auth</text>
  <!-- handlers chip -->
  <rect x="528" y="411" width="58" height="16" rx="4" fill="#BBF7D0"/>
  <text x="557" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">handlers</text>
  <!-- proxy chip -->
  <rect x="592" y="411" width="42" height="16" rx="4" fill="#BBF7D0"/>
  <text x="613" y="422" text-anchor="middle" font-size="8" font-weight="600" fill="#166534" font-family="'JetBrains Mono', 'Fira Code', monospace">proxy</text>

  <!-- ── Vertical connector: tempo-zone → rpc (angled path via node) ── -->
  <!-- already handled by horizontal arrow above -->

  <!-- ── Tempo-zone also feeds up to precompiles (via curved path hint) ── -->
  <!-- optional: show tempo-zone shares primitives -->
  <path d="M 128 400 Q 128 390 255 386" stroke="#22C55E" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.5"/>

  <!-- ── Legend row inside Zones card ── -->
  <circle cx="76" cy="490" r="4" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="85" y="494" font-size="9" fill="#64748B">internal crate</text>
  <rect x="148" y="486" width="32" height="8" rx="3" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1"/>
  <text x="186" y="494" font-size="9" fill="#64748B">core module</text>
  <rect x="240" y="486" width="32" height="8" rx="3" fill="#BBF7D0"/>
  <text x="278" y="494" font-size="9" fill="#64748B">sub-module</text>
  <line x1="336" y1="490" x2="354" y2="490" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="360" y="494" font-size="9" fill="#64748B">depends on</text>
  <line x1="416" y1="490" x2="434" y2="490" stroke="#22C55E" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="440" y="494" font-size="9" fill="#64748B">indirect / shared</text>

  <!-- ══════════════════════════════════════
       VERSION BADGES (top-right)
  ══════════════════════════════════════ -->
  <rect x="758" y="74" width="90" height="22" rx="6" fill="#DBEAFE"/>
  <text x="803" y="89" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">Tempo v1.6.0</text>

  <rect x="758" y="312" width="90" height="22" rx="6" fill="#DCFCE7"/>
  <text x="803" y="327" text-anchor="middle" font-size="10" font-weight="700" fill="#15803D">Zones v0.1.0</text>
</svg>
