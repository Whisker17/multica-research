<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Card drop shadow filter -->
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#64748B" flood-opacity="0.13"/>
    </filter>
    <filter id="cardShadowHover" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#64748B" flood-opacity="0.18"/>
    </filter>
    <filter id="titleShadow" x="-5%" y="-5%" width="120%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>

    <!-- Layer accent gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14B8A6"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#16A34A"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>

    <!-- Icon circle backgrounds -->
    <linearGradient id="iconBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EFF6FF"/>
      <stop offset="100%" style="stop-color:#DBEAFE"/>
    </linearGradient>
    <linearGradient id="iconIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EEF2FF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <linearGradient id="iconTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDFA"/>
      <stop offset="100%" style="stop-color:#CCFBF1"/>
    </linearGradient>
    <linearGradient id="iconGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4"/>
      <stop offset="100%" style="stop-color:#DCFCE7"/>
    </linearGradient>
    <linearGradient id="iconAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
    <linearGradient id="iconOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED"/>
      <stop offset="100%" style="stop-color:#FFEDD5"/>
    </linearGradient>
    <linearGradient id="iconRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF1F2"/>
      <stop offset="100%" style="stop-color:#FFE4E6"/>
    </linearGradient>

    <!-- Side label gradient -->
    <linearGradient id="sideLabelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>

    <!-- Connector arrow marker -->
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════
       BACKGROUND
  ══════════════════════════════════════════════ -->
  <rect width="900" height="750" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.4" opacity="0.5"/>
  </pattern>
  <rect width="900" height="750" fill="url(#grid)" opacity="0.4"/>

  <!-- ══════════════════════════════════════════════
       TITLE BLOCK
  ══════════════════════════════════════════════ -->
  <rect x="60" y="18" width="780" height="68" rx="12" fill="#1E293B" filter="url(#titleShadow)"/>
  <rect x="60" y="18" width="6" height="68" rx="3" fill="#3B82F6"/>
  <text x="452" y="44" text-anchor="middle" font-size="15.5" font-weight="700" fill="#F8FAFC" letter-spacing="0.5">WHI-340 §5.1 — Tempo Custom Node Stack (Reth SDK Extension)</text>
  <text x="452" y="66" text-anchor="middle" font-size="10" font-weight="500" fill="#94A3B8" letter-spacing="2">FLAT ICON STYLE · 7-LAYER FULL-STACK CUSTOMIZATION</text>

  <!-- ══════════════════════════════════════════════
       SIDE LABEL (vertical, left side)
  ══════════════════════════════════════════════ -->
  <rect x="20" y="105" width="30" height="618" rx="8" fill="url(#sideLabelGrad)" filter="url(#cardShadow)"/>
  <text transform="translate(35, 414) rotate(-90)" text-anchor="middle" font-size="11" font-weight="700" fill="#F1F5F9" letter-spacing="2.5">Tempo Custom Node Stack</text>

  <!-- ══════════════════════════════════════════════
       STACK CONTAINER
  ══════════════════════════════════════════════ -->
  <rect x="60" y="100" width="820" height="630" rx="16" fill="white" fill-opacity="0.35" stroke="#CBD5E1" stroke-width="1.2"/>

  <!-- ══════════════════════════════════════════════
       LAYER CARDS (top=L7 to bottom=L1)
       Each card: x=72, width=796, height=80
       y positions with slight overlap (cascade)
  ══════════════════════════════════════════════ -->

  <!-- ─── LAYER 7: Custom Transaction Pool (blue) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="108" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <!-- Accent bar -->
    <rect x="72" y="108" width="7" height="82" rx="4" fill="url(#blueGrad)"/>
    <!-- Top-right layer badge -->
    <rect x="808" y="114" width="52" height="20" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="834" y="128" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1D4ED8">Layer 7</text>
    <!-- Icon circle -->
    <circle cx="112" cy="149" r="22" fill="url(#iconBlue)" stroke="#BFDBFE" stroke-width="1.5"/>
    <text x="112" y="155" text-anchor="middle" font-size="20">🔀</text>
    <!-- Crate name -->
    <text x="148" y="134" font-size="12" font-weight="700" fill="#1E40AF">Custom Transaction Pool</text>
    <text x="148" y="149" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-transaction-pool</text>
    <!-- Description -->
    <text x="148" y="166" font-size="10.5" fill="#475569">Payment Lane 路由 + v2 分类</text>
    <!-- Right tag -->
    <rect x="680" y="131" width="110" height="20" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <text x="735" y="145" text-anchor="middle" font-size="9" font-weight="600" fill="#1D4ED8">TX ROUTING</text>
  </g>

  <!-- ─── LAYER 6: Custom Consensus (indigo) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="197" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="197" width="7" height="82" rx="4" fill="url(#indigoGrad)"/>
    <rect x="808" y="203" width="52" height="20" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="834" y="217" text-anchor="middle" font-size="9.5" font-weight="700" fill="#3730A3">Layer 6</text>
    <circle cx="112" cy="238" r="22" fill="url(#iconIndigo)" stroke="#C7D2FE" stroke-width="1.5"/>
    <text x="112" y="244" text-anchor="middle" font-size="20">⚡</text>
    <text x="148" y="223" font-size="12" font-weight="700" fill="#3730A3">Custom Consensus</text>
    <text x="148" y="238" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-consensus + commonware</text>
    <text x="148" y="254" font-size="10.5" fill="#475569">Simplex BFT 验证 + subblock 架构 · 双 Tokio 运行时隔离</text>
    <rect x="660" y="220" width="130" height="20" rx="10" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1"/>
    <text x="725" y="234" text-anchor="middle" font-size="9" font-weight="600" fill="#3730A3">BFT CONSENSUS</text>
  </g>

  <!-- ─── LAYER 5: Custom Payload Builder (teal) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="286" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="286" width="7" height="82" rx="4" fill="url(#tealGrad)"/>
    <rect x="808" y="292" width="52" height="20" rx="10" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1"/>
    <text x="834" y="306" text-anchor="middle" font-size="9.5" font-weight="700" fill="#0F766E">Layer 5</text>
    <circle cx="112" cy="327" r="22" fill="url(#iconTeal)" stroke="#99F6E4" stroke-width="1.5"/>
    <text x="112" y="333" text-anchor="middle" font-size="20">🏗️</text>
    <text x="148" y="312" font-size="12" font-weight="700" fill="#0F766E">Custom Payload Builder</text>
    <text x="148" y="327" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-payload-builder</text>
    <text x="148" y="343" font-size="10.5" fill="#475569">三车道区块构建 (System/Payment/General) · gas 预算分配 + Payment Lane 分类</text>
    <rect x="657" y="309" width="133" height="20" rx="10" fill="#CCFBF1" stroke="#5EEAD4" stroke-width="1"/>
    <text x="723" y="323" text-anchor="middle" font-size="9" font-weight="600" fill="#0F766E">3-LANE BUILDER</text>
  </g>

  <!-- ─── LAYER 4: Custom Precompiles (green) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="375" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="375" width="7" height="82" rx="4" fill="url(#greenGrad)"/>
    <rect x="808" y="381" width="52" height="20" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="834" y="395" text-anchor="middle" font-size="9.5" font-weight="700" fill="#15803D">Layer 4</text>
    <circle cx="112" cy="416" r="22" fill="url(#iconGreen)" stroke="#BBF7D0" stroke-width="1.5"/>
    <text x="112" y="422" text-anchor="middle" font-size="20">🔌</text>
    <text x="148" y="401" font-size="12" font-weight="700" fill="#15803D">Custom Precompiles</text>
    <text x="148" y="416" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-precompiles</text>
    <text x="148" y="432" font-size="10.5" fill="#475569">12 个原生预编译 (TIP-20, TIP-403, DEX, Keychain 等) · 动态查找 + 硬分叉门控 + delegatecall 禁止</text>
    <rect x="663" y="398" width="127" height="20" rx="10" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
    <text x="726" y="412" text-anchor="middle" font-size="9" font-weight="600" fill="#15803D">12 PRECOMPILES</text>
  </g>

  <!-- ─── LAYER 3: Custom EVM Config (amber) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="464" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="464" width="7" height="82" rx="4" fill="url(#amberGrad)"/>
    <rect x="808" y="470" width="52" height="20" rx="10" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1"/>
    <text x="834" y="484" text-anchor="middle" font-size="9.5" font-weight="700" fill="#B45309">Layer 3</text>
    <circle cx="112" cy="505" r="22" fill="url(#iconAmber)" stroke="#FDE68A" stroke-width="1.5"/>
    <text x="112" y="511" text-anchor="middle" font-size="20">⚙️</text>
    <text x="148" y="490" font-size="12" font-weight="700" fill="#B45309">Custom EVM Config</text>
    <text x="148" y="505" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-evm · tempo-revm</text>
    <text x="148" y="521" font-size="10.5" fill="#475569">TempoEvmConfig · Attodollar 计价 gas 费用 + optional_fee_charge</text>
    <rect x="657" y="487" width="133" height="20" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <text x="723" y="501" text-anchor="middle" font-size="9" font-weight="600" fill="#B45309">EVM OVERRIDE</text>
  </g>

  <!-- ─── LAYER 2: Custom ChainSpec (orange) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="553" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="553" width="7" height="82" rx="4" fill="url(#orangeGrad)"/>
    <rect x="808" y="559" width="52" height="20" rx="10" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <text x="834" y="573" text-anchor="middle" font-size="9.5" font-weight="700" fill="#C2410C">Layer 2</text>
    <circle cx="112" cy="594" r="22" fill="url(#iconOrange)" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="112" y="600" text-anchor="middle" font-size="20">📋</text>
    <text x="148" y="579" font-size="12" font-weight="700" fill="#C2410C">Custom ChainSpec</text>
    <text x="148" y="594" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-chainspec</text>
    <text x="148" y="610" font-size="10.5" fill="#475569">TempoChainSpec · TempoHardfork · 10 个 Tempo 特定硬分叉 + Ethereum Osaka 在 genesis 激活</text>
    <rect x="652" y="576" width="138" height="20" rx="10" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1"/>
    <text x="721" y="590" text-anchor="middle" font-size="9" font-weight="600" fill="#C2410C">10 HARDFORKS</text>
  </g>

  <!-- ─── LAYER 1: Custom Primitives (red) ─── -->
  <g filter="url(#cardShadow)">
    <rect x="72" y="642" width="796" height="82" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="72" y="642" width="7" height="82" rx="4" fill="url(#redGrad)"/>
    <rect x="808" y="648" width="52" height="20" rx="10" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
    <text x="834" y="662" text-anchor="middle" font-size="9.5" font-weight="700" fill="#B91C1C">Layer 1</text>
    <circle cx="112" cy="683" r="22" fill="url(#iconRed)" stroke="#FECDD3" stroke-width="1.5"/>
    <text x="112" y="689" text-anchor="middle" font-size="20">🧱</text>
    <text x="148" y="668" font-size="12" font-weight="700" fill="#B91C1C">Custom Primitives</text>
    <text x="148" y="683" font-size="10.5" font-weight="500" fill="#64748B" font-family="'JetBrains Mono', 'Fira Code', monospace">tempo-primitives</text>
    <text x="148" y="699" font-size="10.5" fill="#475569">TempoTxEnvelope · TempoHeader · TempoPrimitives · 自定义交易类型 0x76 + P256/WebAuthn 签名</text>
    <rect x="657" y="665" width="133" height="20" rx="10" fill="#FFE4E6" stroke="#FCA5A5" stroke-width="1"/>
    <text x="723" y="679" text-anchor="middle" font-size="9" font-weight="600" fill="#B91C1C">BASE TYPES</text>
  </g>

  <!-- ══════════════════════════════════════════════
       CONNECTOR LINES between layers (subtle dashes)
  ══════════════════════════════════════════════ -->
  <!-- Between L7 and L6 -->
  <line x1="112" y1="190" x2="112" y2="197" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Between L6 and L5 -->
  <line x1="112" y1="279" x2="112" y2="286" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Between L5 and L4 -->
  <line x1="112" y1="368" x2="112" y2="375" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Between L4 and L3 -->
  <line x1="112" y1="457" x2="112" y2="464" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Between L3 and L2 -->
  <line x1="112" y1="546" x2="112" y2="553" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Between L2 and L1 -->
  <line x1="112" y1="635" x2="112" y2="642" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════
       RETH SDK BASE LABEL (bottom)
  ══════════════════════════════════════════════ -->
  <rect x="280" y="734" width="340" height="11" rx="5" fill="#E2E8F0" opacity="0.8"/>
  <text x="450" y="743" text-anchor="middle" font-size="9.5" font-weight="600" fill="#64748B" letter-spacing="1.5">▲ RETH SDK FOUNDATION ▲</text>

</svg>
