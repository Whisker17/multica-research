<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" width="1100" height="550" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2F7"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#94A3B8" flood-opacity="0.18"/>
    </filter>
    <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#94A3B8" flood-opacity="0.25"/>
    </filter>
    <filter id="titleShadow" x="-5%" y="-20%" width="110%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.1"/>
    </filter>

    <!-- Depositor icon clip -->
    <clipPath id="circClip1"><circle cx="62" cy="62" r="24"/></clipPath>

    <!-- Arrowhead markers -->
    <marker id="arrowIndigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F97316"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- ===================== BACKGROUND ===================== -->
  <rect width="1100" height="550" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1.2" fill="#CBD5E1" opacity="0.45"/>
  </pattern>
  <rect width="1100" height="550" fill="url(#dots)"/>

  <!-- ===================== TITLE AREA ===================== -->
  <rect x="30" y="18" width="1040" height="58" rx="12" fill="white" filter="url(#titleShadow)" opacity="0.92"/>
  <rect x="30" y="18" width="6" height="58" rx="3" fill="#6366F1"/>
  <text x="52" y="40" font-size="13" font-weight="700" fill="#6366F1" letter-spacing="1.5">WHI-340 §9.1</text>
  <text x="52" y="60" font-size="17" font-weight="800" fill="#1E293B" letter-spacing="-0.3">Encrypted Deposits End-to-End Flow (Tempo Zones)</text>
  <text x="1057" y="51" font-size="10" font-weight="600" fill="#94A3B8" text-anchor="end" letter-spacing="1.8">FLAT ICON STYLE</text>

  <!-- ===================== STEP NUMBERS (background circles) ===================== -->
  <!-- Step 1 -->
  <circle cx="105" cy="148" r="13" fill="#10B981" opacity="0.15"/>
  <text x="105" y="153" font-size="12" font-weight="800" fill="#059669" text-anchor="middle">1</text>
  <!-- Step 2 -->
  <circle cx="320" cy="148" r="13" fill="#6366F1" opacity="0.15"/>
  <text x="320" y="153" font-size="12" font-weight="800" fill="#4F46E5" text-anchor="middle">2</text>
  <!-- Step 3 -->
  <circle cx="548" cy="148" r="13" fill="#3B82F6" opacity="0.15"/>
  <text x="548" y="153" font-size="12" font-weight="800" fill="#2563EB" text-anchor="middle">3</text>
  <!-- Step 4 -->
  <circle cx="785" cy="290" r="13" fill="#F97316" opacity="0.15"/>
  <text x="785" y="295" font-size="12" font-weight="800" fill="#EA580C" text-anchor="middle">4</text>
  <!-- Step 5 -->
  <circle cx="785" cy="440" r="13" fill="#10B981" opacity="0.15"/>
  <text x="785" y="445" font-size="12" font-weight="800" fill="#059669" text-anchor="middle">5</text>

  <!-- ===================== ROW 1: Depositor, L1 Portal, L1Subscriber ===================== -->

  <!-- ── CARD 1: Depositor ── -->
  <rect x="30" y="162" width="150" height="120" rx="14" fill="white" filter="url(#cardShadow)"/>
  <!-- Green accent bar -->
  <rect x="30" y="162" width="150" height="5" rx="3" fill="#10B981"/>
  <!-- Icon circle background -->
  <circle cx="105" cy="210" r="28" fill="#ECFDF5"/>
  <!-- Person emoji-style icon -->
  <circle cx="105" cy="200" r="10" fill="#10B981"/>
  <path d="M85 228 Q85 215 105 215 Q125 215 125 228" fill="#10B981"/>
  <!-- Label -->
  <text x="105" y="252" font-size="13" font-weight="700" fill="#065F46" text-anchor="middle">Depositor</text>
  <text x="105" y="268" font-size="10" fill="#6EE7B7" text-anchor="middle" font-weight="500">User</text>

  <!-- ── CARD 2: L1 Portal ── -->
  <rect x="245" y="162" width="150" height="120" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="245" y="162" width="150" height="5" rx="3" fill="#6366F1"/>
  <circle cx="320" cy="210" r="28" fill="#EEF2FF"/>
  <!-- Contract icon: document with lines -->
  <rect x="308" y="192" width="24" height="30" rx="3" fill="#6366F1" opacity="0.15"/>
  <rect x="308" y="192" width="24" height="30" rx="3" fill="none" stroke="#6366F1" stroke-width="2"/>
  <line x1="313" y1="201" x2="327" y2="201" stroke="#6366F1" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="313" y1="207" x2="327" y2="207" stroke="#6366F1" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="313" y1="213" x2="323" y2="213" stroke="#6366F1" stroke-width="1.8" stroke-linecap="round"/>
  <text x="320" y="252" font-size="13" font-weight="700" fill="#3730A3" text-anchor="middle">L1 Portal</text>
  <text x="320" y="268" font-size="10" fill="#A5B4FC" text-anchor="middle" font-weight="500">Smart Contract</text>

  <!-- ── CARD 3: L1Subscriber ── -->
  <rect x="463" y="162" width="170" height="120" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="463" y="162" width="170" height="5" rx="3" fill="#3B82F6"/>
  <circle cx="548" cy="210" r="28" fill="#EFF6FF"/>
  <!-- Listener / antenna icon -->
  <circle cx="548" cy="207" r="7" fill="none" stroke="#3B82F6" stroke-width="2.2"/>
  <path d="M536 197 Q540 191 548 190 Q556 191 560 197" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <path d="M530 194 Q536 183 548 182 Q560 183 566 194" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="548" y1="214" x2="548" y2="225" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <line x1="542" y1="225" x2="554" y2="225" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
  <text x="548" y="252" font-size="13" font-weight="700" fill="#1D4ED8" text-anchor="middle">L1Subscriber</text>
  <text x="548" y="268" font-size="10" fill="#93C5FD" text-anchor="middle" font-weight="500">Event Listener</text>

  <!-- ── ARROW 1→2: ECIES encrypt ── -->
  <path d="M182 222 C205 222 220 222 243 222" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="0" marker-end="url(#arrowGreen)" filter="url(#arrowShadow)"/>
  <!-- Arrow label pill -->
  <rect x="191" y="204" width="44" height="14" rx="7" fill="#ECFDF5"/>
  <text x="213" y="214" font-size="9" font-weight="600" fill="#059669" text-anchor="middle">ECIES encrypt</text>
  <text x="213" y="225" font-size="8" fill="#6EE7B7" text-anchor="middle">(to, memo)</text>

  <!-- ── ARROW 2→3: DepositMade event ── -->
  <path d="M397 222 C415 222 432 222 461 222" fill="none" stroke="#6366F1" stroke-width="2.2" marker-end="url(#arrowIndigo)" filter="url(#arrowShadow)"/>
  <rect x="402" y="204" width="53" height="14" rx="7" fill="#EEF2FF"/>
  <text x="428" y="214" font-size="9" font-weight="600" fill="#4F46E5" text-anchor="middle">DepositMade</text>
  <text x="428" y="225" font-size="8" fill="#A5B4FC" text-anchor="middle">event</text>

  <!-- ── ARROW 3→Step4 (down-right stepped): enqueue ── -->
  <!-- Goes right then down -->
  <path d="M633 222 C710 222 740 222 740 270 C740 290 760 290 773 290" fill="none" stroke="#3B82F6" stroke-width="2.2" marker-end="url(#arrowBlue)" filter="url(#arrowShadow)"/>
  <rect x="668" y="233" width="40" height="14" rx="7" fill="#EFF6FF"/>
  <text x="688" y="243" font-size="9" font-weight="600" fill="#2563EB" text-anchor="middle">enqueue</text>

  <!-- ===================== ROW 2: ZoneEngine prepare() ===================== -->

  <!-- ── CARD 4: ZoneEngine prepare() ── -->
  <rect x="660" y="258" width="250" height="155" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="660" y="258" width="250" height="5" rx="3" fill="#F97316"/>
  <!-- Icon circle -->
  <circle cx="785" cy="305" r="26" fill="#FFF7ED"/>
  <!-- Gear/engine icon -->
  <circle cx="785" cy="305" r="9" fill="none" stroke="#F97316" stroke-width="2.5"/>
  <circle cx="785" cy="305" r="3.5" fill="#F97316"/>
  <!-- Gear teeth (8 teeth) -->
  <g stroke="#F97316" stroke-width="3" stroke-linecap="round">
    <line x1="785" y1="293" x2="785" y2="290"/>
    <line x1="785" y1="317" x2="785" y2="320"/>
    <line x1="773" y1="305" x2="770" y2="305"/>
    <line x1="797" y1="305" x2="800" y2="305"/>
    <line x1="776.5" y1="296.5" x2="774.4" y2="294.4"/>
    <line x1="793.5" y1="313.5" x2="795.6" y2="315.6"/>
    <line x1="793.5" y1="296.5" x2="795.6" y2="294.4"/>
    <line x1="776.5" y1="313.5" x2="774.4" y2="315.6"/>
  </g>
  <!-- Label -->
  <text x="785" y="342" font-size="13" font-weight="700" fill="#9A3412" text-anchor="middle">ZoneEngine</text>
  <text x="785" y="357" font-size="11" font-weight="600" fill="#EA580C" text-anchor="middle">prepare()</text>
  <!-- Sub-steps inside card -->
  <rect x="672" y="367" width="226" height="36" rx="8" fill="#FFF7ED"/>
  <text x="785" y="381" font-size="9.5" font-weight="500" fill="#7C2D12" text-anchor="middle">① ECIES decrypt  ② CP proof generate</text>
  <text x="785" y="395" font-size="9.5" font-weight="500" fill="#7C2D12" text-anchor="middle">③ TIP-403 compliance check</text>

  <!-- ── ARROW 4→5: down ── -->
  <path d="M785 415 L785 428" fill="none" stroke="#F97316" stroke-width="2.2" marker-end="url(#arrowOrange)" filter="url(#arrowShadow)"/>

  <!-- ===================== ROW 3: ZoneInbox system tx ===================== -->

  <!-- ── CARD 5: ZoneInbox system tx ── -->
  <rect x="660" y="430" width="250" height="105" rx="14" fill="white" filter="url(#cardShadow)"/>
  <rect x="660" y="430" width="250" height="5" rx="3" fill="#10B981"/>
  <!-- Icon circle -->
  <circle cx="700" cy="468" r="18" fill="#ECFDF5"/>
  <!-- Inbox tray icon -->
  <rect x="690" y="460" width="20" height="14" rx="2" fill="none" stroke="#10B981" stroke-width="2"/>
  <path d="M690 466 L695 460 M710 466 L705 460" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="695" y1="466" x2="705" y2="466" stroke="#10B981" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="785" y="450" font-size="13" font-weight="700" fill="#065F46" text-anchor="middle">ZoneInbox system tx</text>
  <!-- On-chain verify steps -->
  <rect x="672" y="458" width="226" height="64" rx="8" fill="#F0FDF4"/>
  <text x="785" y="472" font-size="9.5" font-weight="600" fill="#065F46" text-anchor="middle">On-chain verify:</text>
  <text x="785" y="486" font-size="9" fill="#047857" text-anchor="middle">① ChaumPedersen proof verify</text>
  <text x="785" y="499" font-size="9" fill="#047857" text-anchor="middle">② AES-GCM decrypt</text>
  <text x="785" y="512" font-size="9" fill="#047857" text-anchor="middle">③ Credit balance → recipient</text>

  <!-- ===================== SIDE DETAIL PANEL ===================== -->
  <!-- Crypto detail box (right side) -->
  <rect x="940" y="162" width="132" height="270" rx="14" fill="white" filter="url(#cardShadow)" opacity="0.97"/>
  <rect x="940" y="162" width="132" height="5" rx="3" fill="#8B5CF6"/>
  <text x="1006" y="184" font-size="10" font-weight="700" fill="#5B21B6" text-anchor="middle" letter-spacing="0.5">CRYPTO STACK</text>

  <!-- Divider -->
  <line x1="952" y1="190" x2="1060" y2="190" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ECIES row -->
  <rect x="952" y="198" width="80" height="18" rx="5" fill="#FEF3C7"/>
  <text x="992" y="211" font-size="9" font-weight="700" fill="#92400E" text-anchor="middle">ECIES</text>
  <text x="1006" y="227" font-size="8.5" fill="#78716C" text-anchor="middle">Asymmetric enc.</text>
  <text x="1006" y="238" font-size="8.5" fill="#78716C" text-anchor="middle">pubkey of recipient</text>

  <line x1="952" y1="248" x2="1060" y2="248" stroke="#F1F5F9" stroke-width="1"/>

  <!-- AES-GCM row -->
  <rect x="952" y="255" width="80" height="18" rx="5" fill="#E0F2FE"/>
  <text x="992" y="268" font-size="9" font-weight="700" fill="#0369A1" text-anchor="middle">AES-256-GCM</text>
  <text x="1006" y="284" font-size="8.5" fill="#78716C" text-anchor="middle">Authenticated</text>
  <text x="1006" y="295" font-size="8.5" fill="#78716C" text-anchor="middle">symmetric enc.</text>

  <line x1="952" y1="305" x2="1060" y2="305" stroke="#F1F5F9" stroke-width="1"/>

  <!-- CP Proof row -->
  <rect x="952" y="312" width="80" height="18" rx="5" fill="#FCE7F3"/>
  <text x="992" y="325" font-size="9" font-weight="700" fill="#831843" text-anchor="middle">Chaum-Pedersen</text>
  <text x="1006" y="341" font-size="8.5" fill="#78716C" text-anchor="middle">NIZK equality</text>
  <text x="1006" y="352" font-size="8.5" fill="#78716C" text-anchor="middle">of discrete logs</text>

  <line x1="952" y1="362" x2="1060" y2="362" stroke="#F1F5F9" stroke-width="1"/>

  <!-- TIP-403 row -->
  <rect x="952" y="369" width="80" height="18" rx="5" fill="#ECFDF5"/>
  <text x="992" y="382" font-size="9" font-weight="700" fill="#065F46" text-anchor="middle">TIP-403</text>
  <text x="1006" y="398" font-size="8.5" fill="#78716C" text-anchor="middle">Compliance</text>
  <text x="1006" y="409" font-size="8.5" fill="#78716C" text-anchor="middle">policy gate</text>

  <line x1="952" y1="419" x2="1060" y2="419" stroke="#F1F5F9" stroke-width="1"/>
  <text x="1006" y="427" font-size="8" fill="#94A3B8" text-anchor="middle">Tempo Zones §9.1</text>

  <!-- ── Connecting dashed arrow from ZoneEngine to Crypto Panel ── -->
  <path d="M912 330 C924 330 932 300 938 280" fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGray)" opacity="0.5"/>

  <!-- ===================== LAYER LABELS ===================== -->
  <!-- L1 layer bracket -->
  <rect x="31" y="292" width="7" height="75" rx="3.5" fill="#6366F1" opacity="0.25"/>
  <text x="24" y="355" font-size="9" font-weight="600" fill="#4F46E5" text-anchor="middle" transform="rotate(-90, 24, 355)" letter-spacing="1">L1 ETHEREUM</text>

  <!-- Off-chain bracket -->
  <rect x="31" y="374" width="7" height="45" rx="3.5" fill="#F97316" opacity="0.25"/>
  <text x="24" y="405" font-size="9" font-weight="600" fill="#EA580C" text-anchor="middle" transform="rotate(-90, 24, 405)" letter-spacing="1">OFF-CHAIN</text>

  <!-- Zone bracket -->
  <rect x="31" y="426" width="7" height="105" rx="3.5" fill="#10B981" opacity="0.25"/>
  <text x="24" y="486" font-size="9" font-weight="600" fill="#059669" text-anchor="middle" transform="rotate(-90, 24, 486)" letter-spacing="1">ZONE CHAIN</text>

  <!-- ── L1 layer band ── -->
  <rect x="42" y="290" width="620" height="2" rx="1" fill="#6366F1" opacity="0.12"/>
  <rect x="42" y="372" width="620" height="2" rx="1" fill="#F97316" opacity="0.12"/>
  <rect x="42" y="424" width="620" height="2" rx="1" fill="#10B981" opacity="0.12"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="42" y="500" width="580" height="34" rx="10" fill="white" opacity="0.7" filter="url(#cardShadow)"/>
  <!-- Items -->
  <line x1="60" y1="517" x2="80" y2="517" stroke="#10B981" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="85" y="521" font-size="10" fill="#374151">Encrypt / User flow</text>
  <line x1="175" y1="517" x2="195" y2="517" stroke="#6366F1" stroke-width="2.2" marker-end="url(#arrowIndigo)"/>
  <text x="200" y="521" font-size="10" fill="#374151">On-chain event</text>
  <line x1="285" y1="517" x2="305" y2="517" stroke="#3B82F6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="310" y="521" font-size="10" fill="#374151">Queue submission</text>
  <line x1="400" y1="517" x2="420" y2="517" stroke="#F97316" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <text x="425" y="521" font-size="10" fill="#374151">Engine processing</text>
  <line x1="515" y1="517" x2="535" y2="517" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="540" y="521" font-size="10" fill="#374151">Reference</text>

  <!-- ===================== WATERMARK ===================== -->
  <text x="1075" y="543" font-size="9" fill="#CBD5E1" text-anchor="end" letter-spacing="0.5">2026-05-08</text>
</svg>
