<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 350" width="1100" height="350" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
    </linearGradient>

    <!-- Timeline line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.7" />
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64748B" flood-opacity="0.10"/>
    </filter>

    <!-- Drop shadow for large card -->
    <filter id="largeCardShadow" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#EF4444" flood-opacity="0.18"/>
    </filter>

    <!-- Glow for node circles -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#CBD5E1" flood-opacity="0.6"/>
    </filter>
    <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#EF4444" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="350" fill="url(#bgGrad)" rx="0"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B" letter-spacing="0.3">WHI-341 附录 D：Mantle 分叉时间线</text>
  <text x="550" y="50" text-anchor="middle" font-size="11" fill="#64748B" letter-spacing="0.2">Mantle Fork Timeline — Genesis → Arsia</text>

  <!-- =================== TIMELINE LINE =================== -->
  <!-- Main horizontal spine -->
  <line x1="72" y1="190" x2="1042" y2="190" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow at end -->
  <polygon points="1042,185 1052,190 1042,195" fill="#EF4444" opacity="0.7"/>

  <!-- ====================================================
       MILESTONES
       x positions: 90, 218, 346, 474, 602, 730, 920
       Alternating: odd=above (card top), even=below (card bottom)
       ===================================================== -->

  <!-- ── 1. Genesis (gray) — ABOVE ── -->
  <!-- Connector line -->
  <line x1="90" y1="176" x2="90" y2="128" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="33" y="65" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="33" y="65" width="114" height="5" rx="3" fill="#94A3B8"/>
  <text x="90" y="85" text-anchor="middle" font-size="18">🧱</text>
  <text x="90" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Genesis</text>
  <text x="90" y="116" text-anchor="middle" font-size="9" fill="#64748B">初始分叉基线</text>
  <!-- Node -->
  <circle cx="90" cy="190" r="9" fill="white" stroke="#94A3B8" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="90" cy="190" r="4" fill="#94A3B8"/>


  <!-- ── 2. BaseFee (blue) — BELOW ── -->
  <!-- Connector line -->
  <line x1="218" y1="204" x2="218" y2="252" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="161" y="252" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="161" y="252" width="114" height="5" rx="3" fill="#3B82F6"/>
  <text x="218" y="272" text-anchor="middle" font-size="18">⚙️</text>
  <text x="218" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A5F">BaseFee</text>
  <text x="218" y="303" text-anchor="middle" font-size="8.5" fill="#1D4ED8">自定义 base fee 机制</text>
  <!-- Node -->
  <circle cx="218" cy="190" r="9" fill="white" stroke="#3B82F6" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="218" cy="190" r="4" fill="#3B82F6"/>


  <!-- ── 3. Everest (indigo) — ABOVE ── -->
  <!-- Connector line -->
  <line x1="346" y1="176" x2="346" y2="128" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="289" y="65" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="289" y="65" width="114" height="5" rx="3" fill="#6366F1"/>
  <text x="346" y="85" text-anchor="middle" font-size="18">🗂️</text>
  <text x="346" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#312E81">Everest</text>
  <text x="346" y="116" text-anchor="middle" font-size="8.5" fill="#4338CA">Blob DA 数据源</text>
  <!-- Node -->
  <circle cx="346" cy="190" r="9" fill="white" stroke="#6366F1" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="346" cy="190" r="4" fill="#6366F1"/>


  <!-- ── 4. Euboea (teal) — BELOW ── -->
  <!-- Connector line -->
  <line x1="474" y1="204" x2="474" y2="252" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="417" y="252" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="417" y="252" width="114" height="5" rx="3" fill="#14B8A6"/>
  <text x="474" y="272" text-anchor="middle" font-size="18">🔧</text>
  <text x="474" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#134E4A">Euboea</text>
  <text x="474" y="303" text-anchor="middle" font-size="8.5" fill="#0F766E">性能优化</text>
  <!-- Node -->
  <circle cx="474" cy="190" r="9" fill="white" stroke="#14B8A6" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="474" cy="190" r="4" fill="#14B8A6"/>


  <!-- ── 5. Skadi (green) — ABOVE ── -->
  <!-- Connector line -->
  <line x1="602" y1="176" x2="602" y2="128" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="545" y="65" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="545" y="65" width="114" height="5" rx="3" fill="#22C55E"/>
  <text x="602" y="85" text-anchor="middle" font-size="18">🔌</text>
  <text x="602" y="101" text-anchor="middle" font-size="11" font-weight="700" fill="#14532D">Skadi</text>
  <text x="602" y="116" text-anchor="middle" font-size="8.5" fill="#16A34A">Engine API V4</text>
  <!-- Node -->
  <circle cx="602" cy="190" r="9" fill="white" stroke="#22C55E" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="602" cy="190" r="4" fill="#22C55E"/>


  <!-- ── 6. Limb (amber) — BELOW ── -->
  <!-- Connector line -->
  <line x1="730" y1="204" x2="730" y2="252" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Card -->
  <rect x="673" y="252" width="114" height="62" rx="10" fill="white" filter="url(#cardShadow)"/>
  <rect x="673" y="252" width="114" height="5" rx="3" fill="#F59E0B"/>
  <text x="730" y="272" text-anchor="middle" font-size="18">🛠️</text>
  <text x="730" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">Limb</text>
  <text x="730" y="303" text-anchor="middle" font-size="8.5" fill="#D97706">Arsia 前准备</text>
  <!-- Node -->
  <circle cx="730" cy="190" r="9" fill="white" stroke="#F59E0B" stroke-width="2.5" filter="url(#nodeGlow)"/>
  <circle cx="730" cy="190" r="4" fill="#F59E0B"/>


  <!-- ── 7. Arsia (red) — ABOVE, LARGE ── -->
  <!-- Connector line (taller) -->
  <line x1="920" y1="173" x2="920" y2="102" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Large Card -->
  <rect x="820" y="14" width="200" height="88" rx="14" fill="white" filter="url(#largeCardShadow)"/>
  <!-- Red accent bar -->
  <rect x="820" y="14" width="200" height="6" rx="4" fill="#EF4444"/>
  <!-- Inner left accent stripe -->
  <rect x="820" y="20" width="4" height="82" rx="2" fill="#EF4444" opacity="0.15"/>
  <!-- Icon + title row -->
  <text x="843" y="40" font-size="20">🚀</text>
  <text x="868" y="36" font-size="13" font-weight="800" fill="#7F1D1D">Arsia</text>
  <text x="868" y="50" font-size="9" fill="#EF4444" font-weight="600" letter-spacing="0.3">重要里程碑</text>
  <!-- Bundle chips -->
  <text x="830" y="68" font-size="8" fill="#B91C1C" font-weight="600">捆绑 OP Stack 分叉：</text>
  <text x="830" y="81" font-size="7.8" fill="#6B7280">Canyon · Delta · Ecotone · Fjord</text>
  <text x="830" y="93" font-size="7.8" fill="#6B7280">Granite · Holocene · Isthmus · Jovian</text>
  <!-- Node (larger, pulsing ring) -->
  <circle cx="920" cy="190" r="15" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" opacity="0.5"/>
  <circle cx="920" cy="190" r="11" fill="white" stroke="#EF4444" stroke-width="2.5" filter="url(#redGlow)"/>
  <circle cx="920" cy="190" r="5" fill="#EF4444"/>

  <!-- =================== LEGEND =================== -->
  <rect x="30" y="322" width="540" height="20" rx="6" fill="white" opacity="0.6"/>
  <circle cx="44" cy="332" r="5" fill="#94A3B8"/>
  <text x="53" y="336" font-size="9" fill="#475569">Genesis</text>
  <circle cx="102" cy="332" r="5" fill="#3B82F6"/>
  <text x="111" y="336" font-size="9" fill="#475569">BaseFee</text>
  <circle cx="163" cy="332" r="5" fill="#6366F1"/>
  <text x="172" y="336" font-size="9" fill="#475569">Everest</text>
  <circle cx="223" cy="332" r="5" fill="#14B8A6"/>
  <text x="232" y="336" font-size="9" fill="#475569">Euboea</text>
  <circle cx="278" cy="332" r="5" fill="#22C55E"/>
  <text x="287" y="336" font-size="9" fill="#475569">Skadi</text>
  <circle cx="325" cy="332" r="5" fill="#F59E0B"/>
  <text x="334" y="336" font-size="9" fill="#475569">Limb</text>
  <circle cx="374" cy="332" r="5" fill="#EF4444"/>
  <text x="383" y="336" font-size="9" fill="#475569">Arsia (捆绑 8 个 OP Stack 分叉)</text>

  <!-- Source annotation -->
  <text x="1070" y="344" text-anchor="end" font-size="8.5" fill="#94A3B8">WHI-341 · 2026</text>
</svg>
