<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Module x Path Control Matrix</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#6b7280">Control Level: Full (sovereign) | Partial (constrained) | Inherited (depends on parent layer)</text>

  <!-- Matrix dimensions -->
  <!-- Left column (module names): x=40, width=200 -->
  <!-- Col L1: x=260, width=200 -->
  <!-- Col L2: x=470, width=200 -->
  <!-- Col L3: x=680, width=200 -->
  <!-- Row height: 52, header row: 52, starting y: 80 -->

  <!-- Header row background -->
  <rect x="40" y="80" width="840" height="52" rx="0" fill="#f1f5f9"/>

  <!-- Header labels -->
  <text x="140" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Module</text>
  <text x="360" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Enterprise L1</text>
  <text x="360" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Sovereign Chain</text>
  <text x="570" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Enterprise L2</text>
  <text x="570" y="120" text-anchor="middle" font-size="11" fill="#6b7280">Mantle Extension</text>
  <text x="780" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Enterprise L3</text>
  <text x="780" y="120" text-anchor="middle" font-size="11" fill="#6b7280">App Chain / Zone</text>

  <!-- Vertical header separators -->
  <line x1="260" y1="80" x2="260" y2="548" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="470" y1="80" x2="470" y2="548" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="680" y1="80" x2="680" y2="548" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="880" y1="80" x2="880" y2="548" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Row data: y starts at 132 (80+52), each row 52px -->
  <!-- Colors: Full=#dcfce7 stroke=#16a34a, Partial=#fef9c3 stroke=#ca8a04, Inherited=#fed7aa stroke=#ea580c -->

  <!-- Row 1: Execution Layer (KEY - blue left accent) -->
  <rect x="40" y="132" width="840" height="52" fill="#ffffff"/>
  <rect x="40" y="132" width="4" height="52" fill="#3b82f6"/>
  <line x1="40" y1="184" x2="880" y2="184" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="162" font-size="13" font-weight="600" fill="#111827">1. Execution Layer</text>
  <!-- L1: Full -->
  <rect x="290" y="142" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <!-- L2: Partial -->
  <rect x="500" y="142" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <!-- L3: Partial -->
  <rect x="710" y="142" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Row 2: Consensus & Finality (KEY) -->
  <rect x="40" y="184" width="840" height="52" fill="#f8fafc"/>
  <rect x="40" y="184" width="4" height="52" fill="#3b82f6"/>
  <line x1="40" y1="236" x2="880" y2="236" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="214" font-size="13" font-weight="600" fill="#111827">2. Consensus &amp; Finality</text>
  <rect x="290" y="194" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="194" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="194" width="140" height="32" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="780" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Inherited</text>

  <!-- Row 3: Privacy Layer (KEY) -->
  <rect x="40" y="236" width="840" height="52" fill="#ffffff"/>
  <rect x="40" y="236" width="4" height="52" fill="#3b82f6"/>
  <line x1="40" y1="288" x2="880" y2="288" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="266" font-size="13" font-weight="600" fill="#111827">3. Privacy Layer</text>
  <rect x="290" y="246" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="246" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="246" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Row 4: Compliance & Identity -->
  <rect x="40" y="288" width="840" height="52" fill="#f8fafc"/>
  <line x1="40" y1="340" x2="880" y2="340" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="318" font-size="13" font-weight="600" fill="#111827">4. Compliance &amp; Identity</text>
  <rect x="290" y="298" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="319" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="298" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="319" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="298" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="319" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Row 5: Access Control -->
  <rect x="40" y="340" width="840" height="52" fill="#ffffff"/>
  <line x1="40" y1="392" x2="880" y2="392" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="370" font-size="13" font-weight="600" fill="#111827">5. Access Control</text>
  <rect x="290" y="350" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="350" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="350" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="371" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Row 6: DA & Data Sovereignty -->
  <rect x="40" y="392" width="840" height="52" fill="#f8fafc"/>
  <line x1="40" y1="444" x2="880" y2="444" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="422" font-size="13" font-weight="600" fill="#111827">6. DA &amp; Data Sovereignty</text>
  <rect x="290" y="402" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="423" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="402" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="423" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="402" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="423" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Row 7: Interoperability -->
  <rect x="40" y="444" width="840" height="52" fill="#ffffff"/>
  <line x1="40" y1="496" x2="880" y2="496" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="474" font-size="13" font-weight="600" fill="#111827">7. Interoperability</text>
  <rect x="290" y="454" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="454" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="454" width="140" height="32" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="780" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Inherited</text>

  <!-- Row 8: Operations & Business -->
  <rect x="40" y="496" width="840" height="52" fill="#f8fafc"/>
  <line x1="40" y1="548" x2="880" y2="548" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="526" font-size="13" font-weight="600" fill="#111827">8. Operations &amp; Business</text>
  <rect x="290" y="506" width="140" height="32" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="527" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Full</text>
  <rect x="500" y="506" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="570" y="527" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>
  <rect x="710" y="506" width="140" height="32" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="780" y="527" text-anchor="middle" font-size="12" font-weight="600" fill="#854d0e">Partial</text>

  <!-- Outer border -->
  <rect x="40" y="80" width="840" height="468" rx="0" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Key divergence indicator -->
  <rect x="40" y="132" width="4" height="156" fill="#3b82f6"/>

  <!-- Constraint Propagation Annotations (right side) -->
  <g transform="translate(40, 575)">
    <text x="0" y="0" font-size="13" font-weight="600" fill="#111827">Key Constraint Chains</text>
    <text x="0" y="20" font-size="11" fill="#2563eb">Chain 1: Privacy choice &#x2192; DA model &#x2192; Ethereum settlement &#x2192; Bridge design</text>
    <text x="0" y="38" font-size="11" fill="#ea580c">Chain 2: Compliance depth &#x2192; Execution modification &#x2192; EVM compatibility risk</text>
    <text x="0" y="56" font-size="11" fill="#16a34a">Chain 3: Finality choice &#x2192; Settlement semantics &#x2192; DVP/Payment/Securities viability</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 650)">
    <rect x="0" y="0" width="24" height="16" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="30" y="12" font-size="11" fill="#6b7280">Full — Sovereign control from genesis</text>
    <rect x="260" y="0" width="24" height="16" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="290" y="12" font-size="11" fill="#6b7280">Partial — Constrained by Rollup/Stack compatibility</text>
    <rect x="580" y="0" width="24" height="16" rx="4" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <text x="610" y="12" font-size="11" fill="#6b7280">Inherited — Depends on parent layer</text>
    <rect x="810" y="-2" width="8" height="20" rx="1" fill="#3b82f6"/>
    <text x="824" y="12" font-size="11" fill="#6b7280">Key divergence module</text>
  </g>
</svg>
