<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="axis-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="traj-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>
  <!-- Title -->
  <text x="480" y="36" font-size="18" fill="#111827" font-weight="600" text-anchor="middle">Capability Depth vs. Time-to-Market Positioning</text>
  <text x="480" y="54" font-size="12" fill="#6b7280" text-anchor="middle">WHI-395 — Three Enterprise Blockchain Paths</text>
  <!-- Axes -->
  <line x1="120" y1="600" x2="900" y2="600" stroke="#374151" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <line x1="120" y1="600" x2="120" y2="80" stroke="#374151" stroke-width="2" marker-end="url(#axis-arrow)"/>
  <!-- X-axis label -->
  <text x="510" y="648" font-size="14" fill="#111827" text-anchor="middle" font-weight="600">Time-to-Market</text>
  <text x="180" y="625" font-size="11" fill="#6b7280" text-anchor="middle">3 months</text>
  <text x="350" y="625" font-size="11" fill="#6b7280" text-anchor="middle">6 months</text>
  <text x="510" y="625" font-size="11" fill="#6b7280" text-anchor="middle">12 months</text>
  <text x="680" y="625" font-size="11" fill="#6b7280" text-anchor="middle">18 months</text>
  <text x="850" y="625" font-size="11" fill="#6b7280" text-anchor="middle">24 months</text>
  <!-- X tick marks -->
  <line x1="180" y1="596" x2="180" y2="604" stroke="#374151" stroke-width="1"/>
  <line x1="350" y1="596" x2="350" y2="604" stroke="#374151" stroke-width="1"/>
  <line x1="510" y1="596" x2="510" y2="604" stroke="#374151" stroke-width="1"/>
  <line x1="680" y1="596" x2="680" y2="604" stroke="#374151" stroke-width="1"/>
  <line x1="850" y1="596" x2="850" y2="604" stroke="#374151" stroke-width="1"/>
  <!-- Y-axis label -->
  <text x="40" y="340" font-size="14" fill="#111827" text-anchor="middle" font-weight="600" transform="rotate(-90 40 340)">Enterprise Capability Depth</text>
  <!-- Y-axis bands -->
  <text x="115" y="540" font-size="10" fill="#6b7280" text-anchor="end">Permissioned RPC</text>
  <text x="115" y="440" font-size="10" fill="#6b7280" text-anchor="end">Compliance Middleware</text>
  <text x="115" y="300" font-size="10" fill="#6b7280" text-anchor="end">Tenant Isolation +</text>
  <text x="115" y="312" font-size="10" fill="#6b7280" text-anchor="end">Private DA</text>
  <text x="115" y="170" font-size="10" fill="#6b7280" text-anchor="end">Protocol-Native Privacy</text>
  <text x="115" y="182" font-size="10" fill="#6b7280" text-anchor="end">+ BFT Finality</text>
  <!-- Y tick marks -->
  <line x1="116" y1="540" x2="124" y2="540" stroke="#d1d5db" stroke-width="1"/>
  <line x1="116" y1="440" x2="124" y2="440" stroke="#d1d5db" stroke-width="1"/>
  <line x1="116" y1="300" x2="124" y2="300" stroke="#d1d5db" stroke-width="1"/>
  <line x1="116" y1="175" x2="124" y2="175" stroke="#d1d5db" stroke-width="1"/>
  <!-- Grid lines (light) -->
  <line x1="120" y1="540" x2="900" y2="540" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="120" y1="440" x2="900" y2="440" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="120" y1="300" x2="900" y2="300" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="120" y1="175" x2="900" y2="175" stroke="#f3f4f6" stroke-width="1"/>
  <!-- "No path here" annotation for top-left -->
  <rect x="130" y="90" width="240" height="50" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="112" font-size="11" fill="#dc2626" text-anchor="middle" font-weight="600">No path occupies this quadrant</text>
  <text x="250" y="126" font-size="10" fill="#dc2626" text-anchor="middle">(Deep capability + Fast delivery)</text>
  <!-- L2 Zone (blue) -->
  <ellipse cx="280" cy="460" rx="120" ry="70" fill="#dbeafe" fill-opacity="0.5" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="445" font-size="16" fill="#1d4ed8" text-anchor="middle" font-weight="600">L2</text>
  <text x="280" y="463" font-size="11" fill="#1d4ed8" text-anchor="middle">Enterprise L2</text>
  <text x="280" y="478" font-size="10" fill="#6b7280" text-anchor="middle">3-12 months</text>
  <text x="280" y="492" font-size="10" fill="#6b7280" text-anchor="middle">8-15 people</text>
  <!-- L3 Zone (orange) -->
  <ellipse cx="530" cy="300" rx="110" ry="75" fill="#fed7aa" fill-opacity="0.4" stroke="#ea580c" stroke-width="2"/>
  <text x="530" y="283" font-size="16" fill="#c2410c" text-anchor="middle" font-weight="600">L3</text>
  <text x="530" y="301" font-size="11" fill="#c2410c" text-anchor="middle">Enterprise App Chain</text>
  <text x="530" y="316" font-size="10" fill="#6b7280" text-anchor="middle">9-13 months</text>
  <text x="530" y="330" font-size="10" fill="#6b7280" text-anchor="middle">10-15 people</text>
  <!-- L1 Zone (green) -->
  <ellipse cx="770" cy="165" rx="110" ry="70" fill="#dcfce7" fill-opacity="0.5" stroke="#16a34a" stroke-width="2"/>
  <text x="770" y="148" font-size="16" fill="#15803d" text-anchor="middle" font-weight="600">L1</text>
  <text x="770" y="166" font-size="11" fill="#15803d" text-anchor="middle">Sovereign Chain</text>
  <text x="770" y="181" font-size="10" fill="#6b7280" text-anchor="middle">18-24 months</text>
  <text x="770" y="195" font-size="10" fill="#6b7280" text-anchor="middle">15-25 people, $8M-$18M+</text>
  <!-- Trajectory arrow (L2 -> L3 -> L1) -->
  <path d="M 360,420 C 400,380 440,340 490,320" fill="none" stroke="#9333ea" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#traj-arrow)"/>
  <path d="M 590,260 C 640,230 680,200 720,190" fill="none" stroke="#9333ea" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#traj-arrow)"/>
  <text x="420" y="370" font-size="10" fill="#7c3aed" font-weight="600">Recommended</text>
  <text x="420" y="382" font-size="10" fill="#7c3aed" font-weight="600">trajectory</text>
  <!-- Reference points -->
  <!-- Canton -->
  <circle cx="810" cy="140" r="6" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <text x="830" y="135" font-size="10" fill="#6b7280" font-style="italic">Canton</text>
  <text x="830" y="147" font-size="9" fill="#9ca3af">(reference)</text>
  <!-- Prividium -->
  <circle cx="450" cy="370" r="6" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <text x="470" y="365" font-size="10" fill="#6b7280" font-style="italic">Prividium</text>
  <text x="470" y="377" font-size="9" fill="#9ca3af">(reference)</text>
  <!-- Legend -->
  <rect x="660" y="540" width="230" height="55" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="670" y1="556" x2="700" y2="556" stroke="#9333ea" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="706" y="560" font-size="10" fill="#6b7280">Recommended progressive path</text>
  <circle cx="685" cy="578" r="5" fill="#6b7280" stroke="#374151" stroke-width="1"/>
  <text x="706" y="582" font-size="10" fill="#6b7280">Industry reference point</text>
</svg>