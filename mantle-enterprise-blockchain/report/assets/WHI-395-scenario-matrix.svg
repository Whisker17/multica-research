<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <rect width="960" height="600" fill="#ffffff"/>
  <!-- Title -->
  <text x="480" y="36" font-size="18" fill="#111827" font-weight="600" text-anchor="middle">Business Scenario to Recommended Path Matrix</text>
  <text x="480" y="54" font-size="12" fill="#6b7280" text-anchor="middle">WHI-395 — Path selection by use case</text>
  <!-- Column headers -->
  <rect x="380" y="70" width="160" height="40" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="460" y="95" font-size="14" fill="#15803d" text-anchor="middle" font-weight="600">L1 Sovereign</text>
  <rect x="560" y="70" width="160" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="95" font-size="14" fill="#1d4ed8" text-anchor="middle" font-weight="600">L2 Enterprise</text>
  <rect x="740" y="70" width="160" height="40" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="820" y="95" font-size="14" fill="#c2410c" text-anchor="middle" font-weight="600">L3 App Chain</text>
  <!-- Row backgrounds -->
  <rect x="40" y="120" width="860" height="50" fill="#ffffff"/>
  <rect x="40" y="170" width="860" height="50" fill="#f9fafb"/>
  <rect x="40" y="220" width="860" height="50" fill="#ffffff"/>
  <rect x="40" y="270" width="860" height="50" fill="#f9fafb"/>
  <rect x="40" y="320" width="860" height="50" fill="#ffffff"/>
  <rect x="40" y="370" width="860" height="50" fill="#f9fafb"/>
  <rect x="40" y="420" width="860" height="50" fill="#ffffff"/>
  <rect x="40" y="470" width="860" height="50" fill="#f9fafb"/>
  <!-- Grid lines -->
  <line x1="40" y1="120" x2="900" y2="120" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="170" x2="900" y2="170" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="220" x2="900" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="270" x2="900" y2="270" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="320" x2="900" y2="320" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="370" x2="900" y2="370" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="420" x2="900" y2="420" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="470" x2="900" y2="470" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="520" x2="900" y2="520" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Vertical grid -->
  <line x1="380" y1="70" x2="380" y2="520" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="540" y1="70" x2="540" y2="520" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="720" y1="70" x2="720" y2="520" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="900" y1="70" x2="900" y2="520" stroke="#e5e7eb" stroke-width="1"/>
