  <text x="210" y="250" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">Cross-Border Payments (B2C)</text>
  <text x="210" y="300" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">Enterprise DeFi</text>
  <text x="210" y="350" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">Bank Internal Ledger</text>
  <text x="210" y="400" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">B2B Payment Domain</text>
  <text x="210" y="450" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">Securities DVP Settlement</text>
  <text x="210" y="500" font-size="13" fill="#111827" text-anchor="middle" font-weight="500">Multi-Tenant Enterprise SaaS</text>
  <!-- RWA: L1=possible, L2=recommended, L3=recommended -->
  <rect x="420" y="130" width="80" height="28" rx="14" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="460" y="149" font-size="11" fill="#16a34a" text-anchor="middle">Possible</text>
  <rect x="600" y="130" width="80" height="28" rx="14" fill="#2563eb"/>
  <text x="640" y="149" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Primary</text>
  <rect x="780" y="130" width="80" height="28" rx="14" fill="#ea580c"/>
  <text x="820" y="149" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Scale</text>
  <!-- xStocks: L1=recommended, L2=no, L3=no -->
  <rect x="420" y="180" width="80" height="28" rx="14" fill="#16a34a"/>
  <text x="460" y="199" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <rect x="600" y="180" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="640" y="199" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <rect x="780" y="180" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="820" y="199" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <!-- Cross-border B2C: L1=recommended, L2=possible, L3=no -->
  <rect x="420" y="230" width="80" height="28" rx="14" fill="#16a34a"/>
  <text x="460" y="249" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <rect x="600" y="230" width="80" height="28" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="249" font-size="11" fill="#2563eb" text-anchor="middle">Possible</text>
  <rect x="780" y="230" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="820" y="249" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <!-- Enterprise DeFi: L1=no, L2=recommended, L3=possible -->
  <rect x="420" y="280" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="460" y="299" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <rect x="600" y="280" width="80" height="28" rx="14" fill="#2563eb"/>
  <text x="640" y="299" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <rect x="780" y="280" width="80" height="28" rx="14" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
  <text x="820" y="299" font-size="11" fill="#ea580c" text-anchor="middle">Possible</text>
  <!-- Bank Internal Ledger: L1=possible, L2=no, L3=recommended -->
  <rect x="420" y="330" width="80" height="28" rx="14" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="460" y="349" font-size="11" fill="#16a34a" text-anchor="middle">Possible</text>
  <rect x="600" y="330" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="640" y="349" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <rect x="780" y="330" width="80" height="28" rx="14" fill="#ea580c"/>
  <text x="820" y="349" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <!-- B2B Payment: L1=possible, L2=possible, L3=recommended -->
  <rect x="420" y="380" width="80" height="28" rx="14" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="460" y="399" font-size="11" fill="#16a34a" text-anchor="middle">Possible</text>
  <rect x="600" y="380" width="80" height="28" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="399" font-size="11" fill="#2563eb" text-anchor="middle">Possible</text>
  <rect x="780" y="380" width="80" height="28" rx="14" fill="#ea580c"/>
  <text x="820" y="399" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <!-- Securities DVP: L1=recommended(high-value), L2=no, L3=recommended(standard) -->
  <rect x="410" y="430" width="100" height="28" rx="14" fill="#16a34a"/>
  <text x="460" y="449" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">High-Value</text>
  <rect x="600" y="430" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="640" y="449" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <rect x="775" y="430" width="90" height="28" rx="14" fill="#ea580c"/>
  <text x="820" y="449" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Standard</text>
  <!-- Multi-Tenant SaaS: L1=no, L2=possible, L3=recommended -->
  <rect x="420" y="480" width="80" height="28" rx="14" fill="#f3f4f6"/>
  <text x="460" y="499" font-size="11" fill="#9ca3af" text-anchor="middle">Not Fit</text>
  <rect x="600" y="480" width="80" height="28" rx="14" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="640" y="499" font-size="11" fill="#2563eb" text-anchor="middle">Possible</text>
  <rect x="780" y="480" width="80" height="28" rx="14" fill="#ea580c"/>
  <text x="820" y="499" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="600">Best Fit</text>
  <!-- Legend -->
  <rect x="40" y="540" width="500" height="45" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="55" y="554" width="50" height="18" rx="9" fill="#16a34a"/>
  <text x="80" y="567" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="600">Label</text>
  <text x="116" y="567" font-size="10" fill="#6b7280">= Recommended</text>
  <rect x="200" y="554" width="50" height="18" rx="9" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="225" y="567" font-size="10" fill="#16a34a" text-anchor="middle">Label</text>
  <text x="262" y="567" font-size="10" fill="#6b7280">= Possible</text>
  <rect x="330" y="554" width="50" height="18" rx="9" fill="#f3f4f6"/>
  <text x="355" y="567" font-size="10" fill="#9ca3af" text-anchor="middle">Label</text>
  <text x="392" y="567" font-size="10" fill="#6b7280">= Not recommended</text>
