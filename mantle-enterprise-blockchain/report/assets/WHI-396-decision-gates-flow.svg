<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" width="1100" height="780">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1100" height="780" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">WHI-396: Decision Gates Flow</text>
  <text x="550" y="55" text-anchor="middle" font-size="13" fill="#6b7280">Five gates governing Mantle enterprise blockchain strategy</text>

  <!-- ===== MAIN TRACK: L2 → G2 → L3 → G3 → Productization ===== -->

  <!-- START -->
  <circle cx="80" cy="110" r="16" fill="#111827"/>
  <text x="80" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">START</text>
  <line x1="96" y1="110" x2="148" y2="110" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 1 box -->
  <rect x="150" y="85" width="240" height="50" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="270" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Phase 1: Enterprise L2 MVP</text>
  <text x="270" y="122" text-anchor="middle" font-size="10" fill="#6b7280">Months 0&#x2013;3</text>

  <!-- Arrow to G2 -->
  <line x1="390" y1="110" x2="438" y2="110" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- G2 Diamond -->
  <polygon points="490,75 540,110 490,145 440,110" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="103" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">G2</text>
  <text x="490" y="117" text-anchor="middle" font-size="9" fill="#92400e">Paid demand?</text>

  <!-- G2 YES → Phase 2 -->
  <line x1="540" y1="110" x2="598" y2="110" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="548" y="97" width="30" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="563" y="109" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>

  <!-- Phase 2 box -->
  <rect x="600" y="85" width="240" height="50" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Phase 2: L3 App Chain</text>
  <text x="720" y="122" text-anchor="middle" font-size="10" fill="#6b7280">Months 3&#x2013;6</text>

  <!-- G2 NO → Reassess -->
  <line x1="490" y1="145" x2="490" y2="178" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="476" y="148" width="28" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="490" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>
  <rect x="400" y="180" width="180" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="490" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Reassess Enterprise</text>
  <text x="490" y="214" text-anchor="middle" font-size="10" fill="#6b7280">Strategy</text>

  <!-- Arrow Phase 2 → G3 -->
  <line x1="720" y1="135" x2="720" y2="228" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- G3 Diamond -->
  <polygon points="720,240 770,275 720,310 670,275" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">G3</text>
  <text x="720" y="282" text-anchor="middle" font-size="9" fill="#166534">L3 viable?</text>

  <!-- G3 YES → Phase 3 -->
  <line x1="770" y1="275" x2="838" y2="275" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="780" y="262" width="30" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="795" y="274" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>
  <rect x="840" y="250" width="220" height="50" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="950" y="271" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Phase 3: Productization</text>
  <text x="950" y="287" text-anchor="middle" font-size="10" fill="#6b7280">Months 6&#x2013;12</text>

  <!-- G3 NO → Evaluate -->
  <line x1="720" y1="310" x2="720" y2="338" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="706" y="313" width="28" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="720" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>
  <rect x="610" y="340" width="220" height="40" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="720" y="360" text-anchor="middle" font-size="11" fill="#111827">Evaluate deeper customization</text>
  <text x="720" y="374" text-anchor="middle" font-size="10" fill="#6b7280">May indicate L1 need</text>

  <!-- ===== L1 TRACK ===== -->
  <!-- Vertical connector from START down -->
  <line x1="80" y1="126" x2="80" y2="418" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- L1 PoC box -->
  <rect x="20" y="420" width="200" height="44" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">L1 PoC (Months 0&#x2013;6)</text>
  <text x="120" y="456" text-anchor="middle" font-size="10" fill="#6b7280">Reth+BFT Benchmark</text>

  <!-- Arrow to G4 -->
  <line x1="220" y1="442" x2="258" y2="442" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- G4 Diamond -->
  <polygon points="310,407 360,442 310,477 260,442" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="310" y="435" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">G4</text>
  <text x="310" y="449" text-anchor="middle" font-size="9" fill="#9a3412">PoC passes?</text>

  <!-- G4 NO → L1 theoretical -->
  <line x1="310" y1="477" x2="310" y2="508" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="296" y="480" width="28" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="310" y="492" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>
  <rect x="220" y="510" width="180" height="36" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="532" text-anchor="middle" font-size="11" fill="#6b7280">L1 remains theoretical</text>

  <!-- G4 YES → G1 -->
  <line x1="360" y1="442" x2="418" y2="442" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="368" y="429" width="30" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="383" y="441" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>

  <!-- G1 Diamond (big) -->
  <polygon points="500,402 555,442 500,482 445,442" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="430" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">G1</text>
  <text x="500" y="444" text-anchor="middle" font-size="9" fill="#991b1b">Anchor customer</text>
  <text x="500" y="456" text-anchor="middle" font-size="9" fill="#991b1b">needs sovereignty?</text>

  <!-- G1 YES → Fund L1 -->
  <line x1="555" y1="442" x2="618" y2="442" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="563" y="429" width="30" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="578" y="441" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>
  <rect x="620" y="417" width="260" height="50" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="750" y="438" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">L1 Funding Review</text>
  <text x="750" y="456" text-anchor="middle" font-size="10" fill="#991b1b">&gt;$10M program &#x00B7; 15&#x2013;25 people &#x00B7; 18&#x2013;24 months</text>

  <!-- G1 NO → L2/L3 sufficient -->
  <line x1="500" y1="482" x2="500" y2="518" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="486" y="486" width="28" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="500" y="498" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>
  <rect x="400" y="520" width="200" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="500" y="542" text-anchor="middle" font-size="11" fill="#166534">L2/L3 path sufficient</text>

  <!-- ===== PALADIN TRACK ===== -->
  <line x1="80" y1="464" x2="80" y2="608" stroke="#9333ea" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Paladin eval box -->
  <rect x="20" y="610" width="200" height="44" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="630" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Paladin Eval (Months 0&#x2013;6)</text>
  <text x="120" y="646" text-anchor="middle" font-size="10" fill="#6b7280">MPL Standalone Assessment</text>

  <!-- Arrow to G5 -->
  <line x1="220" y1="632" x2="258" y2="632" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- G5 Diamond -->
  <polygon points="310,597 360,632 310,667 260,632" fill="#ede9fe" stroke="#9333ea" stroke-width="2"/>
  <text x="310" y="625" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">G5</text>
  <text x="310" y="639" text-anchor="middle" font-size="9" fill="#6b21a8">MPL value?</text>

  <!-- G5 YES -->
  <line x1="360" y1="632" x2="438" y2="632" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="368" y="619" width="30" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="383" y="631" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">YES</text>
  <rect x="440" y="612" width="220" height="40" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="630" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">Pursue Paladin Partnership</text>
  <text x="550" y="646" text-anchor="middle" font-size="10" fill="#6b7280">Fund MPL to V1 (month 14)</text>

  <!-- G5 NO -->
  <line x1="310" y1="667" x2="310" y2="698" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="296" y="670" width="28" height="16" rx="3" fill="#ffffff" stroke="none"/>
  <text x="310" y="682" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">NO</text>
  <rect x="210" y="700" width="200" height="36" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="310" y="718" text-anchor="middle" font-size="10" fill="#6b7280">Table Paladin; use L2/L3</text>
  <text x="310" y="732" text-anchor="middle" font-size="10" fill="#6b7280">native privacy</text>

  <!-- Legend -->
  <rect x="730" y="620" width="340" height="90" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="640" font-size="11" font-weight="600" fill="#111827">Legend</text>
  <line x1="750" y1="658" x2="780" y2="658" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="790" y="662" font-size="10" fill="#6b7280">YES (proceed)</text>
  <line x1="880" y1="658" x2="910" y2="658" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="920" y="662" font-size="10" fill="#6b7280">NO (stop/defer)</text>
  <line x1="750" y1="678" x2="780" y2="678" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="790" y="682" font-size="10" fill="#6b7280">Flow / next step</text>
  <polygon points="880,673 892,678 880,683" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="900" y="682" font-size="10" fill="#6b7280">Decision gate</text>
  <rect x="750" y="692" width="12" height="12" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="770" y="702" font-size="10" fill="#6b7280">Critical decision</text>
  <rect x="880" y="692" width="12" height="12" rx="2" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="900" y="702" font-size="10" fill="#6b7280">Terminal state</text>
</svg>
