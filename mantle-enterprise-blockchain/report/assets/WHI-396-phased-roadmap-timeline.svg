<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="600" y="35" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Mantle Enterprise Blockchain &#x2014; Phased Roadmap (WHI-396)</text>
  <text x="600" y="55" text-anchor="middle" font-size="13" fill="#6b7280">Total Budget: $2.5M &#x2013; $3.9M (Months 0&#x2013;12, excluding L1 Full Build)</text>

  <!-- Time Axis -->
  <line x1="100" y1="80" x2="1140" y2="80" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="100" cy="80" r="4" fill="#2563eb"/><text x="100" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">M0</text>
  <circle cx="360" cy="80" r="4" fill="#2563eb"/><text x="360" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">M3</text>
  <circle cx="620" cy="80" r="4" fill="#2563eb"/><text x="620" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">M6</text>
  <circle cx="880" cy="80" r="4" fill="#2563eb"/><text x="880" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">M9</text>
  <circle cx="1140" cy="80" r="4" fill="#2563eb"/><text x="1140" y="98" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">M12</text>

  <!-- Phase 1: Enterprise L2 MVP -->
  <rect x="100" y="130" width="250" height="190" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="130" width="250" height="30" rx="8" fill="#2563eb"/>
  <rect x="100" y="145" width="250" height="15" fill="#2563eb"/>
  <text x="225" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Phase 1: Enterprise L2 MVP</text>
  <text x="115" y="180" font-size="11" fill="#111827">&#x2022; Authenticated RPC</text>
  <text x="115" y="197" font-size="11" fill="#111827">&#x2022; Sequencer Policy Engine</text>
  <text x="115" y="214" font-size="11" fill="#111827">&#x2022; Bridge Compliance Filters</text>
  <text x="115" y="231" font-size="11" fill="#111827">&#x2022; Identity &amp; Compliance Registry</text>
  <text x="115" y="248" font-size="11" fill="#111827">&#x2022; Audit Event Logging</text>
  <text x="115" y="273" font-size="11" font-weight="600" fill="#6b7280">Team: 8&#x2013;10 | $400K&#x2013;$600K</text>
  <text x="115" y="308" font-size="10" fill="#059669">Go/No-Go: &#x2265;1 paying pilot</text>

  <!-- Phase 2: L3 App Chain -->
  <rect x="370" y="130" width="240" height="190" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="370" y="130" width="240" height="30" rx="8" fill="#16a34a"/>
  <rect x="370" y="145" width="240" height="15" fill="#16a34a"/>
  <text x="490" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Phase 2: L3 App Chain</text>
  <text x="385" y="180" font-size="11" fill="#111827">&#x2022; L3 Chain Template</text>
  <text x="385" y="197" font-size="11" fill="#111827">&#x2022; ZonePortal Contracts</text>
  <text x="385" y="214" font-size="11" fill="#111827">&#x2022; Private DA v1</text>
  <text x="385" y="231" font-size="11" fill="#111827">&#x2022; Deployment Automation</text>
  <text x="385" y="248" font-size="11" fill="#111827">&#x2022; Pilot L3 Instances</text>
  <text x="385" y="273" font-size="11" font-weight="600" fill="#6b7280">Team: 12&#x2013;15 | $600K&#x2013;$900K</text>
  <text x="385" y="308" font-size="10" fill="#059669">Go/No-Go: &#x2265;2 L3 pilots</text>

  <!-- Phase 3: Productization -->
  <rect x="630" y="130" width="280" height="190" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="630" y="130" width="280" height="30" rx="8" fill="#7c3aed"/>
  <rect x="630" y="145" width="280" height="15" fill="#7c3aed"/>
  <text x="770" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Phase 3: Productization</text>
  <text x="645" y="180" font-size="11" fill="#111827">&#x2022; Compliance Audit Framework</text>
  <text x="645" y="197" font-size="11" fill="#111827">&#x2022; Selective Disclosure (ZKP)</text>
  <text x="645" y="214" font-size="11" fill="#111827">&#x2022; ERC-3643 Token Templates</text>
  <text x="645" y="231" font-size="11" fill="#111827">&#x2022; Travel Rule Integration</text>
  <text x="645" y="248" font-size="11" fill="#111827">&#x2022; Enterprise SDK + Cross-zone Relay</text>
  <text x="645" y="273" font-size="11" font-weight="600" fill="#6b7280">Team: 14&#x2013;18 | $1.2M&#x2013;$1.8M</text>
  <text x="645" y="308" font-size="10" fill="#059669">Output: 3&#x2013;5 enterprise customers</text>

  <!-- Arrows between phases -->
  <line x1="350" y1="225" x2="368" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="610" y1="225" x2="628" y2="225" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Parallel Tracks separator -->
  <line x1="80" y1="355" x2="1140" y2="355" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="90" y="349" font-size="10" font-weight="600" fill="#6b7280">PARALLEL TRACKS</text>

  <!-- L1 PoC -->
  <rect x="100" y="365" width="510" height="100" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="365" width="510" height="28" rx="8" fill="#ea580c"/>
  <rect x="100" y="379" width="510" height="14" fill="#ea580c"/>
  <text x="355" y="384" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L1 PoC &#x2014; Benchmark Only (Months 0&#x2013;6)</text>
  <text x="115" y="415" font-size="11" fill="#111827">Reth+BFT Testnet (4&#x2013;11 nodes) &#x00B7; Payment Lane (&#x2265;10K TPS) &#x00B7; Privacy Deposit Prototype</text>
  <text x="115" y="435" font-size="11" font-weight="600" fill="#6b7280">Team: 2&#x2013;3 | Cost: $200K&#x2013;$400K</text>
  <text x="115" y="453" font-size="10" fill="#ea580c">Gate G4 at Month 6: Does PoC pass benchmarks?</text>

  <!-- Paladin Evaluation -->
  <rect x="100" y="490" width="510" height="90" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="100" y="490" width="510" height="28" rx="8" fill="#9333ea"/>
  <rect x="100" y="504" width="510" height="14" fill="#9333ea"/>
  <text x="355" y="509" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Paladin Evaluation &#x2014; MPL Standalone (Months 0&#x2013;6)</text>
  <text x="115" y="540" font-size="11" fill="#111827">MPL Scoping &#x00B7; Partnership Terms &#x00B7; MVP Assessment (Private Stablecoin + KYC Proof)</text>
  <text x="115" y="560" font-size="11" font-weight="600" fill="#6b7280">Team: 1&#x2013;2 | Cost: $100K&#x2013;$200K</text>

  <!-- Decision Gates -->
  <!-- G2 at M3 -->
  <polygon points="360,590 385,610 360,630 335,610" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">G2</text>
  <text x="360" y="648" text-anchor="middle" font-size="10" fill="#6b7280">Paid demand?</text>
  <line x1="360" y1="320" x2="360" y2="590" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- G4/G5 at M6 -->
  <polygon points="620,590 645,610 620,630 595,610" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="620" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">G4/G5</text>
  <text x="620" y="648" text-anchor="middle" font-size="10" fill="#6b7280">PoC + Paladin</text>
  <line x1="620" y1="580" x2="620" y2="590" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- G3 at M9 -->
  <polygon points="880,590 905,610 880,630 855,610" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="880" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">G3</text>
  <text x="880" y="648" text-anchor="middle" font-size="10" fill="#6b7280">L3 viable?</text>
  <line x1="880" y1="320" x2="880" y2="590" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- G1 at M12 -->
  <polygon points="1100,590 1125,610 1100,630 1075,610" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1100" y="614" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">G1</text>
  <text x="1100" y="648" text-anchor="middle" font-size="10" fill="#6b7280">Anchor client?</text>
  <line x1="1100" y1="320" x2="1100" y2="590" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 12-Month Review box -->
  <rect x="940" y="130" width="170" height="130" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="1025" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">12-Month Review</text>
  <text x="955" y="172" font-size="10" fill="#111827">&#x2022; G1: L1 full build?</text>
  <text x="955" y="187" font-size="10" fill="#111827">&#x2022; G4: PoC results</text>
  <text x="955" y="202" font-size="10" fill="#111827">&#x2022; G5: Paladin value?</text>
  <text x="955" y="217" font-size="10" fill="#111827">&#x2022; L2/L3 scaling plan</text>
  <text x="955" y="232" font-size="10" fill="#111827">&#x2022; Strategy convergence</text>
  <line x1="910" y1="195" x2="938" y2="195" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Legend -->
  <rect x="680" y="660" width="470" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="695" y="669" width="12" height="12" rx="2" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="712" y="679" font-size="10" fill="#6b7280">L2</text>
  <rect x="740" y="669" width="12" height="12" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="757" y="679" font-size="10" fill="#6b7280">L3</text>
  <rect x="785" y="669" width="12" height="12" rx="2" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="802" y="679" font-size="10" fill="#6b7280">Productization</text>
  <rect x="875" y="669" width="12" height="12" rx="2" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="892" y="679" font-size="10" fill="#6b7280">L1 PoC</text>
  <rect x="940" y="669" width="12" height="12" rx="2" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
  <text x="957" y="679" font-size="10" fill="#6b7280">Paladin</text>
  <polygon points="1020,669 1032,675 1020,681" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="1037" y="679" font-size="10" fill="#6b7280">Decision Gate</text>
</svg>