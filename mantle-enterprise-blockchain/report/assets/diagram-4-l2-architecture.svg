<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="800" fill="#ffffff"/>

  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Solution 2: Mantle Enterprise L2 Parallel Chain</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#6b7280">WHI-388 — Enterprise-Grade L2 Alongside Public Mantle, Settling to Ethereum L1</text>

  <!-- Enterprise Tenants (top left) -->
  <rect x="40" y="85" width="200" height="160" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5" filter="url(#sh)"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#c2410c">Enterprise Tenants</text>
  <rect x="55" y="118" width="170" height="22" rx="4" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
  <text x="140" y="133" text-anchor="middle" font-size="10" fill="#9a3412">Banks</text>
  <rect x="55" y="145" width="170" height="22" rx="4" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
  <text x="140" y="160" text-anchor="middle" font-size="10" fill="#9a3412">RWA Issuers</text>
  <rect x="55" y="172" width="170" height="22" rx="4" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
  <text x="140" y="187" text-anchor="middle" font-size="10" fill="#9a3412">Payment Firms</text>
  <rect x="55" y="199" width="170" height="22" rx="4" fill="#ffffff" stroke="#fed7aa" stroke-width="1"/>
  <text x="140" y="214" text-anchor="middle" font-size="10" fill="#9a3412">Custodians</text>

  <!-- Regulators (top right) -->
  <rect x="960" y="85" width="200" height="120" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="1060" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">Regulators/Auditors</text>
  <rect x="975" y="120" width="170" height="22" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="1060" y="135" text-anchor="middle" font-size="10" fill="#991b1b">Audit Portal</text>
  <rect x="975" y="147" width="170" height="22" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="1060" y="162" text-anchor="middle" font-size="10" fill="#991b1b">Selective Disclosure</text>
  <rect x="975" y="174" width="170" height="22" rx="4" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <text x="1060" y="189" text-anchor="middle" font-size="10" fill="#991b1b">Compliance Reports</text>

  <!-- KYT/AML (top center-right) -->
  <rect x="750" y="85" width="180" height="55" rx="10" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#sh)"/>
  <text x="840" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">KYT/AML Providers</text>
  <text x="840" y="125" text-anchor="middle" font-size="10" fill="#6b7280">Sanctions · AML · Risk Scoring</text>

  <!-- Enterprise L2 main box -->
  <rect x="280" y="80" width="440" height="440" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
  <rect x="280" y="80" width="440" height="35" rx="12" fill="#2563eb"/>
  <text x="500" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">Mantle Enterprise L2</text>

  <!-- Auth RPC -->
  <rect x="310" y="130" width="380" height="42" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="500" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Authenticated RPC Gateway</text>
  <text x="500" y="163" text-anchor="middle" font-size="10" fill="#6b7280">OIDC/SAML/JWT · SIWE · mTLS · Tenant Quotas</text>

  <!-- Arrow -->
  <line x1="500" y1="172" x2="500" y2="183" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Policy Engine -->
  <rect x="310" y="188" width="380" height="42" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="500" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Policy/KYT Engine</text>
  <text x="500" y="221" text-anchor="middle" font-size="10" fill="#6b7280">Sanctions · KYC Level · Jurisdiction · Whitelist/Blacklist</text>

  <line x1="500" y1="230" x2="500" y2="241" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Enterprise Sequencer -->
  <rect x="310" y="246" width="380" height="42" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="500" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Enterprise Sequencer</text>
  <text x="500" y="279" text-anchor="middle" font-size="10" fill="#3b82f6">Ordering · Pre-Filter · Lane Classification · Audit Events</text>

  <line x1="500" y1="288" x2="500" y2="299" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Execution -->
  <rect x="310" y="304" width="380" height="42" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="500" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Execution Client (op-geth)</text>
  <text x="500" y="337" text-anchor="middle" font-size="10" fill="#6b7280">EVM · Predeploys · Compliance Hooks · ERC-3643</text>

  <line x1="500" y1="346" x2="500" y2="357" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- DA Routing -->
  <rect x="310" y="362" width="380" height="55" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="500" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Hybrid DA Routing</text>
  <rect x="325" y="390" width="165" height="22" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="407" y="405" text-anchor="middle" font-size="10" fill="#166534">Public DA (Blobs)</text>
  <rect x="510" y="390" width="165" height="22" rx="4" fill="#faf5ff" stroke="#c084fc" stroke-width="1"/>
  <text x="592" y="405" text-anchor="middle" font-size="10" fill="#7c3aed">Private DA (Validium)</text>

  <!-- Bridge/Audit -->
  <rect x="310" y="425" width="180" height="35" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="400" y="447" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Bridge Filter</text>
  <rect x="510" y="425" width="180" height="35" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="600" y="447" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Audit Log</text>

  <!-- Arrows from tenants -->
  <line x1="240" y1="165" x2="308" y2="151" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- Arrow from KYT -->
  <line x1="750" y1="112" x2="692" y2="200" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Arrow to regulators -->
  <line x1="690" y1="440" x2="958" y2="165" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="800" y="290" width="80" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="840" y="302" text-anchor="middle" font-size="9" fill="#dc2626">Audit Data</text>

  <!-- Public Mantle Network (left bottom) -->
  <rect x="40" y="550" width="340" height="90" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2" filter="url(#sh)"/>
  <text x="210" y="578" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Mantle Network (Public L2)</text>
  <text x="210" y="598" text-anchor="middle" font-size="11" fill="#16a34a">Public DeFi · Retail · Open Apps</text>
  <text x="210" y="615" text-anchor="middle" font-size="11" fill="#16a34a">MNT Ecosystem · Liquidity</text>

  <!-- Bridge between public and enterprise -->
  <line x1="380" y1="590" x2="500" y2="520" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="400" y="545" width="100" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="450" y="557" text-anchor="middle" font-size="9" fill="#16a34a">Compliance Bridge</text>

  <!-- Ethereum L1 -->
  <rect x="200" y="690" width="800" height="70" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" filter="url(#sh)"/>
  <text x="600" y="720" text-anchor="middle" font-size="16" font-weight="600" fill="#1e40af">Ethereum L1</text>
  <text x="600" y="740" text-anchor="middle" font-size="12" fill="#3b82f6">State Roots · ZK Proofs · Bridge Contracts · Final Settlement</text>

  <!-- Arrows to Ethereum -->
  <line x1="500" y1="520" x2="500" y2="688" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="453" y="600" width="94" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="500" y="612" text-anchor="middle" font-size="10" fill="#2563eb">Proofs/Roots</text>

  <line x1="210" y1="640" x2="400" y2="688" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="260" y="654" width="84" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="302" y="666" text-anchor="middle" font-size="10" fill="#16a34a">Settlement</text>

  <!-- Legend -->
  <rect x="40" y="760" width="500" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="55" y1="775" x2="85" y2="775" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="92" y="779" font-size="10" fill="#6b7280">Tenant Access</text>
  <line x1="175" y1="775" x2="205" y2="775" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <text x="212" y="779" font-size="10" fill="#6b7280">Settlement Flow</text>
  <line x1="300" y1="775" x2="330" y2="775" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="337" y="779" font-size="10" fill="#6b7280">Cross-Chain Bridge</text>
  <line x1="435" y1="775" x2="465" y2="775" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="472" y="779" font-size="10" fill="#6b7280">Audit/Disclosure</text>
</svg>