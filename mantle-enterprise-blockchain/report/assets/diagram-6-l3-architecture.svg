  <text x="600" y="672" text-anchor="middle" font-size="12" fill="#3b82f6">L2 State Roots · ZK Proofs · Bridge · External Asset Security</text>

  <line x1="600" y1="580" x2="600" y2="618" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="548" y="592" width="104" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="604" text-anchor="middle" font-size="10" fill="#2563eb">L2 Proofs/Roots</text>

