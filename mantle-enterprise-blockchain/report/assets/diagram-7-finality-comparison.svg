<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="1200" height="600" fill="#ffffff"/>

  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Finality Comparison: L1 vs L2 vs L3</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#6b7280">Hard finality latency increases with each additional settlement layer</text>

  <!-- Time axis -->
  <line x1="180" y1="80" x2="180" y2="540" stroke="#e5e7eb" stroke-width="1"/>
  <text x="175" y="75" text-anchor="end" font-size="11" fill="#6b7280">Start</text>

  <!-- Time markers -->
  <line x1="310" y1="80" x2="310" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="310" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~1-2s</text>
  <line x1="430" y1="80" x2="430" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="430" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~5s</text>
  <line x1="550" y1="80" x2="550" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="550" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~15s</text>
  <line x1="680" y1="80" x2="680" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="680" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~12min</text>
  <line x1="820" y1="80" x2="820" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="820" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~30min</text>
  <line x1="960" y1="80" x2="960" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="960" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">~1h</text>
  <line x1="1100" y1="80" x2="1100" y2="540" stroke="#f3f4f6" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="1100" y="75" text-anchor="middle" font-size="10" fill="#9ca3af">ETH Final</text>

  <!-- === L1 Path === -->
  <rect x="20" y="90" width="1160" height="130" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="100" y="120" text-anchor="middle" font-size="15" font-weight="600" fill="#7c3aed">L1</text>
  <text x="100" y="138" text-anchor="middle" font-size="10" fill="#6b7280">Self-Built</text>

  <!-- BFT Hard Finality -->
  <rect x="185" y="105" width="140" height="40" rx="6" fill="#dc2626" filter="url(#sh)"/>
  <text x="255" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">BFT Hard</text>
  <text x="255" y="137" text-anchor="middle" font-size="10" fill="#fecaca">~600ms-2s</text>

  <!-- ZK Proven -->
  <rect x="335" y="105" width="310" height="40" rx="6" fill="#9333ea" opacity="0.8" filter="url(#sh)"/>
  <text x="490" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">ZK-Proven Finality</text>
  <text x="490" y="137" text-anchor="middle" font-size="10" fill="#e9d5ff">~5-30 min</text>

  <!-- ETH Anchor (optional) -->
  <rect x="655" y="105" width="480" height="40" rx="6" fill="#2563eb" opacity="0.3" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="895" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Optional Ethereum Anchor</text>
  <text x="895" y="137" text-anchor="middle" font-size="10" fill="#3b82f6">Not required for normal settlement</text>

  <!-- L1 key point -->
  <rect x="185" y="155" width="350" height="22" rx="4" fill="#faf5ff" stroke="#c084fc" stroke-width="1"/>
  <text x="360" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Fastest Hard Finality — Protocol controls settlement</text>
  <circle cx="195" cy="166" r="5" fill="#dc2626"/>

  <!-- === L2 Path === -->
  <rect x="20" y="235" width="1160" height="130" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="100" y="265" text-anchor="middle" font-size="15" font-weight="600" fill="#2563eb">L2</text>
  <text x="100" y="283" text-anchor="middle" font-size="10" fill="#6b7280">Enterprise</text>

  <!-- Sequencer Soft -->
  <rect x="185" y="250" width="140" height="40" rx="6" fill="#f97316" filter="url(#sh)"/>
  <text x="255" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Seq Soft</text>
  <text x="255" y="282" text-anchor="middle" font-size="10" fill="#ffedd5">~1-2s</text>

  <!-- DA Batch -->
  <rect x="335" y="250" width="330" height="40" rx="6" fill="#ea580c" opacity="0.7" filter="url(#sh)"/>
  <text x="500" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">DA Batch Confirmation</text>
  <text x="500" y="282" text-anchor="middle" font-size="10" fill="#ffedd5">~10-12 min</text>

  <!-- ZK Validity -->
  <rect x="675" y="250" width="200" height="40" rx="6" fill="#2563eb" filter="url(#sh)"/>
  <text x="775" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">ZK Validity</text>
  <text x="775" y="282" text-anchor="middle" font-size="10" fill="#bfdbfe">~15-30 min</text>

  <!-- ETH Final -->
  <rect x="885" y="250" width="250" height="40" rx="6" fill="#1e40af" filter="url(#sh)"/>
  <text x="1010" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Ethereum Final</text>
  <text x="1010" y="282" text-anchor="middle" font-size="10" fill="#93c5fd">After L1 confirmation</text>

  <!-- L2 key point -->
  <rect x="185" y="300" width="380" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="375" y="315" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Medium — Soft fast, hard bounded by Ethereum proof</text>
  <circle cx="195" cy="311" r="5" fill="#f97316"/>

  <!-- === L3 Path === -->
  <rect x="20" y="380" width="1160" height="150" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="100" y="410" text-anchor="middle" font-size="15" font-weight="600" fill="#16a34a">L3</text>
  <text x="100" y="428" text-anchor="middle" font-size="10" fill="#6b7280">App Chain</text>

  <!-- L3 Soft -->
  <rect x="185" y="395" width="120" height="40" rx="6" fill="#16a34a" filter="url(#sh)"/>
  <text x="245" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">L3 Soft</text>
  <text x="245" y="427" text-anchor="middle" font-size="10" fill="#bbf7d0">~1-2s</text>

  <!-- L3 Local -->
  <rect x="315" y="395" width="110" height="40" rx="6" fill="#059669" filter="url(#sh)"/>
  <text x="370" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">L3 Local</text>
  <text x="370" y="427" text-anchor="middle" font-size="10" fill="#a7f3d0">~1-5s</text>

  <!-- L2 Submission -->
  <rect x="435" y="395" width="110" height="40" rx="6" fill="#0d9488" filter="url(#sh)"/>
  <text x="490" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">L2 Submit</text>
  <text x="490" y="427" text-anchor="middle" font-size="10" fill="#99f6e4">~2-15s</text>

  <!-- L2 Safe -->
  <rect x="555" y="395" width="160" height="40" rx="6" fill="#ea580c" opacity="0.7" filter="url(#sh)"/>
  <text x="635" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">L2 Safe</text>
  <text x="635" y="427" text-anchor="middle" font-size="10" fill="#ffedd5">~12 min</text>

  <!-- L2 ZK -->
  <rect x="725" y="395" width="230" height="40" rx="6" fill="#2563eb" filter="url(#sh)"/>
  <text x="840" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">L2 ZK Hard</text>
  <text x="840" y="427" text-anchor="middle" font-size="10" fill="#bfdbfe">~1h (current baseline)</text>

  <!-- ETH Final -->
  <rect x="965" y="395" width="170" height="40" rx="6" fill="#1e40af" filter="url(#sh)"/>
  <text x="1050" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">ETH Final</text>
  <text x="1050" y="427" text-anchor="middle" font-size="10" fill="#93c5fd">After all layers</text>

  <!-- L3 key point -->
  <rect x="185" y="445" width="400" height="22" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="385" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Slowest Hard Finality — L3→L2→L1 stacked settlement</text>
  <circle cx="195" cy="456" r="5" fill="#16a34a"/>

  <!-- L3 sub-note -->
  <rect x="185" y="475" width="500" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="435" y="492" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Key Tradeoff: Internal ops accept L3 local finality;</text>
  <text x="435" y="507" text-anchor="middle" font-size="10" fill="#991b1b">external settlement (bridges, ETH exits) waits for full L2→L1 path</text>

  <!-- Summary bar -->
  <rect x="40" y="545" width="1120" height="40" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="250" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">L1: ~1s hard finality</text>
  <text x="600" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">L2: ~15-30min hard finality</text>
  <text x="950" y="570" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">L3: ~1h hard finality (current)</text>
</svg>