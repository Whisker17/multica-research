<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="ab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="1200" height="850" fill="#ffffff"/>

  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Enterprise Blockchain Decision Tree</text>
  <text x="600" y="58" text-anchor="middle" font-size="13" fill="#6b7280">Choose L1, L2, or L3 Based on Non-Negotiable Requirements</text>

  <!-- Start -->
  <rect x="450" y="80" width="300" height="45" rx="22" fill="#111827" filter="url(#sh)"/>
  <text x="600" y="108" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Enterprise Blockchain Need</text>

  <!-- Q1: Hard Finality -->
  <line x1="600" y1="125" x2="600" y2="148" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <polygon points="530,155 670,155 600,195" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="600" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">Sub-second</text>
  <text x="600" y="190" text-anchor="middle" font-size="10" fill="#c2410c">hard finality?</text>

  <!-- Q1 Yes -> L1 -->
  <line x1="670" y1="175" x2="860" y2="175" stroke="#9333ea" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="700" y="163" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="155" width="240" height="45" rx="8" fill="#9333ea" filter="url(#sh)"/>
  <text x="990" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L1: Self-Built Chain</text>
  <text x="990" y="192" text-anchor="middle" font-size="10" fill="#e9d5ff">BFT ~1s deterministic</text>

  <!-- Q1 No -> Q2 -->
  <line x1="600" y1="195" x2="600" y2="230" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="200" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q2: Protocol-native compliance -->
  <polygon points="530,237 670,237 600,277" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="600" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Protocol-native</text>
  <text x="600" y="270" text-anchor="middle" font-size="10" fill="#991b1b">compliance?</text>

  <!-- Q2 Yes -> L1 -->
  <line x1="670" y1="257" x2="860" y2="257" stroke="#9333ea" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="700" y="245" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="257" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="237" width="240" height="45" rx="8" fill="#9333ea" opacity="0.85" filter="url(#sh)"/>
  <text x="990" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L1: Self-Built Chain</text>
  <text x="990" y="274" text-anchor="middle" font-size="10" fill="#e9d5ff">Consensus + precompile enforce</text>

  <!-- Q2 No -> Q3 -->
  <line x1="600" y1="277" x2="600" y2="312" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="282" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q3: Ethereum/Mantle alignment -->
  <polygon points="530,319 670,319 600,359" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">ETH/Mantle</text>
  <text x="600" y="352" text-anchor="middle" font-size="10" fill="#1e40af">alignment?</text>

  <!-- Q3 Yes -> L2 -->
  <line x1="670" y1="339" x2="860" y2="339" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="700" y="327" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="339" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="319" width="240" height="45" rx="8" fill="#2563eb" filter="url(#sh)"/>
  <text x="990" y="340" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L2: Enterprise Chain</text>
  <text x="990" y="356" text-anchor="middle" font-size="10" fill="#bfdbfe">Mantle ecosystem + ETH proof</text>

  <!-- Q3 No -> Q4 -->
  <line x1="600" y1="359" x2="600" y2="394" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="364" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="376" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q4: Per-tenant isolation -->
  <polygon points="530,401 670,401 600,441" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="600" y="422" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Per-tenant</text>
  <text x="600" y="434" text-anchor="middle" font-size="10" fill="#166534">isolation?</text>

  <!-- Q4 Yes -> L3 -->
  <line x1="670" y1="421" x2="860" y2="421" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="700" y="409" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="421" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="401" width="240" height="45" rx="8" fill="#16a34a" filter="url(#sh)"/>
  <text x="990" y="422" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L3: App Chain</text>
  <text x="990" y="438" text-anchor="middle" font-size="10" fill="#bbf7d0">One chain per enterprise</text>

  <!-- Q4 No -> Q5 -->
  <line x1="600" y1="441" x2="600" y2="476" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="446" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q5: DeFi composability -->
  <polygon points="530,483 670,483 600,523" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600" y="504" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">DeFi</text>
  <text x="600" y="516" text-anchor="middle" font-size="10" fill="#1e40af">composability?</text>

  <!-- Q5 Yes -> L2 -->
  <line x1="670" y1="503" x2="860" y2="503" stroke="#2563eb" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="700" y="491" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="503" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="483" width="240" height="45" rx="8" fill="#2563eb" opacity="0.85" filter="url(#sh)"/>
  <text x="990" y="504" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L2: Enterprise Chain</text>
  <text x="990" y="520" text-anchor="middle" font-size="10" fill="#bfdbfe">Best Mantle liquidity access</text>

  <!-- Q5 No -> Q6 -->
  <line x1="600" y1="523" x2="600" y2="558" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="528" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="540" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q6: Fast time-to-market -->
  <polygon points="530,565 670,565 600,605" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="600" y="586" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Fast time-to-</text>
  <text x="600" y="598" text-anchor="middle" font-size="10" fill="#166534">market?</text>

  <!-- Q6 Yes -> L3 or L2 -->
  <line x1="670" y1="585" x2="860" y2="585" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <rect x="700" y="573" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="585" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="565" width="240" height="45" rx="8" fill="#0d9488" filter="url(#sh)"/>
  <text x="990" y="586" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L3 or L2</text>
  <text x="990" y="602" text-anchor="middle" font-size="10" fill="#ccfbf1">L3 fastest; L2 if ETH alignment</text>

  <!-- Q6 No -> Data sovereignty -->
  <line x1="600" y1="605" x2="600" y2="640" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>
  <rect x="580" y="610" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="600" y="622" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">No</text>

  <!-- Q7: Data sovereignty -->
  <polygon points="530,647 670,647 600,687" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="600" y="668" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Full data</text>
  <text x="600" y="680" text-anchor="middle" font-size="10" fill="#7c3aed">sovereignty?</text>

  <!-- Q7 Yes -> L1 or L3 -->
  <line x1="670" y1="667" x2="860" y2="667" stroke="#9333ea" stroke-width="2" marker-end="url(#ap)"/>
  <rect x="700" y="655" width="40" height="16" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="720" y="667" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <rect x="870" y="647" width="240" height="45" rx="8" fill="#7c3aed" filter="url(#sh)"/>
  <text x="990" y="668" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">L1 or L3</text>
  <text x="990" y="684" text-anchor="middle" font-size="10" fill="#e9d5ff">L1 max; L3 per-tenant private DA</text>

  <!-- Default -->
  <line x1="600" y1="687" x2="600" y2="720" stroke="#111827" stroke-width="2" marker-end="url(#ab)"/>

  <rect x="420" y="725" width="360" height="45" rx="8" fill="#2563eb" filter="url(#sh)"/>
  <text x="600" y="746" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Default: L2 Enterprise Chain</text>
  <text x="600" y="762" text-anchor="middle" font-size="10" fill="#bfdbfe">Best balance of speed, ecosystem, and compliance</text>

  <!-- Left side labels -->
  <rect x="40" y="155" width="150" height="28" rx="6" fill="#faf5ff" stroke="#c084fc" stroke-width="1"/>
  <text x="115" y="173" text-anchor="middle" font-size="10" fill="#7c3aed">Max Sovereignty</text>

  <rect x="40" y="319" width="150" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="115" y="337" text-anchor="middle" font-size="10" fill="#2563eb">Ecosystem Aligned</text>

  <rect x="40" y="401" width="150" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="115" y="419" text-anchor="middle" font-size="10" fill="#16a34a">Tenant Isolation</text>

  <!-- Summary boxes at bottom -->
  <rect x="40" y="790" width="350" height="45" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1"/>
  <text x="215" y="812" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">L1: xStocks · Payment · DVP · Consortium</text>
  <text x="215" y="828" text-anchor="middle" font-size="10" fill="#6b7280">18-24 months · Highest cost · Max control</text>

  <rect x="420" y="790" width="350" height="45" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="595" y="812" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">L2: DeFi · RWA · Mantle Alignment</text>
  <text x="595" y="828" text-anchor="middle" font-size="10" fill="#6b7280">8-12 months · Fastest credible path</text>

  <rect x="800" y="790" width="350" height="45" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="975" y="812" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">L3: Bank Ledger · Issuer · SaaS Tenants</text>
  <text x="975" y="828" text-anchor="middle" font-size="10" fill="#6b7280">9-13 months · Best tenant isolation</text>
</svg>