  <text x="515" y="740" font-size="12" font-weight="600" fill="#dc2626">Investment Required</text>
  <text x="515" y="758" font-size="11" fill="#7f1d1d">Team: 15-25 engineers for 18-24 months</text>
  <text x="515" y="773" font-size="11" fill="#7f1d1d">Engineering: $5M-$12M + $850K-$1.7M audits</text>
  <text x="515" y="788" font-size="11" fill="#7f1d1d">Monthly Infra: ~$85K-$130K (initial scale)</text>
