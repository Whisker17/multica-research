  <text x="210" y="97" text-anchor="middle" font-size="13" fill="#1e3a5f">RWA</text>
  <rect x="330" y="76" width="140" height="34" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="97" text-anchor="middle" font-size="13" fill="#1e3a5f">xStocks</text>
  <rect x="520" y="76" width="140" height="34" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1"/>
