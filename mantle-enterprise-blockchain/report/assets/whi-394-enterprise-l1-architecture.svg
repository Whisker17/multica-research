  <text x="592" y="270" text-anchor="middle" font-size="10" fill="#4a6a8a">Private DA</text>
  <text x="592" y="283" text-anchor="middle" font-size="10" fill="#4a6a8a">Own Compliance</text>
  <text x="592" y="296" text-anchor="middle" font-size="10" fill="#4a6a8a">Own Sequencer</text>
