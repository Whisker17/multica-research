  <text x="812" y="253" text-anchor="middle" font-size="13" font-weight="600" fill="#1e3a5f">Custom Zones</text>
  <text x="812" y="270" text-anchor="middle" font-size="10" fill="#4a6a8a">Private DA</text>
  <text x="812" y="283" text-anchor="middle" font-size="10" fill="#4a6a8a">Own Compliance</text>
  <text x="812" y="296" text-anchor="middle" font-size="10" fill="#4a6a8a">Own Sequencer</text>

