  <line x1="480" y1="190" x2="480" y2="205" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="325" x2="480" y2="340" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="390" x2="480" y2="405" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="455" x2="480" y2="470" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="545" x2="480" y2="560" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="620" x2="480" y2="640" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Key Properties callout -->
  <rect x="40" y="720" width="420" height="85" rx="8" fill="#eff6ff" stroke="#1e3a5f" stroke-width="1"/>
  <text x="55" y="740" font-size="12" font-weight="600" fill="#1e3a5f">Key Properties</text>
  <text x="55" y="758" font-size="11" fill="#4a6a8a">Hard Finality: ~600ms-2s (BFT certificate)</text>
  <text x="55" y="773" font-size="11" fill="#4a6a8a">TPS: 3,000-5,000 mainchain / &gt;10,000 Payment Zone</text>
  <text x="55" y="788" font-size="11" fill="#4a6a8a">Validators: 7-15 initial, scaling to 21-50</text>

