  <rect x="140" y="146" width="140" height="34" rx="6" fill="#ffffff" stroke="#1e3a5f" stroke-width="1"/>
  <text x="210" y="167" text-anchor="middle" font-size="12" fill="#1e3a5f">MIP-20/21</text>
